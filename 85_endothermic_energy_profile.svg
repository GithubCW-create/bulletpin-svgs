<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Energy Profile Diagram</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Endothermic reaction</text>

  <!--
    ENERGY PROFILE (ENDOTHERMIC) — FIXED
    =======================================
    FIX: Ea arrow shifted to peak of curve (~x=200).
    FIX: Reactant dashed line extended right to x=122 (gap fill).
    FIX: Product dashed line extended left to x=293 (gap fill).
  -->

  <!-- Axes -->
  <line x1="60" y1="230" x2="360" y2="230" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="60" y1="230" x2="60" y2="55" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <polygon points="360,230 350,226 350,234" fill="#4fc3f7"/>
  <polygon points="60,55 56,65 64,65" fill="#4fc3f7"/>

  <text x="40" y="140" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffffff" transform="rotate(-90 40 140)">Energy</text>
  <text x="210" y="250" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffffff">Progress of reaction</text>

  <!-- Reactant energy level — extended right to x=122 -->
  <line x1="70" y1="190" x2="122" y2="190" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4 3" stroke-linecap="round"/>
  <text x="96" y="202" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">Reactants</text>

  <!-- Product energy level — extended left to x=293 -->
  <line x1="293" y1="140" x2="350" y2="140" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4 3" stroke-linecap="round"/>
  <text x="321" y="130" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">Products</text>

  <!-- Energy profile curve -->
  <path d="M 125,190 C 150,190 170,190 190,100 C 200,72 210,72 225,100 C 245,140 275,140 290,140" stroke="#ef5350" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Ea arrow — from peak (~x=205, y=72) down to reactant level -->
  <line x1="205" y1="190" x2="205" y2="75" stroke="#81c784" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="205,75 201,83 209,83" fill="#81c784"/>
  <polygon points="205,190 201,182 209,182" fill="#81c784"/>
  <text x="215" y="130" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#81c784">Eₐ</text>

  <!-- ΔH arrow -->
  <line x1="355" y1="190" x2="355" y2="140" stroke="#ffb74d" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="355,140 351,148 359,148" fill="#ffb74d"/>
  <polygon points="355,190 351,182 359,182" fill="#ffb74d"/>
  <text x="365" y="165" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#ffb74d">ΔH</text>

  <!-- Reference lines -->
  <line x1="122" y1="190" x2="355" y2="190" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>
  <line x1="293" y1="140" x2="355" y2="140" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>

  <text x="365" y="178" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffb74d">(+ve)</text>
</svg>
