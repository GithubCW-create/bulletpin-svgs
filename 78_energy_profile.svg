<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Energy Profile Diagram</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Exothermic reaction</text>

  <!--
    ENERGY PROFILE (EXOTHERMIC) — FIXED v3
    =========================================
    FIX: ΔH arrow brought left to x=325, directly above products.
    FIX: Ea arrow top shortened by 3px (y=75→y=78) so it doesn't overshoot peak.
    FIX: Dashed lines extended to fill gaps.
  -->

  <!-- Axes -->
  <line x1="60" y1="230" x2="360" y2="230" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="60" y1="230" x2="60" y2="55" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <polygon points="360,230 350,226 350,234" fill="#4fc3f7"/>
  <polygon points="60,55 56,65 64,65" fill="#4fc3f7"/>

  <text x="40" y="140" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffffff" transform="rotate(-90 40 140)">Energy</text>
  <text x="210" y="250" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffffff">Progress of reaction</text>

  <!-- Reactant energy level — extended right to x=122 -->
  <line x1="70" y1="140" x2="122" y2="140" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4 3" stroke-linecap="round"/>
  <text x="96" y="152" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">Reactants</text>

  <!-- Product energy level — extended left to x=293 -->
  <line x1="293" y1="195" x2="350" y2="195" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4 3" stroke-linecap="round"/>
  <text x="321" y="207" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">Products</text>

  <!-- Energy profile curve -->
  <path d="M 125,140 C 150,140 165,140 185,100 C 200,72 210,72 230,100 C 250,140 275,195 290,195" stroke="#ef5350" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Ea arrow — top shortened to y=78 (peak is y=72, arrow stops 6px below) -->
  <line x1="155" y1="140" x2="155" y2="78" stroke="#81c784" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="155,78 151,86 159,86" fill="#81c784"/>
  <polygon points="155,140 151,132 159,132" fill="#81c784"/>
  <text x="165" y="109" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#81c784">Eₐ</text>

  <!-- ΔH arrow — brought left to x=325, directly above products -->
  <line x1="325" y1="140" x2="325" y2="195" stroke="#ffb74d" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="325,195 321,187 329,187" fill="#ffb74d"/>
  <polygon points="325,140 321,148 329,148" fill="#ffb74d"/>
  <text x="335" y="167" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#ffb74d">ΔH</text>
  <text x="335" y="180" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffb74d">(−ve)</text>

  <!-- Reference lines connecting levels to ΔH arrow -->
  <line x1="122" y1="140" x2="325" y2="140" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>
  <line x1="293" y1="195" x2="325" y2="195" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>
</svg>
