<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Bohr Model — Neon</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Ne (atomic number 10)</text>

  <!--
    BOHR MODEL NEON
    ===============
    Electron config: 2, 8
    Nucleus at (200,140). Shell 1 r=35, Shell 2 r=65.
    Noble gas — both shells full.
  -->

  <!-- Shells -->
  <circle cx="200" cy="140" r="35" stroke="#81c784" stroke-width="1" fill="none"/>
  <circle cx="200" cy="140" r="65" stroke="#81c784" stroke-width="1" fill="none"/>

  <!-- Nucleus -->
  <circle cx="200" cy="140" r="14" fill="#ff6b35"/>
  <text x="200" y="140" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Ne</text>

  <!-- Shell 1: 2 electrons — 1 pair at top -->
  <circle cx="196" cy="105" r="4" fill="#4fc3f7"/>
  <circle cx="204" cy="105" r="4" fill="#4fc3f7"/>

  <!-- Shell 2: 8 electrons — 4 pairs at compass points -->
  <!-- Top pair -->
  <circle cx="196" cy="75" r="4" fill="#4fc3f7"/>
  <circle cx="204" cy="75" r="4" fill="#4fc3f7"/>
  <!-- Right pair -->
  <circle cx="265" cy="136" r="4" fill="#4fc3f7"/>
  <circle cx="265" cy="144" r="4" fill="#4fc3f7"/>
  <!-- Bottom pair -->
  <circle cx="196" cy="205" r="4" fill="#4fc3f7"/>
  <circle cx="204" cy="205" r="4" fill="#4fc3f7"/>
  <!-- Left pair -->
  <circle cx="135" cy="136" r="4" fill="#4fc3f7"/>
  <circle cx="135" cy="144" r="4" fill="#4fc3f7"/>

  <!-- Electron configuration -->
  <text x="200" y="223" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#ffffff">2, 8</text>
</svg>
