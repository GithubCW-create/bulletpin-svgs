<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Displacement Reactions</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">More reactive metal displaces less reactive</text>

  <!--
    DISPLACEMENT REACTION DIAGRAM
    ===============================
    Shows the principle: Zn + CuSO₄ → ZnSO₄ + Cu
    Before and after visual with equation
  -->

  <!-- Equation -->
  <text x="200" y="60" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#ffffff">Zn + CuSO₄ → ZnSO₄ + Cu</text>

  <!-- Before (left side) — above beaker, clear of graphics -->
  <text x="120" y="80" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#81c784">Before</text>

  <!-- Beaker outline -->
  <rect x="70" y="100" width="100" height="80" rx="4" ry="4" stroke="#4fc3f7" stroke-width="2" fill="none"/>

  <!-- CuSO₄ solution (blue fill) -->
  <rect x="72" y="115" width="96" height="63" rx="2" ry="2" fill="#4fc3f7" opacity="0.2"/>
  <text x="120" y="155" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#4fc3f7">CuSO₄(aq)</text>
  <text x="120" y="168" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#4fc3f7">Blue solution</text>

  <!-- Zinc strip -->
  <rect x="110" y="95" width="12" height="55" rx="2" ry="2" fill="#ffffff" opacity="0.6" stroke="#ffffff" stroke-width="1"/>
  <text x="140" y="108" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">Zn</text>

  <!-- Arrow -->
  <line x1="185" y1="140" x2="215" y2="140" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <polygon points="215,140 207,136 207,144" fill="#ffffff"/>

  <!-- After (right side) — above beaker, clear of graphics -->
  <text x="290" y="80" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#81c784">After</text>

  <!-- Beaker outline -->
  <rect x="240" y="100" width="100" height="80" rx="4" ry="4" stroke="#4fc3f7" stroke-width="2" fill="none"/>

  <!-- ZnSO₄ solution (colourless) -->
  <rect x="242" y="115" width="96" height="63" rx="2" ry="2" fill="#ffffff" opacity="0.05"/>
  <text x="290" y="155" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">ZnSO₄(aq)</text>
  <text x="290" y="168" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">Colourless</text>

  <!-- Copper coating on strip -->
  <rect x="278" y="95" width="12" height="55" rx="2" ry="2" fill="#ff6b35" opacity="0.7" stroke="#ff6b35" stroke-width="1"/>
  <text x="296" y="108" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ff6b35">Cu</text>
  <text x="296" y="120" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ff6b35">deposited</text>

  <!-- Explanation -->
  <text x="200" y="205" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Zn is more reactive than Cu → Zn displaces Cu from solution</text>
  <text x="200" y="220" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Blue colour fades • Orange-brown Cu appears on Zn</text>
</svg>