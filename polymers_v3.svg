<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <rect width="400" height="280" fill="#1a1a2e"/>
  <defs>
    <marker id="ga" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 1, 8 4, 0 7" fill="#2ecc71"/>
    </marker>
  </defs>
  <text x="200" y="14" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Drawing Polymers and Repeat Units</text>
  <text x="200" y="32" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#b0b0c8">1,2-DICHLOROETHENE</text>
  <g stroke="#ffffff" stroke-width="1" fill="none">
    <!-- Monomer C=C -->
    <line x1="98" y1="68" x2="106" y2="68"/>
    <line x1="98" y1="72" x2="106" y2="72"/>
    <line x1="87" y1="65" x2="79" y2="56"/>
    <line x1="87" y1="75" x2="79" y2="84"/>
    <line x1="117" y1="65" x2="125" y2="56"/>
