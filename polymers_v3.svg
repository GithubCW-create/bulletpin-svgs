    <path d="M 266 42 L 260 42 L 260 100 L 266 100" stroke-width="1.2"/>
    <path d="M 318 42 L 324 42 L 324 100 L 318 100" stroke-width="1.2"/>
    <line x1="252" y1="70" x2="260" y2="70"/>
    <line x1="324" y1="70" x2="332" y2="70"/>
    <line x1="102" y1="130" x2="102" y2="170" stroke="#2ecc71" stroke-width="1.5" marker-end="url(#ga)"/>
    <!-- Polymer chain bonds (+10px shift) -->
    <line x1="65" y1="218" x2="73" y2="218"/>
    <line x1="87" y1="218" x2="95" y2="218"/>
    <line x1="109" y1="218" x2="117" y2="218"/>
    <line x1="131" y1="218" x2="139" y2="218"/>
    <line x1="51" y1="218" x2="41" y2="218"/>
    <line x1="153" y1="218" x2="163" y2="218"/>
    <line x1="58" y1="211" x2="58" y2="200"/>
    <line x1="58" y1="225" x2="58" y2="236"/>
    <line x1="80" y1="211" x2="80" y2="200"/>
    <line x1="80" y1="225" x2="80" y2="236"/>
    <line x1="102" y1="211" x2="102" y2="200"/>
    <line x1="102" y1="225" x2="102" y2="236"/>
    <line x1="124" y1="211" x2="124" y2="200"/>
    <line x1="124" y1="225" x2="124" y2="236"/>
    <line x1="146" y1="211" x2="146" y2="200"/>
    <line x1="146" y1="225" x2="146" y2="236"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" fill="#ffffff" font-size="14" text-anchor="middle" dominant-baseline="central">
    <text x="91" y="70">C</text>
    <text x="113" y="70">C</text>
    <text x="75" y="52">H</text>
    <text x="75" y="88">Cl</text>
    <text x="129" y="52">Cl</text>
    <text x="129" y="88">H</text>
    <text x="281" y="70">C</text>
    <text x="303" y="70">C</text>
    <text x="281" y="46">H</text>
    <text x="281" y="94">Cl</text>
    <text x="303" y="46">Cl</text>
    <text x="303" y="94">H</text>
    <text x="336" y="106" font-size="14" text-anchor="start" dominant-baseline="auto">n</text>
    <text x="58" y="218">C</text>
    <text x="58" y="194">H</text>
    <text x="58" y="242">Cl</text>
    <text x="80" y="218">C</text>
    <text x="80" y="194">Cl</text>
    <text x="80" y="242">H</text>
    <text x="102" y="218">C</text>
    <text x="102" y="194">H</text>
    <text x="102" y="242">Cl</text>
    <text x="124" y="218">C</text>
    <text x="124" y="194">Cl</text>
    <text x="124" y="242">H</text>
    <text x="146" y="218">C</text>
    <text x="146" y="194">H</text>
    <text x="146" y="242">Cl</text>
