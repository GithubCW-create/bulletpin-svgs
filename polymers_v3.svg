    <line x1="145" y1="70" x2="225" y2="70" stroke="#2ecc71" stroke-width="1.5" marker-end="url(#ga)"/>
    <!-- Repeating unit C-C -->
    <line x1="288" y1="70" x2="296" y2="70"/>
    <line x1="281" y1="63" x2="281" y2="52"/>
    <line x1="281" y1="77" x2="281" y2="88"/>
    <line x1="303" y1="63" x2="303" y2="52"/>
