<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Le Chatelier's Principle</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Reversible reactions and equilibrium</text>

  <!-- Central principle -->
  <text x="200" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">If conditions change, equilibrium shifts to oppose the change</text>

  <!-- Table header — tighter columns centred -->
  <text x="90" y="82" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Change</text>
  <text x="200" y="82" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Shift</text>
  <text x="305" y="82" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Effect</text>

  <line x1="50" y1="94" x2="350" y2="94" stroke="#4fc3f7" stroke-width="1" opacity="0.4"/>

  <!-- Temperature increase -->
  <text x="90" y="112" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ef5350">↑ Temperature</text>
  <text x="200" y="112" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Endothermic</text>
  <text x="305" y="112" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Opposes heating</text>

  <line x1="50" y1="125" x2="350" y2="125" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>

  <!-- Temperature decrease -->
  <text x="90" y="140" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#4fc3f7">↓ Temperature</text>
  <text x="200" y="140" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Exothermic</text>
  <text x="305" y="140" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Opposes cooling</text>

  <line x1="50" y1="153" x2="350" y2="153" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>

  <!-- Pressure increase -->
  <text x="90" y="168" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ef5350">↑ Pressure</text>
  <text x="200" y="168" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Fewer moles</text>
  <text x="305" y="168" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Reduces pressure</text>

  <line x1="50" y1="181" x2="350" y2="181" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>

  <!-- Pressure decrease -->
  <text x="90" y="196" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#4fc3f7">↓ Pressure</text>
  <text x="200" y="196" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">More moles</text>
  <text x="305" y="196" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Increases pressure</text>

  <line x1="50" y1="209" x2="350" y2="209" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>

  <!-- Concentration increase -->
  <text x="90" y="224" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ef5350">↑ Concentration</text>
  <text x="200" y="224" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Away from added</text>
  <text x="305" y="224" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Uses up excess</text>

  <!-- Catalyst note -->
  <text x="200" y="252" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffb74d">Catalyst: speeds up BOTH directions — no shift in position</text>
</svg>