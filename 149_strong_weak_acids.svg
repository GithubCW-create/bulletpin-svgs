<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Strong vs Weak Acids</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Degree of ionisation in water</text>

  <!-- Strong acid box -->
  <rect x="25" y="52" width="165" height="86" rx="6" ry="6" stroke="#ef5350" stroke-width="1.5" fill="none"/>
  <text x="107" y="65" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#ef5350">Strong acid</text>
  <text x="107" y="80" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Fully ionises</text>
  <text x="107" y="94" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">HA → H⁺ + A⁻</text>
  <text x="107" y="112" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#81c784">HCl, HNO₃, H₂SO₄</text>
  <text x="107" y="126" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffb74d">Lower pH (more H⁺)</text>

  <!-- Weak acid box -->
  <rect x="210" y="52" width="165" height="86" rx="6" ry="6" stroke="#4fc3f7" stroke-width="1.5" fill="none"/>
  <text x="292" y="65" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Weak acid</text>
  <text x="292" y="80" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Partially ionises</text>
  <text x="292" y="94" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">HA ⇌ H⁺ + A⁻</text>
  <text x="292" y="112" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#81c784">CH₃COOH, citric acid</text>
  <text x="292" y="126" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffb74d">Higher pH (fewer H⁺)</text>

  <!-- Key point -->
  <text x="200" y="155" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">At same concentration, strong acid has lower pH</text>

  <!-- Dilute vs concentrated -->
  <text x="200" y="182" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Dilute vs Concentrated</text>
  <rect x="70" y="194" width="260" height="42" rx="6" ry="6" stroke="#ffb74d" stroke-width="1.5" fill="none"/>
  <text x="200" y="208" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Dilute/concentrated = amount of acid in water</text>
  <text x="200" y="224" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Strong/weak = degree of ionisation</text>

  <text x="200" y="252" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">You can have a dilute strong acid or a concentrated weak acid</text>
</svg>