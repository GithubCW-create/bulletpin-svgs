<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>

  <!--
    VERTICAL RHYTHM: Title(20) → Subtitle(35) → Equation(65) → Config(92) → Key(112)
    DOT-AND-CROSS GRID: top/bottom ±14px, left/right ±16px, pairs ±4px, brackets 3px outside
  -->

  <!-- Title -->
  <text x="200" y="20" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Ionic Bonding — Sodium Chloride</text>
  <text x="200" y="35" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Electron transfer: NaCl</text>

  <!-- ======== REACTANT: Na• ======== -->
  <text x="48" y="65" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#4fc3f7">Na</text>
  <circle cx="68" cy="58" r="2.5" fill="#4fc3f7"/>

  <!-- Plus -->
  <text x="88" y="65" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#ffffff">+</text>

  <!-- ======== REACTANT: Cl with 7× ======== -->
  <!-- cx=128, cy=65 -->
  <!-- Top ××: y=65-14=51, x=128±4 -->
  <text x="124" y="51" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">×</text>
  <text x="132" y="51" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">×</text>
  <!-- Left ×: x=128-16=112 -->
  <text x="112" y="65" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">×</text>
  <!-- Cl -->
  <text x="128" y="65" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#ce93d8">Cl</text>
  <!-- Right ××: x=128+16=144, y=65±4 -->
  <text x="144" y="61" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">×</text>
  <text x="144" y="69" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">×</text>
  <!-- Bottom ××: y=65+14=79, x=128±4 -->
  <text x="124" y="79" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">×</text>
  <text x="132" y="79" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">×</text>

  <!-- ======== ARROW ======== -->
  <line x1="162" y1="65" x2="190" y2="65" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="190,60 200,65 190,70" fill="#ffffff"/>

  <!-- ======== PRODUCT: [Na]⁺ ======== -->
  <!-- cx=240, cy=65. Brackets: y=48 to y=82 -->
  <path d="M227 48 L222 48 L222 82 L227 82" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M253 48 L258 48 L258 82 L253 82" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="240" y="65" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#4fc3f7">Na</text>
  <text x="266" y="48" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">+</text>

  <!-- ======== PRODUCT: [•Cl×]⁻ with 8 electrons ======== -->
  <!-- cx=330, cy=65 -->
  <!-- Top ××: y=51, x=330±4 -->
  <text x="326" y="51" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">×</text>
  <text x="334" y="51" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">×</text>
  <!-- Left pair: x=330-16=314, y=65±4 — dot (transferred) + cross -->
  <circle cx="314" cy="61" r="2.5" fill="#4fc3f7"/>
  <text x="314" y="69" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">×</text>
  <!-- Cl -->
  <text x="330" y="65" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#ce93d8">Cl</text>
  <!-- Right ××: x=330+16=346, y=65±4 -->
  <text x="346" y="61" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">×</text>
  <text x="346" y="69" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">×</text>
  <!-- Bottom ××: y=79, x=330±4 -->
  <text x="326" y="79" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">×</text>
  <text x="334" y="79" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">×</text>
  <!-- Brackets: y=48 to y=82 -->
  <path d="M311 48 L306 48 L306 82 L311 82" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M349 48 L354 48 L354 82 L349 82" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="362" y="48" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">−</text>

  <!-- Electron configurations: y=92 (13px below bottom electrons) -->
  <text x="48" y="92" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#81c784">(2,8,1)</text>
  <text x="128" y="92" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#81c784">(2,8,7)</text>
  <text x="240" y="92" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#81c784">(2,8)</text>
  <text x="330" y="92" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#81c784">(2,8,8)</text>

  <!-- Key: y=112 -->
  <circle cx="110" cy="112" r="2.5" fill="#4fc3f7"/>
  <text x="118" y="112" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">= Na electron (dot)</text>
  <text x="225" y="112" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">×</text>
  <text x="235" y="112" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">= Cl electron (cross)</text>
</svg>