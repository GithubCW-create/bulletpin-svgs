<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Displayed Formula — Propan-1-ol</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">C₃H₇OH (alcohol)</text>

  <!--
    PROPAN-1-OL DISPLAYED FORMULA
    ==============================
    Backbone at y=100 (rule).
    C1(95,100) — C2(165,100) — C3(235,100) — O(305,100). 70px spacing.
    C1: H left, H up, H down (CH₃). C2: H up, H down (CH₂).
    C3: H up, H down (CH₂). O: H right (—OH).
    Bond gap: 12px from each atom centre. Terminal H at 42px.
  -->

  <!-- Backbone atom labels -->
  <text x="95" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ff6b35">C</text>
  <text x="165" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ff6b35">C</text>
  <text x="235" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ff6b35">C</text>
  <text x="305" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffb74d">O</text>

  <!-- C1 hydrogen atoms (CH₃) -->
  <text x="53" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="95" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="95" y="142" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>

  <!-- C2 hydrogen atoms (CH₂) -->
  <text x="165" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="165" y="142" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>

  <!-- C3 hydrogen atoms (CH₂) -->
  <text x="235" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="235" y="142" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>

  <!-- O hydrogen atom -->
  <text x="347" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>

  <!-- Backbone bonds -->
  <line x1="107" y1="100" x2="153" y2="100" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="177" y1="100" x2="223" y2="100" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="247" y1="100" x2="293" y2="100" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>

  <!-- C1—H left -->
  <line x1="83" y1="100" x2="65" y2="100" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <!-- C1—H up -->
  <line x1="95" y1="88" x2="95" y2="70" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <!-- C1—H down -->
  <line x1="95" y1="112" x2="95" y2="130" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>

  <!-- C2—H up -->
  <line x1="165" y1="88" x2="165" y2="70" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <!-- C2—H down -->
  <line x1="165" y1="112" x2="165" y2="130" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>

  <!-- C3—H up -->
  <line x1="235" y1="88" x2="235" y2="70" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <!-- C3—H down -->
  <line x1="235" y1="112" x2="235" y2="130" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>

  <!-- O—H right -->
  <line x1="317" y1="100" x2="335" y2="100" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>

  <!-- Functional group highlight: —OH -->
  <rect x="292" y="87" width="68" height="26" rx="6" ry="6" stroke="#81c784" stroke-width="1.5" stroke-dasharray="4 3" fill="none"/>
  <text x="326" y="165" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#81c784">hydroxyl (—OH)</text>
</svg>
