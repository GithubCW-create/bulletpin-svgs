<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Structural Isomers</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Same molecular formula, different structure</text>

  <!-- C₄H₁₀ example -->
  <text x="200" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">C₄H₁₀ — two isomers</text>

  <!-- Butane (straight chain) -->
  <text x="110" y="78" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" fill="#81c784">Butane</text>
  <!-- C-C-C-C backbone — shifted down to y=110 for symmetry -->
  <text x="60" y="110" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ff6b35">C</text>
  <line x1="68" y1="110" x2="82" y2="110" stroke="#4fc3f7" stroke-width="2"/>
  <text x="90" y="110" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ff6b35">C</text>
  <line x1="98" y1="110" x2="112" y2="110" stroke="#4fc3f7" stroke-width="2"/>
  <text x="120" y="110" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ff6b35">C</text>
  <line x1="128" y1="110" x2="142" y2="110" stroke="#4fc3f7" stroke-width="2"/>
  <text x="150" y="110" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ff6b35">C</text>
  <!-- H atoms shown as condensed -->
  <text x="110" y="129" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">CH₃CH₂CH₂CH₃</text>

  <!-- Methylpropane (branched) -->
  <text x="300" y="78" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" fill="#81c784">Methylpropane</text>
  <!-- C-C-C backbone with branch — shifted down to y=115, branch at y=97 -->
  <text x="270" y="115" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ff6b35">C</text>
  <line x1="278" y1="115" x2="292" y2="115" stroke="#4fc3f7" stroke-width="2"/>
  <text x="300" y="115" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ff6b35">C</text>
  <line x1="308" y1="115" x2="322" y2="115" stroke="#4fc3f7" stroke-width="2"/>
  <text x="330" y="115" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ff6b35">C</text>
  <!-- Branch going up -->
  <line x1="300" y1="108" x2="300" y2="100" stroke="#4fc3f7" stroke-width="2"/>
  <text x="300" y="93" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ff6b35">C</text>
  <text x="300" y="133" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">CH₃CH(CH₃)CH₃</text>

  <!-- C₃H₈O example -->
  <text x="200" y="148" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">C₃H₈O — two isomers</text>

  <!-- Propanol -->
  <rect x="30" y="162" width="160" height="42" rx="6" ry="6" stroke="#81c784" stroke-width="1" fill="none"/>
  <text x="110" y="176" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" fill="#81c784">Propanol</text>
  <text x="110" y="194" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">CH₃CH₂CH₂OH</text>

  <!-- Methoxyethane -->
  <rect x="210" y="162" width="160" height="42" rx="6" ry="6" stroke="#ef5350" stroke-width="1" fill="none"/>
  <text x="290" y="176" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" fill="#ef5350">Methoxyethane</text>
  <text x="290" y="194" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">CH₃OCH₂CH₃</text>

  <!-- Key points -->
  <text x="200" y="226" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#ffb74d">Key points</text>
  <text x="200" y="246" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Same atoms, arranged differently</text>
  <text x="200" y="264" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Different physical properties (bp, solubility)</text>
  <text x="200" y="282" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Longer chains = higher boiling points</text>
</svg>