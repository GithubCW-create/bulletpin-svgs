<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">pH Titration Curve</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Adding alkali to acid</text>

  <!--
    pH TITRATION CURVE
    ====================
    Strong acid + strong alkali (e.g. HCl + NaOH).
    pH starts low (~1), gradual rise, sharp vertical jump at equivalence (~pH 7),
    then levels off high (~13).
    Axis standards: label 20px from axis line.
  -->

  <!-- Axes -->
  <line x1="60" y1="230" x2="360" y2="230" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="60" y1="230" x2="60" y2="55" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <polygon points="360,230 350,226 350,234" fill="#4fc3f7"/>
  <polygon points="60,55 56,65 64,65" fill="#4fc3f7"/>

  <text x="40" y="140" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffffff" transform="rotate(-90 40 140)">pH</text>
  <text x="210" y="250" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffffff">Volume of alkali added (cm³)</text>

  <!-- pH scale markers on y-axis -->
  <text x="52" y="218" text-anchor="end" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">1</text>
  <line x1="57" y1="218" x2="63" y2="218" stroke="#ffffff" stroke-width="0.5" opacity="0.5"/>
  <text x="52" y="140" text-anchor="end" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">7</text>
  <line x1="57" y1="140" x2="340" y2="140" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.2"/>
  <text x="52" y="75" text-anchor="end" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">13</text>
  <line x1="57" y1="75" x2="63" y2="75" stroke="#ffffff" stroke-width="0.5" opacity="0.5"/>

  <!-- Titration curve -->
  <path d="M 70,218 C 90,218 130,215 160,212 C 180,210 190,205 195,195 C 198,180 200,155 200,140 C 200,125 202,100 205,85 C 210,78 220,76 240,76 C 280,76 320,76 340,76" stroke="#ef5350" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Equivalence point marker -->
  <line x1="200" y1="230" x2="200" y2="135" stroke="#81c784" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>
  <text x="200" y="265" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">equivalence point</text>

  <!-- Annotations -->
  <text x="110" y="200" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff" opacity="0.7">acidic</text>
  <text x="290" y="68" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff" opacity="0.7">alkaline</text>
</svg>
