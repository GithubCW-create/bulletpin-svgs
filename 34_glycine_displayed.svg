<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Displayed Formula — Glycine</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">NH₂CH₂COOH (amino acid)</text>

  <!--
    GLYCINE DISPLAYED FORMULA
    =========================
    Backbone at y=100 (rule: displayed formula backbone y=100).
    N(130,100) — C(200,100) — C(270,100). 70px backbone spacing.
    Top side-atoms at y=58 (42px above backbone). Bottom at y=142.
    Bond gap: 12px from each atom centre.
  -->

  <!-- Atom labels -->
  <text x="130" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#81c784">N</text>
  <text x="200" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ff6b35">C</text>
  <text x="270" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ff6b35">C</text>

  <!-- H atoms on N -->
  <text x="130" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="130" y="142" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>

  <!-- H atoms on C1 -->
  <text x="200" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="200" y="142" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>

  <!-- O (double bond, above C2) -->
  <text x="270" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffb74d">O</text>

  <!-- O—H (below C2) -->
  <text x="270" y="142" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffb74d">O</text>
  <text x="312" y="142" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>

  <!-- Bonds: backbone N—C—C -->
  <line x1="142" y1="100" x2="188" y2="100" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="212" y1="100" x2="258" y2="100" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>

  <!-- Bonds: N—H up and down -->
  <line x1="130" y1="88" x2="130" y2="70" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="130" y1="112" x2="130" y2="130" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>

  <!-- Bonds: C1—H up and down -->
  <line x1="200" y1="88" x2="200" y2="70" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="200" y1="112" x2="200" y2="130" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>

  <!-- Bond: C2=O up (double bond — two parallel vertical lines 4px apart) -->
  <line x1="268" y1="88" x2="268" y2="70" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="272" y1="88" x2="272" y2="70" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>

  <!-- Bond: C2—O down -->
  <line x1="270" y1="112" x2="270" y2="130" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>

  <!-- Bond: O—H right -->
  <line x1="282" y1="142" x2="300" y2="142" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>

  <!-- Functional group highlights -->
  <!-- Amine group —NH₂ -->
  <rect x="108" y="45" width="44" height="110" rx="6" ry="6" stroke="#81c784" stroke-width="1.5" stroke-dasharray="4 3" fill="none"/>
  <text x="130" y="170" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#81c784">amine (—NH₂)</text>

  <!-- Carboxyl group —COOH -->
  <rect x="248" y="45" width="78" height="110" rx="6" ry="6" stroke="#81c784" stroke-width="1.5" stroke-dasharray="4 3" fill="none"/>
  <text x="287" y="170" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#81c784">carboxyl (—COOH)</text>
</svg>
