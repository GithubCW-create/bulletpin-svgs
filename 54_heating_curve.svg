<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Heating Curve</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Temperature change during heating</text>

  <!--
    HEATING CURVE (FIXED)
    =====================
    Fixes: "Solid" and "Liquid" shifted right (off red lines).
    mp/bp labels moved to right side of graph on the dashed lines.
    Dashed lines extended across full graph width.
  -->

  <!-- Axes -->
  <line x1="60" y1="230" x2="360" y2="230" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="60" y1="230" x2="60" y2="50" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>

  <!-- Axis arrows -->
  <polygon points="360,230 350,226 350,234" fill="#4fc3f7"/>
  <polygon points="60,50 56,60 64,60" fill="#4fc3f7"/>

  <!-- Axis labels (20px from axis line) -->
  <text x="40" y="140" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffffff" transform="rotate(-90 40 140)">Temperature (°C)</text>
  <text x="210" y="250" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffffff">Time</text>

  <!-- Melting point dashed line — extends across full graph -->
  <line x1="60" y1="190" x2="350" y2="190" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>
  <!-- Boiling point dashed line — extends across full graph -->
  <line x1="60" y1="130" x2="350" y2="130" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>

  <!-- Temperature labels on right side of graph -->
  <text x="355" y="190" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">mp</text>
  <text x="355" y="130" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">bp</text>

  <!-- Heating curve: 5 segments -->
  <!-- Segment 1: Solid heating (60,220) → (110,190) -->
  <line x1="60" y1="220" x2="110" y2="190" stroke="#ef5350" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Segment 2: Melting (flat) (110,190) → (170,190) -->
  <line x1="110" y1="190" x2="170" y2="190" stroke="#ef5350" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Segment 3: Liquid heating (170,190) → (230,130) -->
  <line x1="170" y1="190" x2="230" y2="130" stroke="#ef5350" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Segment 4: Boiling (flat) (230,130) → (300,130) -->
  <line x1="230" y1="130" x2="300" y2="130" stroke="#ef5350" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Segment 5: Gas heating (300,130) → (340,90) -->
  <line x1="300" y1="130" x2="340" y2="90" stroke="#ef5350" stroke-width="2.5" stroke-linecap="round"/>

  <!-- State labels — shifted right to clear the red lines -->
  <text x="100" y="210" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#81c784">Solid</text>
  <text x="140" y="178" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#81c784">Melting</text>
  <text x="215" y="165" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#81c784">Liquid</text>
  <text x="265" y="118" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#81c784">Boiling</text>
  <text x="330" y="78" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#81c784">Gas</text>

  <!-- Key -->
  <text x="200" y="272" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">Flat sections = energy used to break bonds (no temp. change)</text>
</svg>
