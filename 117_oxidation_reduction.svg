<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Oxidation and Reduction</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Electron transfer in reactions</text>

  <!-- OIL RIG mnemonic — visual layout -->
  <!-- Oxidation side -->
  <rect x="30" y="60" width="160" height="100" rx="8" ry="8" stroke="#ef5350" stroke-width="2" fill="none"/>
  <text x="110" y="80" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ef5350">OXIDATION</text>
  <text x="110" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">Loss of electrons</text>
  <text x="110" y="118" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">Gain of oxygen</text>
  <text x="110" y="136" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">Loss of hydrogen</text>
  <text x="110" y="152" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ef5350">OIL</text>

  <!-- Reduction side -->
  <rect x="210" y="60" width="160" height="100" rx="8" ry="8" stroke="#81c784" stroke-width="2" fill="none"/>
  <text x="290" y="80" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#81c784">REDUCTION</text>
  <text x="290" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">Gain of electrons</text>
  <text x="290" y="118" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">Loss of oxygen</text>
  <text x="290" y="136" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">Gain of hydrogen</text>
  <text x="290" y="152" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">RIG</text>

  <!-- Electron arrow between boxes -->
  <line x1="190" y1="100" x2="210" y2="100" stroke="#ffb74d" stroke-width="2" stroke-linecap="round"/>
  <text x="200" y="90" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffb74d">e⁻</text>

  <!-- Example -->
  <text x="200" y="185" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#4fc3f7">Example: 2Na + Cl₂ → 2NaCl</text>

  <text x="110" y="210" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ef5350">Na → Na⁺ + e⁻</text>
  <text x="110" y="226" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">Na is oxidised</text>

  <text x="290" y="210" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#81c784">Cl₂ + 2e⁻ → 2Cl⁻</text>
  <text x="290" y="226" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">Cl is reduced</text>
</svg>