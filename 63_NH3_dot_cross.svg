<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Dot-and-Cross — Ammonia (NH₃)</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Three single covalent bonds</text>

  <!--
    NH₃ DOT-AND-CROSS
    ==================
    N at centre (200,80). H(a) at (164,80), H(b) at (236,80), H(c) at (200,116).
    36px between N and each H.
    3 shared pairs + 1 lone pair on N (top).
    × = N electron (#81c784). • = H electron (#ffffff).
    N is 1-char: ±14 top/bottom, ±16 left/right.
  -->

  <!-- Atom labels -->
  <text x="164" y="80" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">H</text>
  <text x="200" y="80" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#81c784">N</text>
  <text x="236" y="80" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">H</text>
  <text x="200" y="116" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">H</text>

  <!-- Left shared pair: between H(a)(164) and N(200), midpoint x=182 -->
  <circle cx="178" cy="80" r="3" fill="#ffffff"/>
  <text x="186" y="81" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#81c784">×</text>

  <!-- Right shared pair: between N(200) and H(b)(236), midpoint x=218 -->
  <text x="214" y="81" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#81c784">×</text>
  <circle cx="222" cy="80" r="3" fill="#ffffff"/>

  <!-- Bottom shared pair: between N(200,80) and H(c)(200,116), midpoint y=98 -->
  <text x="196" y="99" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#81c784">×</text>
  <circle cx="204" cy="98" r="3" fill="#ffffff"/>

  <!-- N lone pair (top): y=80-14=66, x=200±4 -->
  <text x="196" y="67" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#81c784">×</text>
  <text x="204" y="67" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#81c784">×</text>

  <!-- Key -->
  <text x="176" y="148" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#81c784">×</text>
  <text x="200" y="148" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">= N electron</text>
  <circle cx="176" cy="163" r="3" fill="#ffffff"/>
  <text x="200" y="163" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">= H electron</text>
</svg>
