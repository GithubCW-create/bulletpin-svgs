<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Alkanes — Homologous Series</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">CₙH₂ₙ₊₂ — saturated hydrocarbons</text>

  <!-- Header row — centralised tight columns -->
  <text x="135" y="60" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Name</text>
  <text x="195" y="60" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Formula</text>
  <text x="240" y="60" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">C</text>
  <text x="275" y="60" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">State</text>

  <line x1="100" y1="72" x2="310" y2="72" stroke="#4fc3f7" stroke-width="1" opacity="0.4"/>

  <!-- Methane -->
  <text x="135" y="92" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">Methane</text>
  <text x="195" y="92" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ff6b35">CH₄</text>
  <text x="240" y="92" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">1</text>
  <text x="275" y="92" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#81c784">Gas</text>

  <line x1="100" y1="106" x2="310" y2="106" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>

  <!-- Ethane -->
  <text x="135" y="120" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">Ethane</text>
  <text x="195" y="120" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ff6b35">C₂H₆</text>
  <text x="240" y="120" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">2</text>
  <text x="275" y="120" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#81c784">Gas</text>

  <line x1="100" y1="134" x2="310" y2="134" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>

  <!-- Propane -->
  <text x="135" y="148" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">Propane</text>
  <text x="195" y="148" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ff6b35">C₃H₈</text>
  <text x="240" y="148" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">3</text>
  <text x="275" y="148" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#81c784">Gas</text>

  <line x1="100" y1="162" x2="310" y2="162" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>

  <!-- Butane -->
  <text x="135" y="176" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">Butane</text>
  <text x="195" y="176" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ff6b35">C₄H₁₀</text>
  <text x="240" y="176" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">4</text>
  <text x="275" y="176" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#81c784">Gas</text>

  <!-- Properties -->
  <text x="200" y="210" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">As chain length increases: boiling point ↑ viscosity ↑</text>
  <text x="200" y="225" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">All have single C—C bonds only (saturated)</text>
</svg>