<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Alloys</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Mixtures of metals (or metal + non-metal)</text>

  <!-- Pure metal diagram — regular circles -->
  <text x="105" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Pure Metal</text>
  <!-- Row 1 -->
  <circle cx="70" cy="78" r="10" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <circle cx="92" cy="78" r="10" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <circle cx="114" cy="78" r="10" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <circle cx="136" cy="78" r="10" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <!-- Row 2 -->
  <circle cx="70" cy="100" r="10" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <circle cx="92" cy="100" r="10" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <circle cx="114" cy="100" r="10" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <circle cx="136" cy="100" r="10" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <!-- Row 3 -->
  <circle cx="70" cy="122" r="10" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <circle cx="92" cy="122" r="10" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <circle cx="114" cy="122" r="10" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <circle cx="136" cy="122" r="10" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>

  <!-- Arrow showing sliding -->
  <line x1="65" y1="140" x2="140" y2="140" stroke="#ef5350" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="140,140 134,137 134,143" fill="#ef5350"/>
  <text x="105" y="155" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ef5350">Layers slide easily</text>

  <!-- Alloy diagram — mixed sizes -->
  <text x="295" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#ffb74d">Alloy</text>
  <!-- Row 1 -->
  <circle cx="260" cy="78" r="10" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <circle cx="282" cy="80" r="7" fill="none" stroke="#ff6b35" stroke-width="1.5"/>
  <circle cx="302" cy="78" r="10" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <circle cx="324" cy="78" r="10" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <!-- Row 2 -->
  <circle cx="260" cy="100" r="10" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <circle cx="282" cy="100" r="10" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <circle cx="304" cy="102" r="7" fill="none" stroke="#ff6b35" stroke-width="1.5"/>
  <circle cx="324" cy="100" r="10" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <!-- Row 3 -->
  <circle cx="260" cy="122" r="10" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <circle cx="282" cy="122" r="10" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <circle cx="304" cy="122" r="10" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <circle cx="326" cy="124" r="7" fill="none" stroke="#ff6b35" stroke-width="1.5"/>

  <text x="295" y="155" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#81c784">Different sizes prevent sliding</text>

  <!-- Why alloys are harder -->
  <text x="200" y="180" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#ffffff">Alloys are harder than pure metals</text>
  <text x="200" y="196" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Different-sized atoms distort the regular layers</text>

  <!-- Examples -->
  <text x="200" y="220" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#ffb74d">Examples</text>
  <text x="105" y="240" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Steel = iron + carbon</text>
  <text x="295" y="240" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Bronze = copper + tin</text>
  <text x="105" y="256" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Brass = copper + zinc</text>
  <text x="295" y="256" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Gold alloys = gold + copper/silver</text>
</svg>