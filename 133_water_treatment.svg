<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Water Treatment</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Making water safe to drink (potable water)</text>

  <!-- Flow diagram — vertical, centred -->
  <!-- Step 1 -->
  <rect x="100" y="52" width="200" height="28" rx="6" ry="6" stroke="#4fc3f7" stroke-width="1.5" fill="none"/>
  <text x="200" y="66" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Sedimentation — solids settle</text>
  <line x1="200" y1="80" x2="200" y2="92" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="200,92 196,86 204,86" fill="#4fc3f7"/>

  <!-- Step 2 -->
  <rect x="100" y="92" width="200" height="28" rx="6" ry="6" stroke="#4fc3f7" stroke-width="1.5" fill="none"/>
  <text x="200" y="106" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Filtration — removes fine particles</text>
  <line x1="200" y1="120" x2="200" y2="132" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="200,132 196,126 204,126" fill="#4fc3f7"/>

  <!-- Step 3 -->
  <rect x="100" y="132" width="200" height="28" rx="6" ry="6" stroke="#81c784" stroke-width="1.5" fill="none"/>
  <text x="200" y="146" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Chlorination — kills bacteria</text>

  <!-- Potable water note -->
  <text x="200" y="178" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Potable water</text>
  <text x="200" y="194" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Safe to drink — low levels of dissolved</text>
  <text x="200" y="208" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">substances and microbes (not pure water)</text>

  <!-- Desalination -->
  <text x="200" y="232" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#ffb74d">Desalination (sea water)</text>
  <text x="200" y="248" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Distillation or reverse osmosis</text>
  <text x="200" y="264" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ef5350">Energy-intensive → expensive</text>
</svg>