<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Balancing Equations</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Same number of each atom on both sides</text>

  <!-- Steps box -->
  <rect x="70" y="52" width="260" height="56" rx="6" ry="6" stroke="#4fc3f7" stroke-width="1.5" fill="none"/>
  <text x="200" y="64" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" fill="#4fc3f7">Steps</text>
  <text x="200" y="78" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">1. Write word equation → symbol equation</text>
  <text x="200" y="92" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">2. Count atoms each side → add coefficients</text>

  <!-- Worked example -->
  <text x="200" y="122" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#81c784">Worked example</text>

  <!-- Unbalanced -->
  <text x="80" y="142" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ef5350">Unbalanced:</text>
  <text x="250" y="142" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffffff">Mg + O₂ → MgO</text>

  <!-- Count -->
  <text x="200" y="162" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffb74d">Left: 1 Mg, 2 O  |  Right: 1 Mg, 1 O ✗</text>

  <!-- Balanced -->
  <text x="80" y="186" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Balanced:</text>
  <text x="250" y="186" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">2Mg + O₂ → 2MgO</text>

  <!-- Count -->
  <text x="200" y="206" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffb74d">Left: 2 Mg, 2 O  |  Right: 2 Mg, 2 O ✓</text>

  <!-- Key rules -->
  <text x="200" y="232" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Key rules</text>
  <text x="200" y="250" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Only change coefficients (big numbers in front)</text>
  <text x="200" y="266" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">NEVER change subscripts (small numbers)</text>
  <text x="200" y="282" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">State symbols: (s) (l) (g) (aq)</text>
</svg>