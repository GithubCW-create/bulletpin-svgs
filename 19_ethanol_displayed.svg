<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Displayed Formula — Ethanol</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">C₂H₅OH</text>

  <!--
    DISPLAYED FORMULA GRID STANDARD
    ================================
    Bond gap from atom centre: 12px on ALL sides (uniform)
    C1 (methyl): x=130, y=90
    C2: x=190, y=90
    O: x=250, y=90
    H spacing: 42px from bonded atom centre
  -->

  <!-- C1—C2 bond: 130+12=142 to 190-12=178 -->
  <line x1="142" y1="90" x2="178" y2="90" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
  <!-- C2—O bond: 190+12=202 to 250-12=238 -->
  <line x1="202" y1="90" x2="238" y2="90" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
  <!-- O—H bond: 250+12=262 to 292-12=280 -->
  <line x1="262" y1="90" x2="280" y2="90" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>

  <!-- C1—H left: 130-12=118 to 88+12=100 -->
  <line x1="118" y1="90" x2="100" y2="90" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
  <!-- C1—H top: 90-12=78 to 48+12=60 -->
  <line x1="130" y1="78" x2="130" y2="60" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
  <!-- C1—H bottom: 90+12=102 to 132-12=120 -->
  <line x1="130" y1="102" x2="130" y2="120" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
  <!-- C2—H top -->
  <line x1="190" y1="78" x2="190" y2="60" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
  <!-- C2—H bottom -->
  <line x1="190" y1="102" x2="190" y2="120" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Atom labels -->
  <text x="130" y="90" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#ff6b35">C</text>
  <text x="190" y="90" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#ff6b35">C</text>
  <text x="250" y="90" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffb74d">O</text>
  <text x="88" y="90" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="130" y="48" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="130" y="132" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="190" y="48" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="190" y="132" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="292" y="90" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>

  <!-- Functional group highlight: —OH -->
  <rect x="236" y="77" width="70" height="26" rx="6" fill="none" stroke="#81c784" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="271" y="115" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#81c784">—OH</text>
</svg>
