<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Group 1 — Alkali Metals</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Li, Na, K, Rb, Cs, Fr</text>

  <!-- Properties box — text shifted up 4px to centre in box -->
  <rect x="60" y="52" width="280" height="68" rx="8" ry="8" stroke="#4fc3f7" stroke-width="1.5" fill="none"/>
  <text x="200" y="64" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Properties</text>
  <text x="200" y="80" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Soft metals, low density, low melting points</text>
  <text x="200" y="94" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">1 outer electron → lose it easily → form +1 ions</text>
  <text x="200" y="108" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Stored in oil (react with air and water)</text>

  <!-- Trend arrow — shifted right -->
  <line x1="75" y1="140" x2="75" y2="240" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <polygon points="75,240 71,232 79,232" fill="#ffffff"/>
  <text x="75" y="133" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">Down</text>
  <text x="75" y="252" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">group</text>

  <!-- Trends -->
  <text x="110" y="155" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ef5350">Reactivity increases ↑</text>
  <text x="110" y="175" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#81c784">Melting point decreases ↓</text>
  <text x="110" y="195" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffb74d">Density increases ↑</text>
  <text x="110" y="215" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Outer electron further → lost more easily</text>

  <!-- Reaction with water -->
  <text x="200" y="245" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Reaction with water</text>
  <text x="200" y="262" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">2Na + 2H₂O → 2NaOH + H₂</text>
  <text x="200" y="278" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Metal hydroxide (alkaline) + hydrogen gas</text>
</svg>