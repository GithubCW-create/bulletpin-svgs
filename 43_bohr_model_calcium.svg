<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Bohr Model — Calcium</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Ca (atomic number 20)</text>

  <!--
    BOHR MODEL CALCIUM
    ==================
    Electron config: 2, 8, 8, 2
    Nucleus at (200,155). 4 shells: r=25/45/65/85.
    Shell 4 has 2 electrons: 1 pair at top.
  -->

  <!-- Shells -->
  <circle cx="200" cy="155" r="25" stroke="#81c784" stroke-width="1" fill="none"/>
  <circle cx="200" cy="155" r="45" stroke="#81c784" stroke-width="1" fill="none"/>
  <circle cx="200" cy="155" r="65" stroke="#81c784" stroke-width="1" fill="none"/>
  <circle cx="200" cy="155" r="85" stroke="#81c784" stroke-width="1" fill="none"/>

  <!-- Nucleus -->
  <circle cx="200" cy="155" r="16" fill="#ff6b35"/>
  <text x="200" y="155" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Ca</text>

  <!-- Shell 1: 2 electrons — 1 pair at top -->
  <circle cx="196" cy="130" r="4" fill="#4fc3f7"/>
  <circle cx="204" cy="130" r="4" fill="#4fc3f7"/>

  <!-- Shell 2: 8 electrons — 4 pairs at compass points -->
  <circle cx="196" cy="110" r="4" fill="#4fc3f7"/>
  <circle cx="204" cy="110" r="4" fill="#4fc3f7"/>
  <circle cx="245" cy="151" r="4" fill="#4fc3f7"/>
  <circle cx="245" cy="159" r="4" fill="#4fc3f7"/>
  <circle cx="196" cy="200" r="4" fill="#4fc3f7"/>
  <circle cx="204" cy="200" r="4" fill="#4fc3f7"/>
  <circle cx="155" cy="151" r="4" fill="#4fc3f7"/>
  <circle cx="155" cy="159" r="4" fill="#4fc3f7"/>

  <!-- Shell 3: 8 electrons — 4 pairs at compass points -->
  <circle cx="196" cy="90" r="4" fill="#4fc3f7"/>
  <circle cx="204" cy="90" r="4" fill="#4fc3f7"/>
  <circle cx="265" cy="151" r="4" fill="#4fc3f7"/>
  <circle cx="265" cy="159" r="4" fill="#4fc3f7"/>
  <circle cx="196" cy="220" r="4" fill="#4fc3f7"/>
  <circle cx="204" cy="220" r="4" fill="#4fc3f7"/>
  <circle cx="135" cy="151" r="4" fill="#4fc3f7"/>
  <circle cx="135" cy="159" r="4" fill="#4fc3f7"/>

  <!-- Shell 4: 2 electrons — 1 pair at top -->
  <circle cx="196" cy="70" r="4" fill="#4fc3f7"/>
  <circle cx="204" cy="70" r="4" fill="#4fc3f7"/>

  <!-- Electron configuration -->
  <text x="200" y="258" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#ffffff">2, 8, 8, 2</text>
</svg>
