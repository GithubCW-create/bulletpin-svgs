<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">The Haber Process</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">N₂ + 3H₂ ⇌ 2NH₃</text>

  <!--
    HABER PROCESS DIAGRAM
    ======================
    Flow diagram showing inputs, reaction vessel, and outputs.
    Conditions: 450°C, 200 atm, iron catalyst.
  -->

  <!-- Input arrows (left side) -->
  <text x="45" y="85" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#4fc3f7">N₂</text>
  <line x1="70" y1="85" x2="120" y2="85" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <polygon points="120,85 112,81 112,89" fill="#4fc3f7"/>

  <text x="45" y="115" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#81c784">3H₂</text>
  <line x1="70" y1="115" x2="120" y2="115" stroke="#81c784" stroke-width="2" stroke-linecap="round"/>
  <polygon points="120,115 112,111 112,119" fill="#81c784"/>

  <!-- Reaction vessel -->
  <rect x="125" y="60" width="100" height="80" rx="10" ry="10" stroke="#ffb74d" stroke-width="2.5" fill="none"/>
  <text x="175" y="88" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffb74d">Reaction</text>
  <text x="175" y="104" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffb74d">vessel</text>

  <!-- Output arrow (right) -->
  <line x1="230" y1="100" x2="280" y2="100" stroke="#ef5350" stroke-width="2" stroke-linecap="round"/>
  <polygon points="280,100 272,96 272,104" fill="#ef5350"/>

  <!-- Condenser -->
  <rect x="285" y="72" width="70" height="56" rx="8" ry="8" stroke="#4fc3f7" stroke-width="2" fill="none"/>
  <text x="320" y="93" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#4fc3f7">Condenser</text>
  <text x="320" y="106" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#4fc3f7">(cooled)</text>

  <!-- NH₃ output (down from condenser) -->
  <line x1="320" y1="128" x2="320" y2="165" stroke="#ef5350" stroke-width="2" stroke-linecap="round"/>
  <polygon points="320,165 316,157 324,157" fill="#ef5350"/>
  <text x="320" y="180" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#ef5350">NH₃</text>
  <text x="320" y="195" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Liquid ammonia</text>

  <!-- Recycled unreacted gases (loop back from condenser to vessel) -->
  <path d="M 355,85 L 375,85 L 375,45 L 175,45 L 175,60" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-dasharray="5 3"/>
  <polygon points="175,60 171,52 179,52" fill="#ffffff"/>
  <!-- Label below the dotted line to avoid overlapping other text -->
  <text x="275" y="54" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">Unreacted N₂ + H₂ recycled</text>

  <!-- Conditions box -->
  <rect x="100" y="155" width="160" height="55" rx="6" ry="6" stroke="#81c784" stroke-width="1.5" stroke-dasharray="4 3" fill="none"/>
  <text x="180" y="168" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#81c784">Conditions</text>
  <text x="180" y="183" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">450°C   •   200 atm</text>
  <text x="180" y="198" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Iron catalyst</text>

  <!-- Reversible reaction note -->
  <text x="200" y="230" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Reversible reaction — compromise conditions</text>
</svg>