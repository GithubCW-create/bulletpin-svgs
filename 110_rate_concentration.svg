<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Effect of Concentration on Rate</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Volume of gas vs time at different concentrations</text>

  <!-- Axes -->
  <line x1="60" y1="230" x2="360" y2="230" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="60" y1="230" x2="60" y2="55" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <polygon points="360,230 350,226 350,234" fill="#4fc3f7"/>
  <polygon points="60,55 56,65 64,65" fill="#4fc3f7"/>

  <text x="40" y="140" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffffff" transform="rotate(-90 40 140)">Volume of gas (cm³)</text>
  <text x="210" y="250" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffffff">Time (s)</text>

  <!-- Higher concentration — steeper, reaches plateau sooner, same final volume -->
  <path d="M 70,230 C 90,230 110,100 150,82 C 180,72 220,70 340,70" stroke="#ef5350" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Lower concentration — gentler, same final volume -->
  <path d="M 70,230 C 100,230 140,170 190,110 C 230,80 280,72 340,70" stroke="#81c784" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Labels -->
  <text x="155" y="62" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ef5350">Higher concentration</text>
  <text x="245" y="95" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Lower concentration</text>

  <!-- Same final volume -->
  <text x="350" y="55" text-anchor="end" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">Same final volume</text>

  <!-- Key -->
  <line x1="80" y1="270" x2="100" y2="270" stroke="#ef5350" stroke-width="2.5" stroke-linecap="round"/>
  <text x="108" y="270" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">Higher conc.</text>
  <line x1="220" y1="270" x2="240" y2="270" stroke="#81c784" stroke-width="2.5" stroke-linecap="round"/>
  <text x="248" y="270" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">Lower conc.</text>
</svg>