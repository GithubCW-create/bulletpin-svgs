<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Atmospheric Pollutants</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">From burning fossil fuels</text>

  <!-- Table — centralised tight columns -->
  <text x="110" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Pollutant</text>
  <text x="210" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Source</text>
  <text x="320" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Problem</text>
  <line x1="60" y1="70" x2="370" y2="70" stroke="#4fc3f7" stroke-width="1" opacity="0.4"/>

  <!-- CO -->
  <text x="110" y="88" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ef5350">Carbon monoxide</text>
  <text x="110" y="101" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ef5350">(CO)</text>
  <text x="210" y="94" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">Incomplete</text>
  <text x="210" y="106" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">combustion</text>
  <text x="320" y="94" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">Toxic — binds to</text>
  <text x="320" y="106" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">haemoglobin</text>
  <line x1="60" y1="116" x2="370" y2="116" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>

  <!-- Soot -->
  <text x="110" y="132" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ef5350">Soot (carbon)</text>
  <text x="210" y="132" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">Incomplete</text>
  <text x="210" y="144" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">combustion</text>
  <text x="320" y="132" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">Global dimming,</text>
  <text x="320" y="144" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">lung damage</text>
  <line x1="60" y1="154" x2="370" y2="154" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>

  <!-- SO2 -->
  <text x="110" y="170" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ef5350">Sulfur dioxide</text>
  <text x="110" y="183" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ef5350">(SO₂)</text>
  <text x="210" y="176" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">Burning fuels</text>
  <text x="210" y="188" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">with sulfur</text>
  <text x="320" y="176" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">Acid rain —</text>
  <text x="320" y="188" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">damages buildings</text>
  <line x1="60" y1="198" x2="370" y2="198" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>

  <!-- NOx -->
  <text x="110" y="214" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ef5350">Nitrogen oxides</text>
  <text x="110" y="227" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ef5350">(NOx)</text>
  <text x="210" y="220" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">High temp in</text>
  <text x="210" y="232" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">engines</text>
  <text x="320" y="220" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">Acid rain, smog,</text>
  <text x="320" y="232" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">breathing problems</text>

  <!-- Reduction -->
  <text x="200" y="260" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Catalytic converters reduce CO and NOx in car exhausts</text>
  <text x="200" y="276" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">2CO + 2NO → 2CO₂ + N₂</text>
</svg>