<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="200" y="18" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">Reactivity Series</text>

  <!-- Gradient background for metals column — narrower, tight to content -->
  <defs>
    <linearGradient id="rg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef5350" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#81c784" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4fc3f7" stop-opacity="0.08"/>
    </linearGradient>
  </defs>
  <rect x="8" y="32" width="168" height="260" rx="10" fill="url(#rg)" stroke="#333" stroke-width="1"/>

  <!-- Arrow pointing UP — arrowhead at TOP (more reactive = top). Line starts at arrowhead BASE. -->
  <line x1="22" y1="48" x2="22" y2="280" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <polygon points="22,38 18,48 26,48" fill="#fff" opacity="0.5"/>
  <text x="14" y="162" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff" transform="rotate(-90 14 162)" opacity="0.6">MORE REACTIVE</text>

  <!-- Metal rows — tight, no wasted space -->
  <rect x="34" y="38" width="34" height="22" rx="5" fill="#ef5350"/>
  <text x="51" y="49" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">K</text>
  <text x="74" y="49" text-anchor="start" dominant-baseline="central" font-family="Arial, sans-serif" font-size="13" fill="#fff">Potassium</text>

  <rect x="34" y="62" width="34" height="22" rx="5" fill="#ef5350"/>
  <text x="51" y="73" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">Na</text>
  <text x="74" y="73" text-anchor="start" dominant-baseline="central" font-family="Arial, sans-serif" font-size="13" fill="#fff">Sodium</text>

  <rect x="34" y="86" width="34" height="22" rx="5" fill="#ff9800"/>
  <text x="51" y="97" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">Ca</text>
  <text x="74" y="97" text-anchor="start" dominant-baseline="central" font-family="Arial, sans-serif" font-size="13" fill="#fff">Calcium</text>

  <rect x="34" y="110" width="34" height="22" rx="5" fill="#ff9800"/>
  <text x="51" y="121" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">Mg</text>
  <text x="74" y="121" text-anchor="start" dominant-baseline="central" font-family="Arial, sans-serif" font-size="13" fill="#fff">Magnesium</text>

  <rect x="34" y="134" width="34" height="22" rx="5" fill="#81c784"/>
  <text x="51" y="145" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Al</text>
  <text x="74" y="145" text-anchor="start" dominant-baseline="central" font-family="Arial, sans-serif" font-size="13" fill="#fff">Aluminium</text>

  <!-- Carbon divider -->
  <text x="34" y="163" text-anchor="start" dominant-baseline="central" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Carbon</text>
  <line x1="78" y1="163" x2="170" y2="163" stroke="#4fc3f7" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.5"/>

  <rect x="34" y="172" width="34" height="22" rx="5" fill="#81c784"/>
  <text x="51" y="183" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Zn</text>
  <text x="74" y="183" text-anchor="start" dominant-baseline="central" font-family="Arial, sans-serif" font-size="13" fill="#fff">Zinc</text>

  <rect x="34" y="196" width="34" height="22" rx="5" fill="#81c784"/>
  <text x="51" y="207" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Fe</text>
  <text x="74" y="207" text-anchor="start" dominant-baseline="central" font-family="Arial, sans-serif" font-size="13" fill="#fff">Iron</text>

  <!-- Hydrogen divider -->
  <text x="34" y="225" text-anchor="start" dominant-baseline="central" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Hydrogen</text>
  <line x1="92" y1="225" x2="170" y2="225" stroke="#4fc3f7" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.5"/>

  <rect x="34" y="234" width="34" height="22" rx="5" fill="#4fc3f7"/>
  <text x="51" y="245" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Cu</text>
  <text x="74" y="245" text-anchor="start" dominant-baseline="central" font-family="Arial, sans-serif" font-size="13" fill="#fff">Copper</text>

  <rect x="34" y="258" width="34" height="22" rx="5" fill="#4fc3f7"/>
  <text x="51" y="269" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Ag</text>
  <text x="74" y="269" text-anchor="start" dominant-baseline="central" font-family="Arial, sans-serif" font-size="13" fill="#fff">Silver · Gold</text>

  <!-- Extraction cards — right side, starts at x=184, fills to x=392. Three cards evenly distributed from y=32 to y=292 (260px total, 3 cards = ~82px each with 7px gaps) -->
  <rect x="184" y="32" width="208" height="80" rx="10" fill="#ef535018" stroke="#ef5350" stroke-width="1.5"/>
  <text x="288" y="52" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ef5350">Electrolysis</text>
  <text x="288" y="72" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="13" fill="#ccc">Too reactive for</text>
  <text x="288" y="90" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="13" fill="#ccc">carbon reduction</text>

  <rect x="184" y="122" width="208" height="80" rx="10" fill="#81c78418" stroke="#81c784" stroke-width="1.5"/>
  <text x="288" y="142" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#81c784">Carbon Reduction</text>
  <text x="288" y="162" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="13" fill="#ccc">Heated with carbon</text>
  <text x="288" y="180" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="13" fill="#ccc">in a blast furnace</text>

  <rect x="184" y="212" width="208" height="80" rx="10" fill="#4fc3f718" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="288" y="232" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#4fc3f7">Found Native</text>
  <text x="288" y="252" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="13" fill="#ccc">Unreactive — found</text>
  <text x="288" y="270" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="13" fill="#ccc">as pure metal</text>
</svg>