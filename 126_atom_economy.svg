<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Atom Economy</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">How much of the reactants become useful product</text>

  <!-- Formula box -->
  <rect x="40" y="52" width="320" height="42" rx="8" ry="8" stroke="#4fc3f7" stroke-width="2" fill="none"/>
  <text x="200" y="66" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">Atom economy =</text>
  <line x1="90" y1="80" x2="310" y2="80" stroke="#4fc3f7" stroke-width="1"/>
  <text x="200" y="74" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Mr of desired product</text>
  <text x="200" y="88" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Sum of Mr of all products</text>
  <text x="330" y="74" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">× 100</text>

  <!-- High atom economy -->
  <rect x="25" y="108" width="165" height="80" rx="6" ry="6" stroke="#81c784" stroke-width="1.5" fill="none"/>
  <text x="107" y="124" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#81c784">High (100%)</text>
  <text x="107" y="142" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Only one product</text>
  <text x="107" y="157" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">No waste</text>
  <text x="107" y="175" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffb74d">e.g. addition reactions</text>

  <!-- Low atom economy -->
  <rect x="210" y="108" width="165" height="80" rx="6" ry="6" stroke="#ef5350" stroke-width="1.5" fill="none"/>
  <text x="292" y="124" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#ef5350">Low (&lt;100%)</text>
  <text x="292" y="142" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Multiple products</text>
  <text x="292" y="157" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">By-products = waste</text>
  <text x="292" y="175" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffb74d">e.g. substitution reactions</text>

  <!-- Example -->
  <text x="200" y="208" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Example</text>
  <text x="200" y="226" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">CaCO₃ → CaO + CO₂</text>
  <text x="200" y="244" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Desired: CaO (Mr = 56)</text>
  <text x="200" y="260" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">All products: 56 + 44 = 100</text>
  <text x="200" y="276" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffb74d">Atom economy = 56 ÷ 100 × 100 = 56%</text>
</svg>