<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">The Blast Furnace</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Extracting iron from iron ore</text>

  <!-- Furnace vessel — wider at bottom, narrow at top, dome top -->
  <!-- Hopper/funnel at very top -->
  <path d="M 188,48 L 182,54 L 186,54 L 186,58 L 214,58 L 214,54 L 218,54 L 212,48 Z" stroke="#4fc3f7" stroke-width="1.5" fill="none"/>

  <!-- Main vessel: narrow neck widening to broad base -->
  <path d="M 186,58 L 183,65 L 178,80 L 170,100 L 162,125 L 158,145 L 158,170 L 160,180 L 165,188 L 240,188 L 245,180 L 247,170 L 247,145 L 243,125 L 235,100 L 227,80 L 222,65 L 219,58" stroke="#4fc3f7" stroke-width="2" fill="none"/>

  <!-- Zone 3 (coolest, top) — pale blue fill -->
  <rect x="179" y="68" width="47" height="30" fill="#4fc3f740" rx="0" ry="0"/>
  <text x="202" y="83" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#4fc3f7">Zone 3</text>
  <text x="202" y="93" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="6" fill="#ffffff" opacity="0.7">~200°C</text>

  <!-- Zone 2 (middle) — orange fill -->
  <path d="M 172,105 L 170,100 L 178,100 L 227,100 L 235,100 L 233,105 L 230,115 L 228,125 L 177,125 L 175,115 Z" fill="#ffb74d30"/>
  <text x="202" y="112" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#ffb74d">Zone 2</text>
  <text x="202" y="122" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="6" fill="#ffffff" opacity="0.7">~1000°C</text>

  <!-- Zone 1 (hottest, bottom) — red fill -->
  <path d="M 162,140 L 160,145 L 158,155 L 158,170 L 160,180 L 165,188 L 240,188 L 245,180 L 247,170 L 247,155 L 245,145 L 243,140 Z" fill="#ef535030"/>
  <text x="202" y="158" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#ef5350">Zone 1</text>
  <text x="202" y="168" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="6" fill="#ffffff" opacity="0.7">~2000°C</text>

  <!-- Raw materials in at hopper -->
  <text x="200" y="44" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#ffffff">↓ Iron ore + Coke + Limestone</text>

  <!-- Waste gases out from upper sides -->
  <line x1="178" y1="75" x2="140" y2="68" stroke="#ffb74d" stroke-width="1.5"/>
  <text x="135" y="68" text-anchor="end" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#ffb74d">Waste gases (CO₂)</text>

  <!-- Hot air blown in from lower sides -->
  <line x1="110" y1="148" x2="158" y2="148" stroke="#ef5350" stroke-width="1.5"/>
  <text x="105" y="148" text-anchor="end" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#ef5350">Hot air →</text>
  <line x1="247" y1="148" x2="295" y2="148" stroke="#ef5350" stroke-width="1.5"/>
  <text x="300" y="148" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#ef5350">← Hot air</text>

  <!-- Slag out bottom-left -->
  <line x1="165" y1="185" x2="130" y2="192" stroke="#81c784" stroke-width="1.5"/>
  <text x="125" y="192" text-anchor="end" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#81c784">Slag out</text>

  <!-- Molten iron out bottom-right -->
  <line x1="240" y1="188" x2="275" y2="195" stroke="#ffb74d" stroke-width="1.5"/>
  <text x="280" y="195" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#ffb74d">Molten iron out</text>

  <!-- Key reactions -->
  <text x="200" y="214" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Key reactions</text>
  <text x="200" y="232" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">1. C + O₂ → CO₂ (coke burns in hot air)</text>
  <text x="200" y="246" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">2. CO₂ + C → 2CO (carbon monoxide formed)</text>
  <text x="200" y="260" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#81c784">3. Fe₂O₃ + 3CO → 2Fe + 3CO₂ (iron reduced)</text>
  <text x="200" y="274" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffb74d">4. CaCO₃ + SiO₂ → CaSiO₃ + CO₂ (slag)</text>
</svg>