<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Simple Molecular Substances</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Weak intermolecular forces</text>

  <!--
    SIMPLE MOLECULAR DIAGRAM
    ==========================
    Shows individual molecules with strong covalent bonds inside,
    weak intermolecular forces between them.
  -->

  <!-- Molecule 1 (top-left) -->
  <circle cx="100" cy="90" r="10" fill="#ffb74d" opacity="0.7"/>
  <circle cx="125" cy="90" r="10" fill="#ffffff" opacity="0.7"/>
  <line x1="110" y1="90" x2="115" y2="90" stroke="#4fc3f7" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="90" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#1a1a2e">O</text>
  <text x="125" y="90" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#1a1a2e">H</text>
  <circle cx="100" cy="110" r="10" fill="#ffffff" opacity="0.7"/>
  <line x1="100" y1="100" x2="100" y2="100" stroke="#4fc3f7" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="110" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#1a1a2e">H</text>

  <!-- Molecule 2 (top-right) -->
  <circle cx="250" cy="85" r="10" fill="#ffb74d" opacity="0.7"/>
  <circle cx="275" cy="85" r="10" fill="#ffffff" opacity="0.7"/>
  <line x1="260" y1="85" x2="265" y2="85" stroke="#4fc3f7" stroke-width="3" stroke-linecap="round"/>
  <text x="250" y="85" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#1a1a2e">O</text>
  <text x="275" y="85" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#1a1a2e">H</text>
  <circle cx="250" cy="105" r="10" fill="#ffffff" opacity="0.7"/>
  <text x="250" y="105" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#1a1a2e">H</text>

  <!-- Molecule 3 (bottom-left) -->
  <circle cx="140" cy="170" r="10" fill="#ffb74d" opacity="0.7"/>
  <circle cx="165" cy="170" r="10" fill="#ffffff" opacity="0.7"/>
  <line x1="150" y1="170" x2="155" y2="170" stroke="#4fc3f7" stroke-width="3" stroke-linecap="round"/>
  <text x="140" y="170" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#1a1a2e">O</text>
  <text x="165" y="170" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#1a1a2e">H</text>
  <circle cx="140" cy="190" r="10" fill="#ffffff" opacity="0.7"/>
  <text x="140" y="190" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#1a1a2e">H</text>

  <!-- Molecule 4 (bottom-right) -->
  <circle cx="280" cy="165" r="10" fill="#ffb74d" opacity="0.7"/>
  <circle cx="305" cy="165" r="10" fill="#ffffff" opacity="0.7"/>
  <line x1="290" y1="165" x2="295" y2="165" stroke="#4fc3f7" stroke-width="3" stroke-linecap="round"/>
  <text x="280" y="165" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#1a1a2e">O</text>
  <text x="305" y="165" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#1a1a2e">H</text>
  <circle cx="280" cy="185" r="10" fill="#ffffff" opacity="0.7"/>
  <text x="280" y="185" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#1a1a2e">H</text>

  <!-- Intermolecular force indicators (dashed lines between molecules) -->
  <line x1="135" y1="95" x2="240" y2="90" stroke="#81c784" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>
  <line x1="115" y1="118" x2="135" y2="162" stroke="#81c784" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>
  <line x1="280" y1="100" x2="280" y2="155" stroke="#81c784" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>
  <line x1="175" y1="175" x2="270" y2="170" stroke="#81c784" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>

  <!-- Labels -->
  <text x="190" y="135" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Weak intermolecular</text>
  <text x="190" y="147" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">forces between molecules</text>

  <!-- Properties -->
  <text x="200" y="230" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Low melting/boiling point • Do not conduct electricity</text>
  <text x="200" y="245" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Strong covalent bonds within molecules — weak forces between</text>
</svg>
