<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Bohr Model — Sulfur</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">S (atomic number 16)</text>
  <circle cx="200" cy="150" r="35" stroke="#81c784" stroke-width="1" fill="none"/>
  <circle cx="200" cy="150" r="60" stroke="#81c784" stroke-width="1" fill="none"/>
  <circle cx="200" cy="150" r="85" stroke="#81c784" stroke-width="1" fill="none"/>
  <circle cx="200" cy="150" r="16" fill="#ff6b35"/>
  <text x="200" y="150" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">S</text>
  <!-- Shell 1: 2e — pair at top -->
  <circle cx="196" cy="115" r="4" fill="#4fc3f7"/>
  <circle cx="204" cy="115" r="4" fill="#4fc3f7"/>
  <!-- Shell 2: 8e — 4 pairs -->
  <circle cx="196" cy="90" r="4" fill="#4fc3f7"/>
  <circle cx="204" cy="90" r="4" fill="#4fc3f7"/>
  <circle cx="260" cy="146" r="4" fill="#4fc3f7"/>
  <circle cx="260" cy="154" r="4" fill="#4fc3f7"/>
  <circle cx="196" cy="210" r="4" fill="#4fc3f7"/>
  <circle cx="204" cy="210" r="4" fill="#4fc3f7"/>
  <circle cx="140" cy="146" r="4" fill="#4fc3f7"/>
  <circle cx="140" cy="154" r="4" fill="#4fc3f7"/>
  <!-- Shell 3: 6e — 3 pairs (top, right, bottom) -->
  <circle cx="196" cy="65" r="4" fill="#4fc3f7"/>
  <circle cx="204" cy="65" r="4" fill="#4fc3f7"/>
  <circle cx="285" cy="146" r="4" fill="#4fc3f7"/>
  <circle cx="285" cy="154" r="4" fill="#4fc3f7"/>
  <circle cx="196" cy="235" r="4" fill="#4fc3f7"/>
  <circle cx="204" cy="235" r="4" fill="#4fc3f7"/>
  <text x="200" y="253" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#ffffff">2, 8, 6</text>
</svg>
