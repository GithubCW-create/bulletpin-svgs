<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="200" y="20" font-size="15px" fill="#ffffff" font-weight="bold" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Life Cycle Assessment</text>

  <!-- Subtitle -->
  <text x="200" y="35" font-size="12px" fill="#ffb74d" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Environmental impact from start to end</text>

  <!-- LCA Cycle -->
  <!-- Box 1: Raw materials -->
  <rect x="80" y="55" width="85" height="50" fill="none" stroke="#4fc3f7" stroke-width="2" rx="3"/>
  <text x="122" y="74" font-size="11px" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Raw</text>
  <text x="122" y="87" font-size="11px" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">materials</text>

  <!-- Arrow 1 -->
  <line x1="165" y1="80" x2="210" y2="80" stroke="#81c784" stroke-width="2"/>
  <polygon points="210,80 202,76 202,84" fill="#81c784"/>

  <!-- Box 2: Manufacturing -->
  <rect x="210" y="55" width="95" height="50" fill="none" stroke="#ce93d8" stroke-width="2" rx="3"/>
  <text x="257" y="80" font-size="11px" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Manufacturing</text>

  <!-- Arrow 2 -->
  <line x1="257" y1="105" x2="257" y2="135" stroke="#81c784" stroke-width="2"/>
  <polygon points="257,135 253,127 261,127" fill="#81c784"/>

  <!-- Box 3: Use -->
  <rect x="210" y="135" width="95" height="50" fill="none" stroke="#ef5350" stroke-width="2" rx="3"/>
  <text x="257" y="162" font-size="12px" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Use</text>

  <!-- Arrow 3 -->
  <line x1="210" y1="160" x2="165" y2="160" stroke="#81c784" stroke-width="2"/>
  <polygon points="165,160 173,156 173,164" fill="#81c784"/>

  <!-- Box 4: Disposal -->
  <rect x="80" y="135" width="85" height="50" fill="none" stroke="#4fc3f7" stroke-width="2" rx="3"/>
  <text x="122" y="162" font-size="12px" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Disposal</text>

  <!-- Arrow 4 (back to start) -->
  <line x1="122" y1="135" x2="122" y2="105" stroke="#81c784" stroke-width="2"/>
  <polygon points="122,105 118,113 126,113" fill="#81c784"/>

  <!-- Key impacts heading -->
  <text x="200" y="210" font-size="12px" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Impacts considered</text>

  <!-- Impact items -->
  <text x="100" y="228" font-size="11px" fill="#4fc3f7" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">• Energy use</text>
  <text x="230" y="228" font-size="11px" fill="#4fc3f7" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">• Water</text>

  <text x="100" y="244" font-size="11px" fill="#4fc3f7" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">• CO₂ emissions</text>
  <text x="230" y="244" font-size="11px" fill="#4fc3f7" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">• Waste</text>

  <!-- Note -->
  <text x="200" y="272" font-size="10px" fill="#ffb74d" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Data can be subjective</text>
  <text x="200" y="285" font-size="10px" fill="#81c784" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Reduce, reuse, recycle improves LCA</text>
</svg>