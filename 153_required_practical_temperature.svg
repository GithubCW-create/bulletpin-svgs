<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">RP: Temperature Changes</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Investigating energy changes in reactions</text>

  <!-- Method steps -->
  <rect x="80" y="52" width="240" height="24" rx="5" ry="5" stroke="#4fc3f7" stroke-width="1.5" fill="none"/>
  <text x="200" y="64" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">1. Measure volume of acid in polystyrene cup</text>
  <line x1="200" y1="76" x2="200" y2="86" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="200,86 196,81 204,81" fill="#4fc3f7"/>

  <rect x="80" y="88" width="240" height="24" rx="5" ry="5" stroke="#4fc3f7" stroke-width="1.5" fill="none"/>
  <text x="200" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">2. Record start temperature with thermometer</text>
  <line x1="200" y1="112" x2="200" y2="122" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="200,122 196,117 204,117" fill="#4fc3f7"/>

  <rect x="80" y="124" width="240" height="24" rx="5" ry="5" stroke="#4fc3f7" stroke-width="1.5" fill="none"/>
  <text x="200" y="136" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">3. Add measured mass of powder, stir</text>
  <line x1="200" y1="148" x2="200" y2="158" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="200,158 196,153 204,153" fill="#4fc3f7"/>

  <rect x="80" y="160" width="240" height="24" rx="5" ry="5" stroke="#4fc3f7" stroke-width="1.5" fill="none"/>
  <text x="200" y="172" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">4. Record highest/lowest temperature reached</text>

  <!-- Why polystyrene -->
  <rect x="80" y="198" width="240" height="28" rx="6" ry="6" stroke="#81c784" stroke-width="1.5" fill="none"/>
  <text x="200" y="212" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Polystyrene = good insulator, reduces heat loss</text>

  <!-- Results interpretation -->
  <text x="200" y="244" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ef5350">Temperature rises → exothermic (−ΔH)</text>
  <text x="200" y="262" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#4fc3f7">Temperature drops → endothermic (+ΔH)</text>
  <text x="200" y="282" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">ΔT = final temp − start temp</text>
</svg>