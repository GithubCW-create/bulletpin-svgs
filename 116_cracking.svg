<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Cracking</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Breaking long-chain hydrocarbons into shorter ones</text>

  <!-- Long chain (input) -->
  <text x="200" y="65" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#81c784">Example</text>

  <!-- Equation -->
  <text x="200" y="92" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff">C₁₀H₂₂ → C₈H₁₈ + C₂H₄</text>
  <text x="200" y="110" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffb74d">Decane → Octane + Ethene</text>

  <!-- Visual breakdown -->
  <!-- Long chain left -->
  <rect x="40" y="135" width="120" height="25" rx="5" ry="5" fill="#ff6b35" opacity="0.3" stroke="#ff6b35" stroke-width="1.5"/>
  <text x="100" y="148" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ff6b35">Long alkane</text>

  <!-- Arrow -->
  <line x1="175" y1="148" x2="205" y2="148" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <polygon points="205,148 197,144 197,152" fill="#ffffff"/>

  <!-- Shorter alkane -->
  <rect x="220" y="135" width="85" height="25" rx="5" ry="5" fill="#4fc3f7" opacity="0.3" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="262" y="148" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#4fc3f7">Shorter alkane</text>

  <!-- Plus -->
  <text x="318" y="148" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff">+</text>

  <!-- Alkene -->
  <rect x="332" y="135" width="55" height="25" rx="5" ry="5" fill="#81c784" opacity="0.3" stroke="#81c784" stroke-width="1.5"/>
  <text x="360" y="148" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#81c784">Alkene</text>

  <!-- Two methods -->
  <text x="200" y="185" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#4fc3f7">Methods</text>

  <!-- Catalytic cracking -->
  <text x="120" y="208" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#ffb74d">Catalytic</text>
  <text x="120" y="224" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Zeolite catalyst</text>
  <text x="120" y="238" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">~600°C</text>

  <!-- Steam cracking -->
  <text x="280" y="208" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#ffb74d">Steam</text>
  <text x="280" y="224" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Mixed with steam</text>
  <text x="280" y="238" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">~850°C</text>

  <!-- Why -->
  <text x="200" y="265" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">High demand for short-chain fuels + alkenes for plastics</text>
</svg>