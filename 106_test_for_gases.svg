<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Tests for Gases</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Common gas identification tests</text>

  <!--
    TESTS FOR GASES — table-style layout
    ======================================
    4 gases: H₂, O₂, CO₂, Cl₂
    Columns: Gas | Test | Result
  -->

  <!-- Header row — tighter columns for phone -->
  <text x="45" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Gas</text>
  <text x="145" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Test</text>
  <text x="285" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Result</text>

  <!-- Header line -->
  <line x1="15" y1="68" x2="370" y2="68" stroke="#4fc3f7" stroke-width="1" opacity="0.4"/>

  <!-- H₂ -->
  <text x="45" y="90" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">H₂</text>
  <text x="145" y="90" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Burning splint</text>
  <text x="285" y="90" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ef5350">Squeaky pop</text>

  <line x1="15" y1="106" x2="370" y2="106" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>

  <!-- O₂ -->
  <text x="45" y="126" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">O₂</text>
  <text x="145" y="126" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Glowing splint</text>
  <text x="285" y="126" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffb74d">Relights</text>

  <line x1="15" y1="142" x2="370" y2="142" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>

  <!-- CO₂ -->
  <text x="45" y="162" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">CO₂</text>
  <text x="145" y="162" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Limewater</text>
  <text x="285" y="162" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Turns milky/cloudy</text>

  <line x1="15" y1="178" x2="370" y2="178" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>

  <!-- Cl₂ -->
  <text x="45" y="198" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#ce93d8">Cl₂</text>
  <text x="145" y="198" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Damp litmus paper</text>
  <text x="285" y="198" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ce93d8">Bleaches white</text>
</svg>