<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Bohr Model — Helium</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">He (atomic number 2)</text>

  <!--
    BOHR MODEL HELIUM
    =================
    Electron config: 2
    Simplest noble gas. Only 1 shell.
    Nucleus at (200,140). Shell 1 r=45 (larger since it's the only shell).
  -->

  <!-- Shell -->
  <circle cx="200" cy="140" r="45" stroke="#81c784" stroke-width="1" fill="none"/>

  <!-- Nucleus -->
  <circle cx="200" cy="140" r="14" fill="#ff6b35"/>
  <text x="200" y="140" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">He</text>

  <!-- Shell 1: 2 electrons — 1 pair at top -->
  <circle cx="196" cy="95" r="4" fill="#4fc3f7"/>
  <circle cx="204" cy="95" r="4" fill="#4fc3f7"/>

  <!-- Electron configuration -->
  <text x="200" y="203" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#ffffff">2</text>
</svg>
