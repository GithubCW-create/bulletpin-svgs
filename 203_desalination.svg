<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="200" y="20" font-size="15px" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Desalination Methods</text>

  <!-- Subtitle -->
  <text x="200" y="35" font-size="12px" fill="#ffb74d" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Two Key Technologies</text>

  <!-- LEFT COLUMN: DISTILLATION -->

  <!-- Distillation heading -->
  <text x="137" y="55" font-size="12px" font-weight="bold" fill="#ef5350" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Distillation</text>

  <!-- Step 1 -->
  <rect x="80" y="70" width="115" height="24" fill="#1a1a2e" stroke="#ffffff" stroke-width="1"/>
  <text x="137" y="82" font-size="9px" fill="#ffffff" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Heat seawater</text>

  <!-- Arrow 1 -->
  <line x1="137" y1="94" x2="137" y2="100" stroke="#ffffff" stroke-width="1"/>
  <polygon points="137,100 133,94 141,94" fill="#ffffff"/>

  <!-- Step 2 -->
  <rect x="80" y="100" width="115" height="24" fill="#1a1a2e" stroke="#ffffff" stroke-width="1"/>
  <text x="137" y="112" font-size="9px" fill="#ffffff" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Steam rises</text>

  <!-- Arrow 2 -->
  <line x1="137" y1="124" x2="137" y2="130" stroke="#ffffff" stroke-width="1"/>
  <polygon points="137,130 133,124 141,124" fill="#ffffff"/>

  <!-- Step 3 -->
  <rect x="80" y="130" width="115" height="24" fill="#1a1a2e" stroke="#ffffff" stroke-width="1"/>
  <text x="137" y="142" font-size="9px" fill="#ffffff" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Condense to pure water</text>

  <!-- Note below distillation -->
  <text x="137" y="164" font-size="9px" fill="#ef5350" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Energy intensive</text>

  <!-- RIGHT COLUMN: REVERSE OSMOSIS -->

  <!-- Reverse osmosis heading -->
  <text x="262" y="55" font-size="12px" font-weight="bold" fill="#4fc3f7" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Reverse osmosis</text>

  <!-- Step 1 -->
  <rect x="205" y="70" width="115" height="24" fill="#1a1a2e" stroke="#ffffff" stroke-width="1"/>
  <text x="262" y="82" font-size="9px" fill="#ffffff" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Apply high pressure</text>

  <!-- Arrow 1 -->
  <line x1="262" y1="94" x2="262" y2="100" stroke="#ffffff" stroke-width="1"/>
  <polygon points="262,100 258,94 266,94" fill="#ffffff"/>

  <!-- Step 2 -->
  <rect x="205" y="100" width="115" height="24" fill="#1a1a2e" stroke="#ffffff" stroke-width="1"/>
  <text x="262" y="112" font-size="9px" fill="#ffffff" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Force through membrane</text>

  <!-- Arrow 2 -->
  <line x1="262" y1="124" x2="262" y2="130" stroke="#ffffff" stroke-width="1"/>
  <polygon points="262,130 258,124 266,124" fill="#ffffff"/>

  <!-- Step 3 -->
  <rect x="205" y="130" width="115" height="24" fill="#1a1a2e" stroke="#ffffff" stroke-width="1"/>
  <text x="262" y="142" font-size="9px" fill="#ffffff" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Pure water passes through</text>

  <!-- Note below reverse osmosis -->
  <text x="262" y="164" font-size="9px" fill="#81c784" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Less energy than distillation</text>

  <!-- BOTTOM SHARED NOTE BOX -->
  <rect x="80" y="182" width="240" height="36" fill="#1a1a2e" stroke="#ce93d8" stroke-width="1" rx="2"/>

  <!-- Text line 1 -->
  <text x="200" y="195" font-size="10px" fill="#ce93d8" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Both methods require significant energy</text>

  <!-- Text line 2 -->
  <text x="200" y="210" font-size="9px" fill="#ffffff" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Used where freshwater is scarce</text>
</svg>