<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Addition Polymerisation</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Ethene → Poly(ethene)</text>

  <!-- LEFT SIDE: n ethene monomer -->
  <!-- C=C at x=80,120, y=90 -->
  <text x="55" y="70" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">n</text>

  <!-- C=C double bond -->
  <line x1="88" y1="87" x2="112" y2="87" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="88" y1="93" x2="112" y2="93" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
  <!-- C1 H bonds -->
  <line x1="80" y1="78" x2="80" y2="58" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="80" y1="102" x2="80" y2="122" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
  <!-- C2 H bonds -->
  <line x1="120" y1="78" x2="120" y2="58" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="120" y1="102" x2="120" y2="122" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Atom labels: ethene -->
  <text x="80" y="90" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ff6b35">C</text>
  <text x="120" y="90" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ff6b35">C</text>
  <text x="80" y="52" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">H</text>
  <text x="80" y="128" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">H</text>
  <text x="120" y="52" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">H</text>
  <text x="120" y="128" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">H</text>

  <!-- Label -->
  <text x="100" y="148" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#81c784">ethene</text>

  <!-- Arrow -->
  <line x1="150" y1="90" x2="180" y2="90" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="180,85 190,90 180,95" fill="#ffffff"/>

  <!-- RIGHT SIDE: poly(ethene) repeating unit -->
  <!-- C—C at x=240,280, y=90 -->

  <!-- C—C single bond -->
  <line x1="252" y1="90" x2="268" y2="90" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Extension bonds -->
  <line x1="228" y1="90" x2="210" y2="90" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="292" y1="90" x2="310" y2="90" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
  <!-- C1 H bonds -->
  <line x1="240" y1="78" x2="240" y2="58" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="240" y1="102" x2="240" y2="122" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
  <!-- C2 H bonds -->
  <line x1="280" y1="78" x2="280" y2="58" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="280" y1="102" x2="280" y2="122" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Atom labels: polymer -->
  <text x="240" y="90" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ff6b35">C</text>
  <text x="280" y="90" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ff6b35">C</text>
  <text x="240" y="52" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">H</text>
  <text x="240" y="128" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">H</text>
  <text x="280" y="52" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">H</text>
  <text x="280" y="128" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">H</text>

  <!-- Brackets -->
  <path d="M215 45 L207 45 L207 135 L215 135" stroke="#81c784" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M305 45 L313 45 L313 135 L305 135" stroke="#81c784" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="322" y="135" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#81c784">n</text>

  <!-- Label -->
  <text x="260" y="148" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#81c784">poly(ethene)</text>
</svg>