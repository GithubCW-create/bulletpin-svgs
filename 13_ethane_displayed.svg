<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Displayed Formula — Ethane</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">C₂H₆</text>

  <!-- Grid: 50px spacing. C backbone horizontal at y=90. -->
  <!-- Left C: x=170, Right C: x=230 -->

  <!-- C—C bond -->
  <line x1="182" y1="90" x2="218" y2="90" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left C—H bonds -->
  <line x1="170" y1="78" x2="170" y2="55" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="170" y1="102" x2="170" y2="125" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="158" y1="90" x2="135" y2="90" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right C—H bonds -->
  <line x1="230" y1="78" x2="230" y2="55" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="230" y1="102" x2="230" y2="125" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="242" y1="90" x2="265" y2="90" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Atom labels -->
  <text x="170" y="90" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#ff6b35">C</text>
  <text x="230" y="90" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#ff6b35">C</text>
  <text x="170" y="48" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="170" y="132" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="128" y="90" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="230" y="48" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="230" y="132" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="272" y="90" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
</svg>