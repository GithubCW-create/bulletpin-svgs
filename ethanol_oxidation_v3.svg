  <circle cx="198" cy="274" r="2" fill="#1a1a2e" stroke="#ffffff" stroke-width="0.8"/>
  <circle cx="204" cy="268" r="2" fill="#1a1a2e" stroke="#ffffff" stroke-width="0.8"/>
