  <line x1="204" y1="110" x2="204" y2="218" stroke="#ffffff" stroke-width="1.2"/>
  <path d="M 190 122 L 190 190 Q 190 194 184 194 L 174 194" fill="none" stroke="#ffffff" stroke-width="1.2"/>
  <path d="M 174 202 L 184 202 Q 190 202 190 206 L 190 210 Q 190 214 196 214" fill="none" stroke="#ffffff" stroke-width="1.2"/>
  <path d="M 210 210 L 210 142 Q 210 138 216 138 L 226 138" fill="none" stroke="#ffffff" stroke-width="1.2"/>
  <path d="M 226 130 L 216 130 Q 210 130 210 126 L 210 122 Q 210 118 204 118" fill="none" stroke="#ffffff" stroke-width="1.2"/>
  <path d="M 210 210 Q 210 214 204 214" fill="none" stroke="#ffffff" stroke-width="1.2"/>
  <rect x="192" y="104" width="16" height="6" rx="1" fill="#2a2a4e" stroke="#ffffff" stroke-width="1"/>
  <path d="M 192 104 L 188 98 L 212 98 L 208 104" fill="#2a2a4e" stroke="#ffffff" stroke-width="1"/>
  <path d="M 190 122 Q 190 118 196 118" fill="none" stroke="#ffffff" stroke-width="1.2"/>
  <line x1="200" y1="314" x2="200" y2="290" stroke="#ff6b6b" stroke-width="2" marker-end="url(#redArrow)"/>

  <!-- Labels (all bumped to min 14px, left labels shifted right to x=130 to avoid clipping) -->
  <text x="200" y="328" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ff6b6b" font-weight="bold">HEAT</text>
  <text x="130" y="198" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#b0b0c8">COLD WATER IN</text>
  <path d="M 136 196 L 168 196" fill="none" stroke="#b0b0c8" stroke-width="0.8" marker-end="url(#arrow)"/>
  <text x="130" y="240" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#b0b0c8">PEAR-SHAPED</text>
  <text x="130" y="256" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#b0b0c8">FLASK</text>
  <path d="M 136 244 Q 168 244 176 252" fill="none" stroke="#b0b0c8" stroke-width="0.8" marker-end="url(#arrow)"/>
