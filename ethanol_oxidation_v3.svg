  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto-start-reverse">
      <polygon points="0 1, 8 4, 0 7" fill="none" stroke="#b0b0c8" stroke-width="1"/>
    </marker>
    <marker id="redArrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto-start-reverse">
      <polygon points="0 2, 8 4, 0 6" fill="none" stroke="#ff6b6b" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- Apparatus (shifted up 35px) -->
  <g transform="translate(0,-35)">
