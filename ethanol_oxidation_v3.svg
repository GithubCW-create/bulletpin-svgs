  <text x="244" y="184" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#b0b0c8">CONDENSER</text>
  <path d="M 238 172 L 214 172" fill="none" stroke="#b0b0c8" stroke-width="0.8" marker-end="url(#arrow)"/>
  <text x="244" y="260" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#b0b0c8">ANTI-BUMPING</text>
  <text x="244" y="276" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#b0b0c8">GRANULES</text>
  <path d="M 238 268 L 210 272" fill="none" stroke="#b0b0c8" stroke-width="0.8" marker-end="url(#arrow)"/>
