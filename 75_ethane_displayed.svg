<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Displayed Formula — Ethane</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">C₂H₆ (alkane)</text>

  <!--
    ETHANE DISPLAYED FORMULA
    =========================
    Backbone at y=100. Symmetric about x=200.
    C1(160,100) — C2(240,100). 80px spacing.
    Each C has 3 H atoms (CH₃ groups).
    Bond gap: 12px from atom centre. Terminal H at 42px.
  -->

  <!-- Backbone atom labels -->
  <text x="160" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ff6b35">C</text>
  <text x="240" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ff6b35">C</text>

  <!-- C1 hydrogen atoms (CH₃) -->
  <text x="118" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="160" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="160" y="142" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>

  <!-- C2 hydrogen atoms (CH₃) — mirrors C1 -->
  <text x="282" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="240" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="240" y="142" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>

  <!-- C1—C2 single bond -->
  <line x1="172" y1="100" x2="228" y2="100" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>

  <!-- C1—H left -->
  <line x1="148" y1="100" x2="130" y2="100" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <!-- C1—H up -->
  <line x1="160" y1="88" x2="160" y2="70" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <!-- C1—H down -->
  <line x1="160" y1="112" x2="160" y2="130" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>

  <!-- C2—H right -->
  <line x1="252" y1="100" x2="270" y2="100" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <!-- C2—H up -->
  <line x1="240" y1="88" x2="240" y2="70" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <!-- C2—H down -->
  <line x1="240" y1="112" x2="240" y2="130" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
</svg>
