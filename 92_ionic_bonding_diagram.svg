<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Ionic Bonding — Electron Transfer</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Sodium chloride (NaCl)</text>

  <!--
    IONIC BONDING ELECTRON TRANSFER DIAGRAM
    ==========================================
    Shows Na atom losing electron → Na⁺, Cl atom gaining electron → Cl⁻.
    Arrow shows electron transfer direction.
    Before (atoms) on left, After (ions) on right.
  -->

  <!-- Before label -->
  <text x="100" y="55" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Before</text>

  <!-- Na atom (2,8,1) -->
  <circle cx="70" cy="110" r="30" stroke="#81c784" stroke-width="1.5" fill="none"/>
  <circle cx="70" cy="110" r="20" stroke="#81c784" stroke-width="1.5" fill="none"/>
  <circle cx="70" cy="110" r="10" stroke="#81c784" stroke-width="1.5" fill="none"/>
  <text x="70" y="110" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#4fc3f7">Na</text>
  <!-- 1 outer electron -->
  <circle cx="70" cy="79" r="3" fill="#4fc3f7"/>

  <!-- Cl atom (2,8,7) -->
  <circle cx="130" cy="110" r="30" stroke="#81c784" stroke-width="1.5" fill="none"/>
  <circle cx="130" cy="110" r="20" stroke="#81c784" stroke-width="1.5" fill="none"/>
  <circle cx="130" cy="110" r="10" stroke="#81c784" stroke-width="1.5" fill="none"/>
  <text x="130" y="110" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ce93d8">Cl</text>
  <!-- 7 outer electrons (shown as ring of dots) -->
  <circle cx="130" cy="79" r="3" fill="#ce93d8"/>
  <circle cx="156" cy="95" r="3" fill="#ce93d8"/>
  <circle cx="156" cy="125" r="3" fill="#ce93d8"/>
  <circle cx="130" cy="141" r="3" fill="#ce93d8"/>
  <circle cx="104" cy="125" r="3" fill="#ce93d8"/>
  <circle cx="104" cy="95" r="3" fill="#ce93d8"/>
  <circle cx="143" cy="83" r="3" fill="#ce93d8"/>

  <!-- Transfer arrow -->
  <line x1="75" y1="155" x2="125" y2="155" stroke="#ffb74d" stroke-width="2" stroke-linecap="round"/>
  <polygon points="125,155 117,151 117,159" fill="#ffb74d"/>
  <text x="100" y="168" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffb74d">e⁻ transfer</text>

  <!-- After label -->
  <text x="300" y="55" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">After</text>

  <!-- Na⁺ ion (smaller, lost outer shell) -->
  <circle cx="270" cy="110" r="20" stroke="#81c784" stroke-width="1.5" fill="none"/>
  <circle cx="270" cy="110" r="10" stroke="#81c784" stroke-width="1.5" fill="none"/>
  <text x="270" y="110" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#4fc3f7">Na</text>
  <text x="292" y="96" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">+</text>

  <!-- Cl⁻ ion (gained 1 electron → 8 in outer shell) -->
  <circle cx="330" cy="110" r="30" stroke="#81c784" stroke-width="1.5" fill="none"/>
  <circle cx="330" cy="110" r="20" stroke="#81c784" stroke-width="1.5" fill="none"/>
  <circle cx="330" cy="110" r="10" stroke="#81c784" stroke-width="1.5" fill="none"/>
  <text x="330" y="110" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ce93d8">Cl</text>
  <!-- 8 outer electrons -->
  <circle cx="330" cy="79" r="3" fill="#ce93d8"/>
  <circle cx="356" cy="95" r="3" fill="#ce93d8"/>
  <circle cx="356" cy="125" r="3" fill="#ce93d8"/>
  <circle cx="330" cy="141" r="3" fill="#ce93d8"/>
  <circle cx="304" cy="125" r="3" fill="#ce93d8"/>
  <circle cx="304" cy="95" r="3" fill="#ce93d8"/>
  <circle cx="343" cy="83" r="3" fill="#ce93d8"/>
  <circle cx="317" cy="83" r="3" fill="#4fc3f7"/>
  <text x="362" y="96" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">−</text>

  <!-- Electrostatic attraction -->
  <text x="300" y="155" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Electrostatic attraction</text>
  <text x="300" y="168" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">between opposite ions</text>
</svg>
