<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 360">
  <defs>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#DC143C"/>
    </marker>
  </defs>

  <!-- Background (dark theme) -->
  <rect width="400" height="360" fill="#1a1a2e"/>

  <!-- All illustration content shifted down 40px for title space -->
  <g transform="translate(0,40)">

  <!-- Ground -->
  <rect x="0" y="260" width="400" height="60" fill="#4a4a5e"/>

  <!-- Mountain -->
  <polygon points="200,260 340,100 400,260" fill="#8B6A50" stroke="#888" stroke-width="1"/>

  <!-- Lake -->
  <path d="M 180,320 Q 240,312 300,280 Q 340,260 380,180 L 400,180 L 400,320 Z" fill="#00E5EE" stroke="#888" stroke-width="1"/>

  <!-- Trees -->
  <g stroke="#888" stroke-width="1">
    <rect x="292" y="240" width="6" height="24" fill="#8B4513"/>
    <ellipse cx="295" cy="224" rx="12" ry="20" fill="#90EE90"/>
    <rect x="316" y="244" width="6" height="24" fill="#8B4513"/>
    <ellipse cx="319" cy="228" rx="14" ry="22" fill="#90EE90"/>
    <rect x="340" y="240" width="6" height="20" fill="#8B4513"/>
    <ellipse cx="343" cy="224" rx="10" ry="18" fill="#90EE90"/>
  </g>

  <!-- Factory chimneys -->
  <g stroke="#888" stroke-width="1">
    <rect x="40" y="180" width="12" height="80" fill="#d3d3d3"/>
    <rect x="40" y="192" width="12" height="8" fill="#ff7f7f"/>
    <rect x="40" y="208" width="12" height="8" fill="#ff7f7f"/>
    <rect x="60" y="152" width="14" height="108" fill="#d3d3d3"/>
    <rect x="60" y="164" width="14" height="10" fill="#ff7f7f"/>
    <rect x="60" y="184" width="14" height="10" fill="#ff7f7f"/>
  </g>

  <!-- Factory buildings -->
  <g stroke="#888" stroke-width="1">
    <rect x="20" y="232" width="40" height="28" fill="#FFC125"/>
    <rect x="60" y="212" width="52" height="48" fill="#FFC125"/>
    <polygon points="56,212 86,192 116,212" fill="#7b68ee"/>
    <!-- Windows -->
    <rect x="26" y="240" width="6" height="8" fill="#87CEFA"/>
    <rect x="38" y="240" width="6" height="8" fill="#87CEFA"/>
    <rect x="50" y="240" width="6" height="8" fill="#87CEFA"/>
    <!-- Door -->
    <path d="M 80,260 L 80,240 A 12,12 0 0 1 104,240 L 104,260 Z" fill="#8B6508"/>
  </g>

  <!-- Car -->
  <g>
    <path d="M 4,260 Q 12,240 24,264 Q 32,248 40,268" fill="none" stroke="#666" stroke-width="3" stroke-linecap="round"/>
    <rect x="32" y="248" width="72" height="20" rx="6" fill="#00868B" stroke="#888" stroke-width="1"/>
    <polygon points="40,248 52,236 88,236 100,248" fill="#00868B" stroke="#888" stroke-width="1"/>
    <polygon points="44,248 54,238 66,238 66,248" fill="#87CEFA" stroke="#888" stroke-width="1"/>
    <polygon points="70,248 70,238 84,238 96,248" fill="#87CEFA" stroke="#888" stroke-width="1"/>
    <circle cx="48" cy="268" r="7" fill="#333" stroke="#888" stroke-width="1"/>
    <circle cx="48" cy="268" r="3" fill="#888"/>
    <circle cx="92" cy="268" r="7" fill="#333" stroke="#888" stroke-width="1"/>
    <circle cx="92" cy="268" r="3" fill="#888"/>
  </g>

  <!-- Clouds -->
  <g fill="#A9A9A9" stroke="#666" stroke-width="1">
    <circle cx="260" cy="80" r="24"/>
    <circle cx="288" cy="60" r="28"/>
    <circle cx="328" cy="64" r="32"/>
    <circle cx="360" cy="88" r="24"/>
    <circle cx="300" cy="96" r="26"/>
    <circle cx="340" cy="100" r="22"/>
  </g>

  <!-- Rain (dashed lines) -->
  <g stroke="#5599bb" stroke-width="1" stroke-dasharray="4,4">
    <line x1="252" y1="112" x2="244" y2="180"/>
    <line x1="272" y1="116" x2="264" y2="192"/>
    <line x1="292" y1="128" x2="284" y2="184"/>
    <line x1="312" y1="132" x2="304" y2="208"/>
    <line x1="332" y1="128" x2="324" y2="188"/>
    <line x1="352" y1="120" x2="344" y2="176"/>
    <line x1="372" y1="112" x2="364" y2="156"/>
  </g>

  <!-- Red arrows (emissions rising, acid rain falling) -->
  <g>
    <path d="M 20,240 Q 4,160 24,100" fill="none" stroke="#DC143C" stroke-width="2.5" marker-end="url(#arrow-red)"/>
    <path d="M 92,180 L 108,100" fill="none" stroke="#DC143C" stroke-width="2.5" marker-end="url(#arrow-red)"/>
    <line x1="328" y1="112" x2="328" y2="160" stroke="#DC143C" stroke-width="3" marker-end="url(#arrow-red)"/>
  </g>

  <!-- Wind arrow (blue) -->
  <polygon points="112,80 220,80 220,72 248,88 220,104 220,96 112,96" fill="#00E5EE" stroke="#888" stroke-width="1"/>

  <!-- === TEXT LABELS (dark theme: white, Arial, min 13px) === -->

  </g><!-- end illustration group -->

  <!-- Title (full width across the top) -->
  <text font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">
    <tspan x="200" dy="14">AIR POLLUTION FROM ONE PLACE CAN BE</tspan>
    <tspan x="200" dy="16">BLOWN BY THE WIND AND CAUSE ACID RAIN</tspan>
    <tspan x="200" dy="16">(AND SERIOUS POLLUTION PROBLEMS) IN</tspan>
    <tspan x="200" dy="16">ANOTHER LOCATION, EVEN IN A DIFFERENT COUNTRY</tspan>
  </text>

  <!-- ACIDIC GASES label -->
  <text x="32" y="115" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff">ACIDIC GASES</text>

  <!-- NITROGEN OXIDES label (up 50px, right 15px from original) -->
  <text font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff">
    <tspan x="23" dy="175">NITROGEN</tspan>
    <tspan x="23" dy="14">OXIDES</tspan>
  </text>

  <!-- SULFUR DIOXIDE label (right 10px from original) -->
  <text font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff">
    <tspan x="102" dy="204">SULFUR</tspan>
    <tspan x="102" dy="14">DIOXIDE</tspan>
  </text>

  <!-- WIND label -->
  <text x="152" y="134" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">WIND</text>

  <!-- Cloud text -->
  <text font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff">
    <tspan x="280" dy="104">ACIDIC GASES</tspan>
    <tspan x="280" dy="16">ARE DISSOLVED</tspan>
    <tspan x="280" dy="16">IN THE RAIN</tspan>
    <tspan x="280" dy="16">AND THE SNOW</tspan>
  </text>

  <!-- ACID RAIN label -->
  <text x="306" y="218" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff">ACID RAIN</text>

  <!-- Damage text -->
  <text font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff">
    <tspan x="172" dy="236">PLANTS, ANIMALS, LAKES</tspan>
    <tspan x="172" dy="14">AND RIVERS ARE DAMAGED</tspan>
    <tspan x="172" dy="14">BY ACID RAIN</tspan>
  </text>

</svg>
