<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Giant Covalent Structure — Diamond</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Each carbon bonded to 4 others</text>

  <!--
    DIAMOND STRUCTURE
    ==================
    Tetrahedral arrangement. Central C bonded to 4 C atoms.
    Extended to show repeating pattern.
  -->

  <!-- Bonds (draw first, behind atoms) -->
  <!-- Central to top-left -->
  <line x1="200" y1="130" x2="140" y2="80" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <!-- Central to top-right -->
  <line x1="200" y1="130" x2="260" y2="80" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <!-- Central to bottom-left -->
  <line x1="200" y1="130" x2="140" y2="180" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <!-- Central to bottom-right -->
  <line x1="200" y1="130" x2="260" y2="180" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>

  <!-- Second-level bonds (extending out) -->
  <line x1="140" y1="80" x2="100" y2="55" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="140" y1="80" x2="90" y2="100" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="140" y1="80" x2="150" y2="52" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <line x1="260" y1="80" x2="300" y2="55" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="260" y1="80" x2="310" y2="100" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="260" y1="80" x2="250" y2="52" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <line x1="140" y1="180" x2="100" y2="205" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="140" y1="180" x2="90" y2="160" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="140" y1="180" x2="150" y2="208" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <line x1="260" y1="180" x2="300" y2="205" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="260" y1="180" x2="310" y2="160" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="260" y1="180" x2="250" y2="208" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Atoms (on top of bonds) -->
  <!-- Central C -->
  <circle cx="200" cy="130" r="14" fill="#ff6b35"/>
  <text x="200" y="130" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">C</text>

  <!-- Inner 4 -->
  <circle cx="140" cy="80" r="14" fill="#ff6b35"/>
  <text x="140" y="80" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">C</text>
  <circle cx="260" cy="80" r="14" fill="#ff6b35"/>
  <text x="260" y="80" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">C</text>
  <circle cx="140" cy="180" r="14" fill="#ff6b35"/>
  <text x="140" y="180" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">C</text>
  <circle cx="260" cy="180" r="14" fill="#ff6b35"/>
  <text x="260" y="180" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">C</text>

  <!-- Outer atoms (smaller, faded) -->
  <circle cx="100" cy="55" r="10" fill="#ff6b35" opacity="0.5"/>
  <circle cx="90" cy="100" r="10" fill="#ff6b35" opacity="0.5"/>
  <circle cx="150" cy="52" r="10" fill="#ff6b35" opacity="0.5"/>
  <circle cx="300" cy="55" r="10" fill="#ff6b35" opacity="0.5"/>
  <circle cx="310" cy="100" r="10" fill="#ff6b35" opacity="0.5"/>
  <circle cx="250" cy="52" r="10" fill="#ff6b35" opacity="0.5"/>
  <circle cx="100" cy="205" r="10" fill="#ff6b35" opacity="0.5"/>
  <circle cx="90" cy="160" r="10" fill="#ff6b35" opacity="0.5"/>
  <circle cx="150" cy="208" r="10" fill="#ff6b35" opacity="0.5"/>
  <circle cx="300" cy="205" r="10" fill="#ff6b35" opacity="0.5"/>
  <circle cx="310" cy="160" r="10" fill="#ff6b35" opacity="0.5"/>
  <circle cx="250" cy="208" r="10" fill="#ff6b35" opacity="0.5"/>

  <!-- Properties -->
  <text x="200" y="240" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Very hard • Very high melting point • Does not conduct</text>
  <text x="200" y="255" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">4 strong covalent bonds per atom — no free electrons</text>
</svg>
