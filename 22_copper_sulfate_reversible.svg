<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Reversible Reaction</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Copper sulfate hydration / dehydration</text>

  <!--
    WORD EQUATION WITH REVERSIBLE ARROWS
    =====================================
    Left: hydrated copper sulfate (blue)
    Centre: ⇌ arrows with endothermic / exothermic labels
    Right: anhydrous copper sulfate (white) + water
  -->

  <!-- Left side: hydrated copper sulfate -->
  <text x="70" y="80" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#ffffff">hydrated</text>
  <text x="70" y="95" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#ffffff">copper sulfate</text>
  <text x="70" y="115" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#4fc3f7">(blue)</text>

  <!-- Reversible arrows -->
  <!-- Forward arrow (top) -->
  <line x1="140" y1="84" x2="225" y2="84" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <polygon points="222,80 230,84 222,88" fill="#4fc3f7"/>
  <!-- Reverse arrow (bottom) -->
  <line x1="225" y1="100" x2="140" y2="100" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <polygon points="143,96 135,100 143,104" fill="#4fc3f7"/>

  <!-- Arrow labels -->
  <text x="183" y="73" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffb74d">endothermic</text>
  <text x="183" y="113" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffb74d">exothermic</text>

  <!-- Right side: anhydrous copper sulfate + water -->
  <text x="290" y="80" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#ffffff">anhydrous</text>
  <text x="290" y="95" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#ffffff">copper sulfate</text>
  <text x="290" y="115" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#4fc3f7">(white)</text>

  <!-- Plus sign and water -->
  <text x="355" y="88" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#ffffff">+</text>
  <text x="355" y="104" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#ffffff">water</text>
</svg>
