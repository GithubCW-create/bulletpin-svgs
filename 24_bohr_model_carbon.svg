<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Bohr Model — Carbon</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">C — 6 electrons</text>

  <!--
    BOHR MODEL STANDARD
    ====================
    Nucleus at (200, 155). Shells: r=35, r=65.
    Electrons paired at compass points.
    Shell 1: 2e → 1 pair at top.
    Shell 2: 4e → 2 pairs (top, right).
    Total: 2 + 4 = 6 ✓
  -->

  <!-- Electron shells -->
  <circle cx="200" cy="155" r="35" stroke="#81c784" stroke-width="1.5" fill="none"/>
  <circle cx="200" cy="155" r="65" stroke="#81c784" stroke-width="1.5" fill="none"/>

  <!-- Nucleus -->
  <circle cx="200" cy="155" r="14" fill="#ff6b35"/>
  <text x="200" y="155" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">C</text>

  <!-- Shell 1 (2e): 1 pair at top, y=155-35=120 -->
  <circle cx="197" cy="120" r="4" fill="#4fc3f7"/>
  <circle cx="203" cy="120" r="4" fill="#4fc3f7"/>

  <!-- Shell 2 (4e): 2 pairs at top and right -->
  <!-- Top pair: y=155-65=90 -->
  <circle cx="197" cy="90" r="4" fill="#4fc3f7"/>
  <circle cx="203" cy="90" r="4" fill="#4fc3f7"/>
  <!-- Right pair: x=200+65=265 -->
  <circle cx="265" cy="152" r="4" fill="#4fc3f7"/>
  <circle cx="265" cy="158" r="4" fill="#4fc3f7"/>

  <!-- Electronic structure label -->
  <text x="200" y="240" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#ffffff">Electronic structure: 2, 4</text>
</svg>
