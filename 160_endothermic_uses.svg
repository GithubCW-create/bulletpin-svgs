<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Endothermic Reactions</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Take in energy from surroundings</text>

  <!-- Definition box -->
  <rect x="70" y="52" width="260" height="42" rx="6" ry="6" stroke="#4fc3f7" stroke-width="1.5" fill="none"/>
  <text x="200" y="66" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Temperature of surroundings DECREASES</text>
  <text x="200" y="82" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#4fc3f7">ΔH is positive (+)</text>

  <!-- Energy profile mini -->
  <line x1="100" y1="195" x2="100" y2="108" stroke="#ffffff" stroke-width="1.5"/>
  <polygon points="97,111 100,104 103,111" fill="#ffffff"/>
  <line x1="100" y1="195" x2="310" y2="195" stroke="#ffffff" stroke-width="1.5"/>
  <text x="92" y="150" text-anchor="end" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#ffffff">Energy</text>
  <!-- Reactant level line -->
  <line x1="115" y1="178" x2="150" y2="178" stroke="#ffffff" stroke-width="2"/>
  <!-- Curve: reactants low, products high -->
  <path d="M 150,178 Q 180,178 200,125 Q 215,108 230,130 Q 245,148 260,148" stroke="#4fc3f7" stroke-width="2" fill="none"/>
  <!-- Product level line -->
  <line x1="260" y1="148" x2="295" y2="148" stroke="#ffffff" stroke-width="2"/>
  <!-- Dashed extensions -->
  <line x1="115" y1="178" x2="115" y2="178" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="295" y1="148" x2="295" y2="148" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="132" y="188" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#ffffff">Reactants</text>
  <text x="278" y="142" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#ffffff">Products</text>
  <!-- ΔH arrow — bottom aligns with reactant line (y=178), top aligns with product line (y=148) -->
  <line x1="300" y1="178" x2="300" y2="148" stroke="#ef5350" stroke-width="1.5"/>
  <polygon points="297,152 300,148 303,152" fill="#ef5350"/>
  <text x="310" y="163" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ef5350">+ΔH</text>

  <!-- Examples -->
  <text x="200" y="210" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#81c784">Examples</text>
  <text x="200" y="228" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Thermal decomposition (e.g. CaCO₃ → CaO + CO₂)</text>
  <text x="200" y="244" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Citric acid + sodium hydrogencarbonate</text>
  <text x="200" y="260" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Photosynthesis</text>

  <!-- Uses -->
  <text x="200" y="282" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffb74d">Uses: sports injury cold packs</text>
</svg>