<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Hydrogen Fuel Cells</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Clean energy from hydrogen and oxygen</text>

  <!-- Fuel cell diagram — wider box -->
  <rect x="90" y="58" width="220" height="80" rx="4" ry="4" stroke="#4fc3f7" stroke-width="2" fill="none"/>

  <!-- Anode side -->
  <rect x="128" y="62" width="6" height="72" fill="#ef5350" opacity="0.4"/>
  <text x="118" y="72" text-anchor="end" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#ef5350">Anode</text>
  <text x="105" y="98" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">H₂</text>
  <path d="M 113,98 L 125,98" stroke="#ffffff" stroke-width="1" marker-end="url(#arrowW168)"/>

  <!-- Cathode side -->
  <rect x="266" y="62" width="6" height="72" fill="#81c784" opacity="0.4"/>
  <text x="282" y="72" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#81c784">Cathode</text>
  <text x="295" y="98" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">O₂</text>
  <path d="M 287,98 L 275,98" stroke="#ffffff" stroke-width="1" marker-end="url(#arrowW168)"/>

  <!-- Electrolyte -->
  <text x="200" y="98" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#4fc3f7">Electrolyte</text>

  <!-- Output -->
  <text x="200" y="125" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffb74d">→ Electricity + Water</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowW168" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0,0 L 6,3 L 0,6 Z" fill="#ffffff"/>
    </marker>
  </defs>

  <!-- Overall equation -->
  <text x="200" y="152" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">2H₂ + O₂ → 2H₂O</text>

  <!-- Advantages box -->
  <rect x="70" y="168" width="260" height="56" rx="6" ry="6" stroke="#81c784" stroke-width="1.5" fill="none"/>
  <text x="200" y="180" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" fill="#81c784">Advantages</text>
  <text x="200" y="194" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Only product is water — no CO₂ or pollution</text>
  <text x="200" y="208" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">More efficient than combustion engines</text>

  <!-- Disadvantages box -->
  <rect x="70" y="232" width="260" height="56" rx="6" ry="6" stroke="#ef5350" stroke-width="1.5" fill="none"/>
  <text x="200" y="244" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" fill="#ef5350">Disadvantages</text>
  <text x="200" y="258" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">H₂ made from fossil fuels (currently)</text>
  <text x="200" y="272" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Expensive, difficult to store H₂ safely</text>
</svg>