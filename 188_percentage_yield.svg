<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="200" y="20" font-size="15px" fill="#ffffff" font-weight="bold" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Percentage Yield</text>

  <!-- Subtitle -->
  <text x="200" y="35" font-size="12px" fill="#ffb74d" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Formula &amp; Concept</text>

  <!-- Formula Triangle -->
  <g>
    <!-- Triangle outline -->
    <polygon points="200,55 280,115 120,115" fill="none" stroke="#4fc3f7" stroke-width="2"/>

    <!-- Triangle divisions -->
    <line x1="140" y1="85" x2="260" y2="85" stroke="#4fc3f7" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="160" y1="70" x2="240" y2="70" stroke="#4fc3f7" stroke-width="1" stroke-dasharray="2,2"/>

    <!-- Labels in triangle -->
    <text x="200" y="62" font-size="13px" fill="#ef5350" font-weight="bold" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">% Yield</text>
    <text x="145" y="97" font-size="12px" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Actual</text>
    <text x="255" y="97" font-size="12px" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">× 100</text>
    <text x="200" y="108" font-size="12px" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Theoretical</text>
  </g>

  <!-- Formula box -->
  <rect x="80" y="130" width="240" height="35" fill="none" stroke="#4fc3f7" stroke-width="2" rx="4"/>
  <text x="200" y="148" font-size="13px" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">% yield = (actual ÷ theoretical) × 100</text>

  <!-- Why < 100% section -->
  <text x="85" y="180" font-size="12px" fill="#ffb74d" font-weight="bold" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Why yield &lt; 100%:</text>

  <text x="95" y="197" font-size="11px" fill="#ffffff" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">• Incomplete reactions</text>
  <text x="95" y="212" font-size="11px" fill="#ffffff" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">• Side reactions occur</text>
  <text x="95" y="227" font-size="11px" fill="#ffffff" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">• Product lost in transfer</text>
  <text x="95" y="242" font-size="11px" fill="#ffffff" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">• Product lost in filtration</text>

  <!-- Example box -->
  <rect x="80" y="255" width="240" height="35" fill="none" stroke="#81c784" stroke-width="1" stroke-dasharray="3,3" rx="3"/>
  <text x="200" y="268" font-size="11px" fill="#81c784" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">If 8g obtained from 10g theoretical: (8÷10)×100 = 80%</text>
</svg>