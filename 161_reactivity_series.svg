<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Reactivity Series</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Metals ranked by reactivity</text>

  <!-- Arrow on left — tip reaches header line (y=62), base at gold Au (y=276) -->
  <line x1="90" y1="276" x2="90" y2="62" stroke="#ef5350" stroke-width="2"/>
  <polygon points="87,66 90,62 93,66" fill="#ef5350"/>
  <text x="80" y="80" text-anchor="end" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ef5350">Most</text>
  <text x="80" y="92" text-anchor="end" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ef5350">reactive</text>
  <text x="80" y="260" text-anchor="end" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#81c784">Least</text>
  <text x="80" y="272" text-anchor="end" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#81c784">reactive</text>

  <!-- Table headers -->
  <text x="140" y="52" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" fill="#4fc3f7">Metal</text>
  <text x="260" y="52" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" fill="#4fc3f7">Extraction</text>
  <line x1="105" y1="62" x2="320" y2="62" stroke="#4fc3f7" stroke-width="1" opacity="0.4"/>

  <!-- Metals list -->
  <text x="140" y="76" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ef5350">Potassium (K)</text>
  <text x="140" y="92" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ef5350">Sodium (Na)</text>
  <text x="140" y="108" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ef5350">Lithium (Li)</text>
  <text x="140" y="124" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffb74d">Calcium (Ca)</text>
  <text x="140" y="140" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffb74d">Magnesium (Mg)</text>
  <text x="140" y="156" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffb74d">Aluminium (Al)</text>

  <!-- Electrolysis bracket -->
  <text x="260" y="116" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ef5350">Electrolysis</text>
  <path d="M 300,76 L 305,76 L 305,156 L 300,156" stroke="#ef5350" stroke-width="1" fill="none"/>

  <!-- Carbon line -->
  <line x1="105" y1="168" x2="195" y2="168" stroke="#81c784" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="235" y="168" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#81c784">← Carbon →</text>
  <line x1="275" y1="168" x2="320" y2="168" stroke="#81c784" stroke-width="1" stroke-dasharray="4 3"/>

  <text x="140" y="184" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Zinc (Zn)</text>
  <text x="140" y="200" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Iron (Fe)</text>
  <text x="140" y="216" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Tin (Sn)</text>

  <!-- Reduction bracket -->
  <text x="260" y="200" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#4fc3f7">Reduction with carbon</text>

  <!-- Hydrogen line -->
  <line x1="105" y1="228" x2="195" y2="228" stroke="#ffb74d" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="235" y="228" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffb74d">← Hydrogen →</text>
  <line x1="275" y1="228" x2="320" y2="228" stroke="#ffb74d" stroke-width="1" stroke-dasharray="4 3"/>

  <text x="140" y="244" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Copper (Cu)</text>
  <text x="140" y="260" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Silver (Ag)</text>
  <text x="140" y="276" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Gold (Au)</text>

  <text x="260" y="260" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#81c784">Found native</text>
</svg>