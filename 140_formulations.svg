<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Formulations</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Mixtures designed for a specific purpose</text>

  <!-- Definition -->
  <rect x="70" y="52" width="260" height="40" rx="6" ry="6" stroke="#4fc3f7" stroke-width="1.5" fill="none"/>
  <text x="200" y="65" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">A formulation is a mixture with a precise</text>
  <text x="200" y="79" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">quantity of each component for a specific use</text>

  <!-- Examples table — centred tight -->
  <text x="130" y="110" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Product</text>
  <text x="280" y="110" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Components</text>
  <line x1="80" y1="122" x2="340" y2="122" stroke="#4fc3f7" stroke-width="1" opacity="0.4"/>

  <text x="130" y="138" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Paints</text>
  <text x="280" y="138" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Pigment, binder, solvent</text>
  <line x1="80" y1="150" x2="340" y2="150" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>

  <text x="130" y="164" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Medicines</text>
  <text x="280" y="164" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Active ingredient, filler, coating</text>
  <line x1="80" y1="176" x2="340" y2="176" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>

  <text x="130" y="190" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Cleaning agents</text>
  <text x="280" y="190" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Surfactant, water, fragrance</text>
  <line x1="80" y1="202" x2="340" y2="202" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>

  <text x="130" y="216" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Fuels</text>
  <text x="280" y="216" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Blend of hydrocarbons</text>
  <line x1="80" y1="228" x2="340" y2="228" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>

  <text x="130" y="242" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Fertilisers</text>
  <text x="280" y="242" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">NPK — nitrogen, phosphorus, potassium</text>

  <text x="200" y="270" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffb74d">Each component is present in a measured quantity</text>
</svg>