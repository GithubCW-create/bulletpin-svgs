<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Gas Volume Calculations</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Molar volume at RTP = 24 dm³</text>

  <!-- Key fact box -->
  <rect x="70" y="52" width="260" height="42" rx="6" ry="6" stroke="#4fc3f7" stroke-width="1.5" fill="none"/>
  <text x="200" y="66" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">1 mole of ANY gas occupies 24 dm³</text>
  <text x="200" y="82" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">at room temperature and pressure (RTP)</text>

  <!-- Formula triangle -->
  <!-- Triangle: apex (200,102), base-left (125,186), base-right (275,186) — 150px wide, 84px tall -->
  <path d="M 200,102 L 125,186 L 275,186 Z" stroke="#4fc3f7" stroke-width="2" fill="none"/>
  <!-- Horizontal divider clipped to triangle edges at y=148 -->
  <!-- At y=148: left x = 125 + (200-125)*(186-148)/(186-102) = 125 + 75*38/84 = 125+33.9 ≈ 159 -->
  <!-- right x = 275 - (275-200)*(186-148)/(186-102) = 275 - 75*38/84 = 275-33.9 ≈ 241 -->
  <line x1="159" y1="148" x2="241" y2="148" stroke="#4fc3f7" stroke-width="1.5"/>

  <!-- Vertical divider from divider line down to base at x=200 -->
  <line x1="200" y1="148" x2="200" y2="186" stroke="#4fc3f7" stroke-width="1.5"/>

  <!-- Labels — Vol. (dm³) well inside top section with clearance from apex and edges -->
  <text x="200" y="136" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Vol. (dm³)</text>
  <text x="170" y="170" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Moles</text>
  <text x="235" y="170" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">24</text>

  <!-- Formulas -->
  <text x="200" y="200" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Volume = moles × 24</text>
  <text x="200" y="216" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Moles = volume ÷ 24</text>

  <!-- Worked example -->
  <text x="200" y="240" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#ffb74d">Example</text>
  <text x="200" y="258" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">0.5 mol of CO₂ at RTP</text>
  <text x="200" y="276" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Volume = 0.5 × 24 = 12 dm³</text>
</svg>