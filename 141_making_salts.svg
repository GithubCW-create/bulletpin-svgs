<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Making a Soluble Salt</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Required practical — acid + insoluble base</text>

  <!-- Step-by-step flow — centred vertical -->
  <rect x="80" y="52" width="240" height="24" rx="5" ry="5" stroke="#4fc3f7" stroke-width="1.5" fill="none"/>
  <text x="200" y="64" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">1. Warm the acid gently</text>
  <line x1="200" y1="76" x2="200" y2="86" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="200,86 196,81 204,81" fill="#4fc3f7"/>

  <rect x="80" y="88" width="240" height="24" rx="5" ry="5" stroke="#4fc3f7" stroke-width="1.5" fill="none"/>
  <text x="200" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">2. Add excess insoluble base, stir</text>
  <line x1="200" y1="112" x2="200" y2="122" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="200,122 196,117 204,117" fill="#4fc3f7"/>

  <rect x="80" y="124" width="240" height="24" rx="5" ry="5" stroke="#4fc3f7" stroke-width="1.5" fill="none"/>
  <text x="200" y="136" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">3. Filter to remove excess solid</text>
  <line x1="200" y1="148" x2="200" y2="158" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="200,158 196,153 204,153" fill="#4fc3f7"/>

  <rect x="80" y="160" width="240" height="24" rx="5" ry="5" stroke="#4fc3f7" stroke-width="1.5" fill="none"/>
  <text x="200" y="172" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">4. Evaporate water slowly → crystals form</text>

  <!-- Why excess? -->
  <rect x="80" y="200" width="240" height="28" rx="6" ry="6" stroke="#81c784" stroke-width="1.5" fill="none"/>
  <text x="200" y="214" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Excess base ensures all acid has reacted</text>

  <!-- Example equation -->
  <text x="200" y="248" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#ffb74d">Example</text>
  <text x="200" y="266" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">CuO + H₂SO₄ → CuSO₄ + H₂O</text>
  <text x="200" y="282" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#81c784">Copper oxide + sulfuric acid → copper sulfate + water</text>
</svg>