<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Dot-and-Cross — Methane</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">CH₄ (4 covalent bonds)</text>

  <!--
    CH₄ DOT-AND-CROSS
    ===================
    C at (200,95). H atoms at 35px. × y+2 for visual alignment with dots.
  -->

  <!-- Atom labels -->
  <text x="200" y="95" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#ff6b35">C</text>
  <text x="200" y="60" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="235" y="95" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="200" y="130" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="165" y="95" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>

  <!-- Shared pair: C—H top, midpoint y≈77. × y+1 -->
  <text x="197" y="78" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ff6b35">×</text>
  <circle cx="203" cy="77" r="2.5" fill="#ffffff"/>

  <!-- Shared pair: C—H right, midpoint x≈217.5 -->
  <text x="218" y="93" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ff6b35">×</text>
  <circle cx="218" cy="98" r="2.5" fill="#ffffff"/>

  <!-- Shared pair: C—H bottom, midpoint y≈112.5 -->
  <text x="197" y="114" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ff6b35">×</text>
  <circle cx="203" cy="113" r="2.5" fill="#ffffff"/>

  <!-- Shared pair: C—H left, midpoint x≈182.5 -->
  <text x="183" y="93" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ff6b35">×</text>
  <circle cx="183" cy="98" r="2.5" fill="#ffffff"/>

  <!-- Key (two lines, coloured symbols, matching dot size) -->
  <text x="158" y="153" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ff6b35">×</text>
  <text x="165" y="152" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff"> = C electron</text>
  <circle cx="158" cy="166" r="3" fill="#ffffff"/>
  <text x="165" y="165" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff"> = H electron</text>
</svg>
