<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Dot-and-Cross — Fluorine (F₂)</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Single covalent bond</text>

  <!--
    F₂ DOT-AND-CROSS
    =================
    F(a) at (182,75), F(b) at (218,75). 36px apart.
    1 shared pair at midpoint. Each F has 3 lone pairs.
    F(a) lone pairs: top, left, bottom. F(b) lone pairs: top, right, bottom.
    1-char offsets: ±14 top/bottom, ±16 left/right, pairs ±4px.
    • = F(a) electron. × = F(b) electron. Both #ce93d8.
  -->

  <!-- Atom labels -->
  <text x="182" y="75" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#ce93d8">F</text>
  <text x="218" y="75" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#ce93d8">F</text>

  <!-- Shared pair at midpoint (x=200) -->
  <circle cx="196" cy="75" r="3" fill="#ce93d8"/>
  <text x="204" y="76" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ce93d8">×</text>

  <!-- F(a) lone pairs (all •, purple) — 1-char offsets: ±14 top/bottom, ±16 left/right -->
  <!-- Top pair: y=75-14=61, x=182±4 -->
  <circle cx="178" cy="61" r="3" fill="#ce93d8"/>
  <circle cx="186" cy="61" r="3" fill="#ce93d8"/>
  <!-- Left pair: x=182-16=166, y=75±4 -->
  <circle cx="166" cy="71" r="3" fill="#ce93d8"/>
  <circle cx="166" cy="79" r="3" fill="#ce93d8"/>
  <!-- Bottom pair: y=75+14=89, x=182±4 -->
  <circle cx="178" cy="89" r="3" fill="#ce93d8"/>
  <circle cx="186" cy="89" r="3" fill="#ce93d8"/>

  <!-- F(b) lone pairs (all ×, purple) — 1-char offsets -->
  <!-- Top pair: y=61, x=218±4 -->
  <text x="214" y="62" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ce93d8">×</text>
  <text x="222" y="62" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ce93d8">×</text>
  <!-- Right pair: x=218+16=234, y=75±4 -->
  <text x="234" y="72" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ce93d8">×</text>
  <text x="234" y="80" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ce93d8">×</text>
  <!-- Bottom pair: y=89, x=218±4 -->
  <text x="214" y="90" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ce93d8">×</text>
  <text x="222" y="90" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ce93d8">×</text>

  <!-- Key -->
  <text x="176" y="125" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ce93d8">×</text>
  <text x="200" y="125" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">= F(b) electron</text>
  <circle cx="176" cy="140" r="3" fill="#ce93d8"/>
  <text x="200" y="140" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">= F(a) electron</text>
</svg>
