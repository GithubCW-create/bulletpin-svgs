<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Metallic Bonding</text>
  <text x="200" y="43" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Delocalised electrons in a sea around metal ions</text>

  <!-- Shaded background for "sea of electrons" -->
  <rect x="40" y="55" width="320" height="200" rx="8" fill="#1e2545" stroke="#4fc3f7" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Metal cations arranged in a grid (3 rows x 4 cols) -->
  <!-- Row 1: y=95 -->
  <circle cx="100" cy="95" r="22" fill="none" stroke="#4fc3f7" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="100" y="95" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#4fc3f7">+</text>

  <circle cx="200" cy="95" r="22" fill="none" stroke="#4fc3f7" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="200" y="95" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#4fc3f7">+</text>

  <circle cx="300" cy="95" r="22" fill="none" stroke="#4fc3f7" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="300" y="95" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#4fc3f7">+</text>

  <!-- Row 2: y=155 -->
  <circle cx="100" cy="155" r="22" fill="none" stroke="#4fc3f7" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="100" y="155" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#4fc3f7">+</text>

  <circle cx="200" cy="155" r="22" fill="none" stroke="#4fc3f7" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="200" y="155" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#4fc3f7">+</text>

  <circle cx="300" cy="155" r="22" fill="none" stroke="#4fc3f7" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="300" y="155" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#4fc3f7">+</text>

  <!-- Row 3: y=215 -->
  <circle cx="100" cy="215" r="22" fill="none" stroke="#4fc3f7" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="100" y="215" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#4fc3f7">+</text>

  <circle cx="200" cy="215" r="22" fill="none" stroke="#4fc3f7" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="200" y="215" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#4fc3f7">+</text>

  <circle cx="300" cy="215" r="22" fill="none" stroke="#4fc3f7" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="300" y="215" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#4fc3f7">+</text>

  <!-- Delocalised electrons (small dots scattered between ions) -->
  <!-- Between row 1 -->
  <circle cx="65" cy="78" r="3" fill="#ffb74d"/>
  <circle cx="145" cy="82" r="3" fill="#ffb74d"/>
  <circle cx="250" cy="76" r="3" fill="#ffb74d"/>
  <circle cx="340" cy="85" r="3" fill="#ffb74d"/>
  <!-- Between rows 1-2 -->
  <circle cx="60" cy="125" r="3" fill="#ffb74d"/>
  <circle cx="150" cy="120" r="3" fill="#ffb74d"/>
  <circle cx="248" cy="128" r="3" fill="#ffb74d"/>
  <circle cx="340" cy="122" r="3" fill="#ffb74d"/>
  <circle cx="80" cy="135" r="3" fill="#ffb74d"/>
  <circle cx="165" cy="140" r="3" fill="#ffb74d"/>
  <circle cx="230" cy="138" r="3" fill="#ffb74d"/>
  <circle cx="330" cy="142" r="3" fill="#ffb74d"/>
  <!-- Between rows 2-3 -->
  <circle cx="55" cy="185" r="3" fill="#ffb74d"/>
  <circle cx="148" cy="182" r="3" fill="#ffb74d"/>
  <circle cx="252" cy="188" r="3" fill="#ffb74d"/>
  <circle cx="345" cy="180" r="3" fill="#ffb74d"/>
  <circle cx="75" cy="195" r="3" fill="#ffb74d"/>
  <circle cx="160" cy="192" r="3" fill="#ffb74d"/>
  <circle cx="235" cy="198" r="3" fill="#ffb74d"/>
  <circle cx="320" cy="195" r="3" fill="#ffb74d"/>
  <!-- Below row 3 -->
  <circle cx="70" cy="240" r="3" fill="#ffb74d"/>
  <circle cx="155" cy="238" r="3" fill="#ffb74d"/>
  <circle cx="245" cy="242" r="3" fill="#ffb74d"/>
  <circle cx="340" cy="236" r="3" fill="#ffb74d"/>
  <!-- Extra scatter -->
  <circle cx="50" cy="100" r="3" fill="#ffb74d"/>
  <circle cx="350" cy="160" r="3" fill="#ffb74d"/>
  <circle cx="55" cy="215" r="3" fill="#ffb74d"/>
  <circle cx="350" cy="210" r="3" fill="#ffb74d"/>

  <!-- Key -->
  <circle cx="80" cy="275" r="3" fill="#ffb74d"/>
  <text x="88" y="278" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">= Delocalised electron</text>
  <circle cx="240" cy="275" r="8" fill="none" stroke="#4fc3f7" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="240" y="275" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#4fc3f7">+</text>
  <text x="254" y="278" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">= Metal ion</text>
</svg>