<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Rate of Reaction</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Effect of temperature on rate</text>

  <!--
    RATE OF REACTION GRAPH
    ======================
    Two curves showing volume of gas vs time at different temperatures.
    Higher temperature: steeper rise, reaches plateau sooner.
    Both curves reach the same final volume (same amount of reactant).
    Axis standards: label 20px from axis line.
  -->

  <!-- Axes -->
  <line x1="60" y1="230" x2="360" y2="230" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="60" y1="230" x2="60" y2="55" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>

  <!-- Axis arrows -->
  <polygon points="360,230 350,226 350,234" fill="#4fc3f7"/>
  <polygon points="60,55 56,65 64,65" fill="#4fc3f7"/>

  <!-- Axis labels (20px from axis line) -->
  <text x="40" y="140" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffffff" transform="rotate(-90 40 140)">Volume of gas (cm³)</text>
  <text x="210" y="250" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffffff">Time (s)</text>

  <!-- Plateau line (dashed, for reference) -->
  <line x1="60" y1="90" x2="340" y2="90" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>

  <!-- Higher temperature curve (steeper, plateaus sooner) — #ef5350 red-ish -->
  <path d="M 60,230 C 90,230 110,120 150,95 C 170,85 200,90 340,90" stroke="#ef5350" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Lower temperature curve (more gradual, plateaus later) — #81c784 green -->
  <path d="M 60,230 C 100,230 150,170 200,115 C 230,95 270,90 340,90" stroke="#81c784" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Curve labels -->
  <text x="160" y="78" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ef5350">Higher temperature</text>
  <text x="270" y="120" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#81c784">Lower temperature</text>

  <!-- Key -->
  <line x1="80" y1="270" x2="100" y2="270" stroke="#ef5350" stroke-width="2.5" stroke-linecap="round"/>
  <text x="108" y="270" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">Higher temperature</text>
  <line x1="230" y1="270" x2="250" y2="270" stroke="#81c784" stroke-width="2.5" stroke-linecap="round"/>
  <text x="258" y="270" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">Lower temperature</text>
</svg>
