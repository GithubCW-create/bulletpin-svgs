<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Particle Energy Distribution</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Why temperature affects rate of reaction</text>

  <!-- Axes -->
  <line x1="70" y1="220" x2="70" y2="60" stroke="#ffffff" stroke-width="1.5"/>
  <polygon points="67,63 70,56 73,63" fill="#ffffff"/>
  <line x1="70" y1="220" x2="350" y2="220" stroke="#ffffff" stroke-width="1.5"/>
  <polygon points="347,217 354,220 347,223" fill="#ffffff"/>

  <!-- Axis labels — close to axis -->
  <text x="55" y="140" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff" transform="rotate(-90 55 140)">Number of particles</text>
  <text x="210" y="236" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">Kinetic energy →</text>

  <!-- Lower temperature curve (blue) -->
  <path d="M 80,218 Q 120,216 140,170 Q 155,130 170,100 Q 185,80 195,82 Q 210,86 230,130 Q 260,185 300,210 Q 320,216 340,218" stroke="#4fc3f7" stroke-width="2" fill="none"/>

  <!-- Higher temperature curve (red) — lower peak, shifted right, longer tail -->
  <path d="M 80,218 Q 130,216 160,190 Q 180,168 200,145 Q 215,130 225,132 Q 240,136 260,160 Q 290,195 320,210 Q 340,216 350,218" stroke="#ef5350" stroke-width="2" fill="none" stroke-dasharray="6 3"/>

  <!-- Ea line — from x-axis up to just below peak of lower T curve -->
  <line x1="270" y1="220" x2="270" y2="80" stroke="#ffb74d" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="275" y="80" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#ffb74d">Ea</text>

  <!-- Labels for curves -->
  <text x="190" y="74" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#4fc3f7">Lower T</text>
  <text x="205" y="165" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ef5350">Higher T</text>

  <!-- Shaded area hint -->
  <text x="310" y="185" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#ffb74d">Particles</text>
  <text x="310" y="195" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#ffb74d">≥ Ea</text>

  <!-- Key points -->
  <text x="200" y="256" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Higher T → peak shifts right, more particles ≥ Ea</text>
  <text x="200" y="274" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Same total area under both curves (same number)</text>
  <text x="200" y="290" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Catalyst lowers Ea → more particles can react</text>
</svg>