<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <marker id="annArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 2 L 8 5 L 0 8" fill="none" stroke="#b0b0c8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="200" y="14" text-anchor="middle" dominant-baseline="central"
        font-family="Arial, Helvetica, sans-serif" font-size="14"
        font-weight="bold" fill="#ffffff">Effect of a catalyst on the rate of reaching equilibrium</text>

  <!-- Axes: scaled from 800Ã600 by 0.5x -->
  <!-- Y-axis: (60,50)â(60,540) becomes (30,25)â(30,270) -->
  <path d="M 30 25 L 30 270 L 375 270" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  <!-- Y-axis arrowhead -->
  <path d="M 35 32.5 L 30 22.5 L 25 32.5" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- X-axis arrowhead -->
  <path d="M 365 265 L 375 270 L 365 275" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Axis labels -->
  <text x="202" y="290" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff" letter-spacing="1">TIME</text>
  <text x="15" y="148" text-anchor="middle" transform="rotate(-90 15,148)"
        font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff" letter-spacing="1">RATE</text>

  <!-- Forward rate (solid, cyan #00BFFF) -->
  <!-- Original: M 80 80 Q 250 298 500 298 L 760 298 â scaled 0.5x -->
  <path d="M 40 40 Q 125 149 250 149 L 330 149" fill="none" stroke="#00BFFF" stroke-width="3" stroke-linecap="round"/>

  <!-- Forward rate with catalyst (dashed, cyan #00BFFF) -->
  <!-- Original: M 80 80 Q 150 298 300 298 L 760 298 â scaled 0.5x -->
  <path d="M 40 40 Q 75 149 150 149 L 330 149" fill="none" stroke="#00BFFF" stroke-width="3" stroke-dasharray="8 6" stroke-linecap="round"/>

  <!-- Backward rate (solid, amber #FFC400) -->
  <!-- Original: M 80 520 Q 250 302 500 302 L 760 302 â scaled 0.5x -->
  <path d="M 40 260 Q 125 151 250 151 L 330 151" fill="none" stroke="#FFC400" stroke-width="3" stroke-linecap="round"/>

  <!-- Backward rate with catalyst (dashed, amber #FFC400) -->
  <!-- Original: M 80 520 Q 150 302 300 302 L 760 302 â scaled 0.5x -->
  <path d="M 40 260 Q 75 151 150 151 L 330 151" fill="none" stroke="#FFC400" stroke-width="3" stroke-dasharray="8 6" stroke-linecap="round"/>

  <!-- Annotation: FORWARD RATE -->
  <!-- Original text at (240,130), circle at (230,125), leader to (140,145) â scaled 0.5x -->
  <text x="120" y="65" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#b0b0c8" letter-spacing="0.5">FORWARD RATE</text>
  <path d="M 113.5 62.5 Q 90 62.5 70 72.5" fill="none" stroke="#b0b0c8" stroke-width="1" marker-end="url(#annArrow)"/>

  <!-- Annotation: FORWARD RATE WITH CATALYST -->
  <!-- Original text at (400,215), circle at (390,210), leader to (170,230) â scaled 0.5x -->
  <text x="160" y="100" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#b0b0c8" letter-spacing="0.5">FORWARD RATE</text>
  <text x="160" y="114" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#b0b0c8" letter-spacing="0.5">WITH CATALYST</text>
  <path d="M 153.5 107 Q 120 107 85 115" fill="none" stroke="#b0b0c8" stroke-width="1" marker-end="url(#annArrow)"/>

  <!-- Annotation: BACKWARD RATE WITH CATALYST -->
  <!-- Original text at (430,415), circle at (420,410), leader to (200,380) â scaled 0.5x -->
  <text x="160" y="200" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#b0b0c8" letter-spacing="0.5">BACKWARD RATE</text>
  <text x="160" y="214" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#b0b0c8" letter-spacing="0.5">WITH CATALYST</text>
  <path d="M 153.5 207 Q 120 207 85 190" fill="none" stroke="#b0b0c8" stroke-width="1" marker-end="url(#annArrow)"/>

  <!-- Annotation: BACKWARD RATE -->
  <!-- Original text at (240,490), circle at (230,485), leader to (150,450) â scaled 0.5x -->
  <text x="120" y="245" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#b0b0c8" letter-spacing="0.5">BACKWARD RATE</text>
  <path d="M 113.5 242.5 Q 90 242.5 75 225" fill="none" stroke="#b0b0c8" stroke-width="1" marker-end="url(#annArrow)"/>

</svg>
