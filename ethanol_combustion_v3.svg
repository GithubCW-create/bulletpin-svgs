<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260">
  <rect width="400" height="260" fill="#1a1a2e"/>

  <text x="200" y="18" text-anchor="middle" dominant-baseline="central"
        font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Combustion of Ethanol</text>

  <!-- Row 1: Ethanol + 3O2 -->
  <text x="113" y="75" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff">C</text>
  <text x="113" y="51" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff">H</text>
  <line x1="113" y1="67" x2="113" y2="59" stroke="#ffffff" stroke-width="1"/>
  <text x="113" y="99" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff">H</text>
  <line x1="113" y1="83" x2="113" y2="91" stroke="#ffffff" stroke-width="1"/>
  <text x="91" y="75" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff">H</text>
  <line x1="105" y1="75" x2="99" y2="75" stroke="#ffffff" stroke-width="1"/>
  <line x1="121" y1="75" x2="127" y2="75" stroke="#ffffff" stroke-width="1"/>
  <text x="135" y="75" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff">C</text>
  <text x="135" y="51" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff">H</text>
  <line x1="135" y1="67" x2="135" y2="59" stroke="#ffffff" stroke-width="1"/>
  <text x="135" y="99" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff">H</text>
  <line x1="135" y1="83" x2="135" y2="91" stroke="#ffffff" stroke-width="1"/>
  <line x1="143" y1="75" x2="149" y2="75" stroke="#ff6b6b" stroke-width="1"/>
  <text x="157" y="75" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ff6b6b">O</text>
  <line x1="165" y1="75" x2="171" y2="75" stroke="#ff6b6b" stroke-width="1"/>
  <text x="179" y="75" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ff6b6b">H</text>
  <text x="203" y="75" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#2ecc71">+</text>
  <text x="238" y="75" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff">3O<tspan baseline-shift="sub" font-size="0.75em">2</tspan></text>
  <line x1="185" y1="107" x2="185" y2="157" stroke="#2ecc71" stroke-width="3"/>
  <polygon points="185,165 179,155 191,155" fill="#2ecc71"/>
  <rect x="163" y="122" width="44" height="20" fill="#1a1a2e"/>
  <text x="185" y="132" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#2ecc71" font-weight="bold">HEAT</text>

  <!-- Row 2: 3H2O + 2CO2 -->
  <text x="150" y="195" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff">3H<tspan baseline-shift="sub" font-size="0.75em">2</tspan>O</text>
  <text x="185" y="195" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#2ecc71">+</text>
  <text x="220" y="195" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff">2CO<tspan baseline-shift="sub" font-size="0.75em">2</tspan></text>
  <text x="185" y="220" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#b0b0c8">COMPLETE COMBUSTION</text>
</svg>
