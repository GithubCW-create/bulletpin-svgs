<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Giant Covalent Structure — Graphite</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Layers of hexagonal carbon rings</text>

  <!--
    GRAPHITE STRUCTURE
    ====================
    Two layers of hexagonal rings with gap between them.
    Weak intermolecular forces between layers.
    Delocalised electrons within layers.
  -->

  <!-- Top layer — hexagonal rings -->
  <!-- Ring 1 -->
  <line x1="140" y1="70" x2="165" y2="56" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="165" y1="56" x2="195" y2="56" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="195" y1="56" x2="220" y2="70" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="220" y1="70" x2="195" y2="84" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="195" y1="84" x2="165" y2="84" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="165" y1="84" x2="140" y2="70" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>

  <!-- Ring 2 (adjacent) -->
  <line x1="220" y1="70" x2="245" y2="56" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="245" y1="56" x2="275" y2="56" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="275" y1="56" x2="300" y2="70" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="300" y1="70" x2="275" y2="84" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="275" y1="84" x2="245" y2="84" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="245" y1="84" x2="220" y2="70" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>

  <!-- Ring 3 (below ring 1) -->
  <line x1="165" y1="84" x2="140" y2="98" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="140" y1="98" x2="165" y2="112" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="165" y1="112" x2="195" y2="112" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="195" y1="112" x2="220" y2="98" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="220" y1="98" x2="195" y2="84" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>

  <!-- Atom dots on top layer -->
  <circle cx="140" cy="70" r="5" fill="#ff6b35"/>
  <circle cx="165" cy="56" r="5" fill="#ff6b35"/>
  <circle cx="195" cy="56" r="5" fill="#ff6b35"/>
  <circle cx="220" cy="70" r="5" fill="#ff6b35"/>
  <circle cx="195" cy="84" r="5" fill="#ff6b35"/>
  <circle cx="165" cy="84" r="5" fill="#ff6b35"/>
  <circle cx="245" cy="56" r="5" fill="#ff6b35"/>
  <circle cx="275" cy="56" r="5" fill="#ff6b35"/>
  <circle cx="300" cy="70" r="5" fill="#ff6b35"/>
  <circle cx="275" cy="84" r="5" fill="#ff6b35"/>
  <circle cx="245" cy="84" r="5" fill="#ff6b35"/>
  <circle cx="140" cy="98" r="5" fill="#ff6b35"/>
  <circle cx="165" cy="112" r="5" fill="#ff6b35"/>
  <circle cx="195" cy="112" r="5" fill="#ff6b35"/>
  <circle cx="220" cy="98" r="5" fill="#ff6b35"/>

  <!-- Bottom layer (offset, slightly lower and right) -->
  <line x1="155" y1="145" x2="180" y2="131" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="180" y1="131" x2="210" y2="131" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="210" y1="131" x2="235" y2="145" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="235" y1="145" x2="210" y2="159" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="210" y1="159" x2="180" y2="159" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="180" y1="159" x2="155" y2="145" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <line x1="235" y1="145" x2="260" y2="131" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="260" y1="131" x2="290" y2="131" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="290" y1="131" x2="315" y2="145" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="315" y1="145" x2="290" y2="159" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="290" y1="159" x2="260" y2="159" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="260" y1="159" x2="235" y2="145" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Bottom layer atoms -->
  <circle cx="155" cy="145" r="4" fill="#ff6b35" opacity="0.5"/>
  <circle cx="180" cy="131" r="4" fill="#ff6b35" opacity="0.5"/>
  <circle cx="210" cy="131" r="4" fill="#ff6b35" opacity="0.5"/>
  <circle cx="235" cy="145" r="4" fill="#ff6b35" opacity="0.5"/>
  <circle cx="210" cy="159" r="4" fill="#ff6b35" opacity="0.5"/>
  <circle cx="180" cy="159" r="4" fill="#ff6b35" opacity="0.5"/>
  <circle cx="260" cy="131" r="4" fill="#ff6b35" opacity="0.5"/>
  <circle cx="290" cy="131" r="4" fill="#ff6b35" opacity="0.5"/>
  <circle cx="315" cy="145" r="4" fill="#ff6b35" opacity="0.5"/>
  <circle cx="290" cy="159" r="4" fill="#ff6b35" opacity="0.5"/>
  <circle cx="260" cy="159" r="4" fill="#ff6b35" opacity="0.5"/>

  <!-- Weak forces label between layers — shifted left for phone width -->
  <text x="60" y="130" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">Weak forces</text>
  <text x="60" y="142" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">between layers</text>
  <!-- Arrow pointing from label to gap between layers -->
  <line x1="115" y1="136" x2="138" y2="136" stroke="#ffffff" stroke-width="0.8" stroke-linecap="round"/>
  <polygon points="138,136 132,133 132,139" fill="#ffffff"/>

  <!-- Properties -->
  <text x="200" y="195" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Soft (layers slide) • Conducts electricity • High mp</text>
  <text x="200" y="210" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">3 bonds per C → 1 delocalised electron per atom</text>
</svg>
