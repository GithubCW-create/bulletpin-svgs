<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Paper Chromatography</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Separating dissolved substances</text>

  <!-- Chromatography paper diagram -->
  <rect x="140" y="55" width="120" height="160" rx="2" ry="2" stroke="#4fc3f7" stroke-width="1.5" fill="none"/>

  <!-- Solvent front -->
  <line x1="142" y1="75" x2="258" y2="75" stroke="#4fc3f7" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="270" y="75" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#4fc3f7">Solvent front</text>

  <!-- Spots at different heights -->
  <circle cx="175" cy="100" r="5" fill="#ef5350" opacity="0.7"/>
  <circle cx="175" cy="140" r="5" fill="#81c784" opacity="0.7"/>
  <circle cx="225" cy="120" r="5" fill="#ffb74d" opacity="0.7"/>
  <circle cx="225" cy="140" r="5" fill="#81c784" opacity="0.7"/>

  <!-- Origin/baseline -->
  <line x1="142" y1="195" x2="258" y2="195" stroke="#ffffff" stroke-width="1"/>
  <text x="270" y="195" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#ffffff">Baseline (pencil)</text>

  <!-- Start spots -->
  <circle cx="175" cy="195" r="3" fill="#ffffff" opacity="0.5"/>
  <circle cx="225" cy="195" r="3" fill="#ffffff" opacity="0.5"/>
  <text x="175" y="207" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#ffffff">A</text>
  <text x="225" y="207" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#ffffff">B</text>

  <!-- Solvent at base -->
  <rect x="142" y="200" width="116" height="13" fill="#4fc3f7" opacity="0.08"/>
  <text x="270" y="206" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#4fc3f7">Solvent</text>

  <!-- Rf formula -->
  <text x="200" y="236" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Rf value</text>
  <rect x="80" y="246" width="240" height="36" rx="6" ry="6" stroke="#ffb74d" stroke-width="1.5" fill="none"/>
  <text x="200" y="258" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">Rf = distance moved by substance</text>
  <text x="200" y="274" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">÷ distance moved by solvent</text>
</svg>