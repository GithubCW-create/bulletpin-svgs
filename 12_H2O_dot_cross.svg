<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>

  <!--
    Vertical Rhythm: Title(20) → Subtitle(35) → Diagram(68) → Annotation(+13) → Key(+20)
    Dot-and-Cross Grid: top/bottom ±14, left/right ±16, pairs ±4
    H₂O: O has 6 outer e⁻ (×). Each H has 1 (○ dot). 2 shared pairs (×○), 2 lone pairs (××) on O.
    Layout: H left, O centre, H right. Lone pairs top and bottom of O.
    Atom distances: 35px (matching NH₃ standard).
  -->

  <!-- Title -->
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Dot-and-Cross — Water</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">H₂O (covalent bonding)</text>

  <!-- O centre: x=200, y=68 -->
  <text x="200" y="68" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#ffb74d">O</text>

  <!-- Lone pair ××: top of O, y=68-14=54, x=200±4 -->
  <text x="196" y="54" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">×</text>
  <text x="204" y="54" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">×</text>

  <!-- Lone pair ××: bottom of O, y=68+14=82, x=200±4 -->
  <text x="196" y="82" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">×</text>
  <text x="204" y="82" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">×</text>

  <!-- LEFT H: x=200-35=165, y=68 -->
  <text x="165" y="68" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">H</text>
  <!-- Shared pair between left H and O: midpoint x=183, y=68±4 -->
  <text x="183" y="64" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">×</text>
  <circle cx="183" cy="72" r="2.5" fill="#ffffff"/>

  <!-- RIGHT H: x=200+35=235, y=68 -->
  <text x="235" y="68" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">H</text>
  <!-- Shared pair between O and right H: midpoint x=217, y=68±4 -->
  <text x="217" y="64" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">×</text>
  <circle cx="217" cy="72" r="2.5" fill="#ffffff"/>

  <!-- Annotation: y = 82 + 13 = 95 -->
  <text x="200" y="95" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#81c784">2 bonding pairs, 2 lone pairs on O</text>

  <!-- Key: y = 95 + 20 = 115 -->
  <circle cx="110" cy="115" r="2.5" fill="#ffffff"/>
  <text x="118" y="115" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">= H electron (dot)</text>
  <text x="225" y="115" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">×</text>
  <text x="235" y="115" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">= O electron (cross)</text>
</svg>