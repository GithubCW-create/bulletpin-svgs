<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="200" y="24" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold">Bohr Model — Electron Shells</text>

  <!-- Electron shells (3 concentric circles) -->
  <circle cx="200" cy="158" r="110" fill="none" stroke="#81c784" stroke-width="1.5" opacity="0.6"/>
  <circle cx="200" cy="158" r="75" fill="none" stroke="#81c784" stroke-width="1.5" opacity="0.7"/>
  <circle cx="200" cy="158" r="40" fill="none" stroke="#81c784" stroke-width="1.5" opacity="0.8"/>

  <!-- Shell labels -->
  <text x="318" y="162" fill="#81c784" font-family="Arial" font-size="11" opacity="0.8">n = 3</text>
  <text x="280" y="162" fill="#81c784" font-family="Arial" font-size="11" opacity="0.8">n = 2</text>
  <text x="244" y="162" fill="#81c784" font-family="Arial" font-size="11" opacity="0.8">n = 1</text>

  <!-- Nucleus -->
  <circle cx="200" cy="158" r="14" fill="#ff6b35"/>
  <text x="200" y="155" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="8" font-weight="bold">p⁺ n⁰</text>
  <text x="200" y="165" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="7">nucleus</text>

  <!-- Electrons on shell 1 (max 2) -->
  <circle cx="200" cy="118" r="5" fill="#4fc3f7"/>
  <text x="200" y="121" text-anchor="middle" fill="#1a1a2e" font-family="Arial" font-size="6" font-weight="bold">e⁻</text>
  <circle cx="200" cy="198" r="5" fill="#4fc3f7"/>
  <text x="200" y="201" text-anchor="middle" fill="#1a1a2e" font-family="Arial" font-size="6" font-weight="bold">e⁻</text>

  <!-- Electrons on shell 2 (showing 4 of max 8 for clarity) -->
  <circle cx="125" cy="158" r="5" fill="#4fc3f7"/>
  <circle cx="275" cy="158" r="5" fill="#4fc3f7"/>
  <circle cx="147" cy="105" r="5" fill="#4fc3f7"/>
  <circle cx="253" cy="105" r="5" fill="#4fc3f7"/>
  <circle cx="147" cy="211" r="5" fill="#4fc3f7"/>
  <circle cx="253" cy="211" r="5" fill="#4fc3f7"/>
  <circle cx="165" cy="90" r="5" fill="#4fc3f7"/>
  <circle cx="235" cy="226" r="5" fill="#4fc3f7"/>

  <!-- Electrons on shell 3 (showing 3 for illustration) -->
  <circle cx="90" cy="158" r="5" fill="#4fc3f7"/>
  <circle cx="248" cy="60" r="5" fill="#4fc3f7"/>
  <circle cx="152" cy="256" r="5" fill="#4fc3f7"/>

  <!-- Key at bottom -->
  <circle cx="60" cy="285" r="4" fill="#ff6b35"/>
  <text x="70" y="288" fill="#ffffff" font-family="Arial" font-size="10">= Nucleus</text>
  <circle cx="150" cy="285" r="4" fill="#4fc3f7"/>
  <text x="160" y="288" fill="#ffffff" font-family="Arial" font-size="10">= Electron</text>
  <line x1="230" y1="285" x2="260" y2="285" stroke="#81c784" stroke-width="1.5"/>
  <text x="266" y="288" fill="#ffffff" font-family="Arial" font-size="10">= Shell</text>
</svg>
