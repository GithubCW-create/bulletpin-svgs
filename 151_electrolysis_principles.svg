<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Electrolysis Principles</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Using electricity to decompose ionic compounds</text>

  <!-- Definition -->
  <rect x="70" y="52" width="260" height="42" rx="6" ry="6" stroke="#4fc3f7" stroke-width="1.5" fill="none"/>
  <text x="200" y="66" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Electrolyte = molten or dissolved ionic compound</text>
  <text x="200" y="82" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Must be liquid so ions can move freely</text>

  <!-- Cathode and anode -->
  <text x="120" y="112" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#ef5350">Cathode (−)</text>
  <text x="280" y="112" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Anode (+)</text>

  <rect x="60" y="124" width="120" height="55" rx="6" ry="6" stroke="#ef5350" stroke-width="1.5" fill="none"/>
  <text x="120" y="138" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Positive ions (cations)</text>
  <text x="120" y="153" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">attracted here</text>
  <text x="120" y="170" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Gain electrons (reduction)</text>

  <rect x="220" y="124" width="120" height="55" rx="6" ry="6" stroke="#4fc3f7" stroke-width="1.5" fill="none"/>
  <text x="280" y="138" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Negative ions (anions)</text>
  <text x="280" y="153" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">attracted here</text>
  <text x="280" y="170" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Lose electrons (oxidation)</text>

  <!-- OILRIG -->
  <rect x="70" y="194" width="260" height="28" rx="6" ry="6" stroke="#ffb74d" stroke-width="1.5" fill="none"/>
  <text x="200" y="208" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" fill="#ffb74d">OIL RIG: Oxidation Is Loss, Reduction Is Gain</text>

  <!-- Aqueous rules -->
  <text x="200" y="240" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">In aqueous solution</text>
  <text x="200" y="258" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Cathode: metal if less reactive than H, else H₂</text>
  <text x="200" y="274" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Anode: O₂ unless halide present → halogen gas</text>
</svg>