<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="200" y="20" font-size="15px" fill="#ffffff" font-weight="bold" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Water Treatment Process</text>

  <!-- Subtitle -->
  <text x="200" y="35" font-size="12px" fill="#ffb74d" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Potable water production</text>

  <!-- Source -->
  <text x="200" y="55" font-size="12px" fill="#4fc3f7" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Source: Rainwater reservoirs (UK)</text>

  <!-- Step 1: Filtration -->
  <rect x="80" y="75" width="80" height="50" fill="none" stroke="#4fc3f7" stroke-width="2" rx="3"/>
  <text x="120" y="95" font-size="12px" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Filtration</text>
  <text x="120" y="110" font-size="10px" fill="#ffb74d" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Remove debris</text>

  <!-- Arrow 1 -->
  <line x1="160" y1="100" x2="200" y2="100" stroke="#81c784" stroke-width="2"/>
  <polygon points="200,100 192,96 192,104" fill="#81c784"/>

  <!-- Step 2: Sedimentation -->
  <rect x="200" y="75" width="80" height="50" fill="none" stroke="#ce93d8" stroke-width="2" rx="3"/>
  <text x="240" y="95" font-size="12px" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Sedimentation</text>
  <text x="240" y="110" font-size="10px" fill="#ffb74d" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Settle particles</text>

  <!-- Arrow 2 -->
  <line x1="240" y1="125" x2="240" y2="160" stroke="#81c784" stroke-width="2"/>
  <polygon points="240,160 236,152 244,152" fill="#81c784"/>

  <!-- Step 3: Chlorination -->
  <rect x="200" y="160" width="80" height="50" fill="none" stroke="#ef5350" stroke-width="2" rx="3"/>
  <text x="240" y="180" font-size="12px" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Chlorination</text>
  <text x="240" y="195" font-size="10px" fill="#ffb74d" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Kill bacteria</text>

  <!-- Potable water result -->
  <text x="200" y="235" font-size="12px" fill="#81c784" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Potable water safe to drink</text>

  <!-- Desalination note -->
  <rect x="90" y="250" width="220" height="35" fill="none" stroke="#4fc3f7" stroke-width="1" rx="2"/>
  <text x="200" y="260" font-size="11px" fill="#4fc3f7" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">For saltwater: Desalination</text>
  <text x="200" y="273" font-size="10px" fill="#ffb74d" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Distillation or reverse osmosis</text>
</svg>