<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="200" y="20" font-size="15px" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Making a Pure Dry Salt</text>

  <!-- Subtitle -->
  <text x="200" y="35" font-size="12px" fill="#ffb74d" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Required Practical</text>

  <!-- Example equation box -->
  <rect x="60" y="48" width="280" height="22" fill="#1a1a2e" stroke="#4fc3f7" stroke-width="1"/>
  <text x="200" y="63" font-size="11px" fill="#4fc3f7" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">CuO + H₂SO₄ → CuSO₄ + H₂O</text>

  <!-- STEP 1 -->
  <!-- Circle with number -->
  <circle cx="85" cy="98" r="10" fill="none" stroke="#ffb74d" stroke-width="1"/>
  <text x="85" y="98" font-size="12px" fill="#ffb74d" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central" font-weight="bold">1</text>

  <!-- Step 1 box -->
  <rect x="105" y="88" width="230" height="24" fill="#1a1a2e" stroke="#ffb74d" stroke-width="1"/>
  <text x="220" y="100" font-size="10px" fill="#ffffff" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Add excess CuO to warm H₂SO₄</text>

  <!-- Arrow 1 -->
  <line x1="200" y1="112" x2="200" y2="122" stroke="#ffffff" stroke-width="1"/>
  <polygon points="200,122 196,116 204,116" fill="#ffffff"/>

  <!-- STEP 2 -->
  <!-- Circle with number -->
  <circle cx="85" cy="132" r="10" fill="none" stroke="#ffb74d" stroke-width="1"/>
  <text x="85" y="132" font-size="12px" fill="#ffb74d" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central" font-weight="bold">2</text>

  <!-- Step 2 box -->
  <rect x="105" y="122" width="230" height="24" fill="#1a1a2e" stroke="#ffb74d" stroke-width="1"/>
  <text x="220" y="134" font-size="10px" fill="#ffffff" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Filter to remove excess solid</text>

  <!-- Arrow 2 -->
  <line x1="200" y1="146" x2="200" y2="156" stroke="#ffffff" stroke-width="1"/>
  <polygon points="200,156 196,150 204,150" fill="#ffffff"/>

  <!-- STEP 3 -->
  <!-- Circle with number -->
  <circle cx="85" cy="166" r="10" fill="none" stroke="#ffb74d" stroke-width="1"/>
  <text x="85" y="166" font-size="12px" fill="#ffb74d" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central" font-weight="bold">3</text>

  <!-- Step 3 box -->
  <rect x="105" y="156" width="230" height="24" fill="#1a1a2e" stroke="#ffb74d" stroke-width="1"/>
  <text x="220" y="168" font-size="10px" fill="#ffffff" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Evaporate filtrate slowly</text>

  <!-- Arrow 3 -->
  <line x1="200" y1="180" x2="200" y2="190" stroke="#ffffff" stroke-width="1"/>
  <polygon points="200,190 196,184 204,184" fill="#ffffff"/>

  <!-- STEP 4 -->
  <!-- Circle with number -->
  <circle cx="85" cy="200" r="10" fill="none" stroke="#ffb74d" stroke-width="1"/>
  <text x="85" y="200" font-size="12px" fill="#ffb74d" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central" font-weight="bold">4</text>

  <!-- Step 4 box -->
  <rect x="105" y="190" width="230" height="24" fill="#1a1a2e" stroke="#ffb74d" stroke-width="1"/>
  <text x="220" y="202" font-size="10px" fill="#ffffff" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Pat dry with filter paper</text>

  <!-- KEY POINTS -->
  <text x="200" y="230" font-size="10px" fill="#81c784" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Excess base ensures all acid reacts</text>

  <text x="200" y="246" font-size="10px" fill="#81c784" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Slow evaporation gives larger crystals</text>

  <text x="200" y="262" font-size="10px" fill="#ffffff" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Suitable for insoluble base + acid</text>
</svg>