<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Dot-and-Cross — Chlorine (Cl₂)</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Single covalent bond</text>

  <!--
    Cl₂ DOT-AND-CROSS
    ==================
    Cl(a) at (182,75), Cl(b) at (218,75). 36px apart.
    1 shared pair at midpoint. Each Cl has 3 lone pairs.
    Cl(a) lone pairs: top, left, bottom. Cl(b) lone pairs: top, right, bottom.
    2-char label offsets: ±18 top/bottom, ±22 left/right, pairs ±4px.
    • = Cl(a) electron (#ce93d8). × = Cl(b) electron (#ce93d8).
  -->

  <!-- Atom labels -->
  <text x="182" y="75" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#ce93d8">Cl</text>
  <text x="218" y="75" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#ce93d8">Cl</text>

  <!-- Shared pair at midpoint (x=200) -->
  <circle cx="196" cy="75" r="3" fill="#ce93d8"/>
  <text x="204" y="76" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ce93d8">×</text>

  <!-- Cl(a) lone pairs (all •, purple) — 2-char offsets: ±18 top/bottom, ±22 left/right -->
  <!-- Top pair: y=75-18=57, x=182±4 -->
  <circle cx="178" cy="57" r="3" fill="#ce93d8"/>
  <circle cx="186" cy="57" r="3" fill="#ce93d8"/>
  <!-- Left pair: x=182-22=160, y=75±4 -->
  <circle cx="160" cy="71" r="3" fill="#ce93d8"/>
  <circle cx="160" cy="79" r="3" fill="#ce93d8"/>
  <!-- Bottom pair: y=75+18=93, x=182±4 -->
  <circle cx="178" cy="93" r="3" fill="#ce93d8"/>
  <circle cx="186" cy="93" r="3" fill="#ce93d8"/>

  <!-- Cl(b) lone pairs (all ×, purple) — 2-char offsets -->
  <!-- Top pair: y=57, x=218±4 -->
  <text x="214" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ce93d8">×</text>
  <text x="222" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ce93d8">×</text>
  <!-- Right pair: x=218+22=240, y=75±4 -->
  <text x="240" y="72" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ce93d8">×</text>
  <text x="240" y="80" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ce93d8">×</text>
  <!-- Bottom pair: y=93, x=218±4 -->
  <text x="214" y="94" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ce93d8">×</text>
  <text x="222" y="94" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ce93d8">×</text>

  <!-- Key -->
  <text x="176" y="130" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ce93d8">×</text>
  <text x="200" y="130" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">= Cl(b) electron</text>
  <circle cx="176" cy="145" r="3" fill="#ce93d8"/>
  <text x="200" y="145" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">= Cl(a) electron</text>
</svg>
