<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Titration</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Finding the concentration of a solution</text>

  <!-- Burette — centred -->
  <rect x="188" y="55" width="24" height="85" rx="2" ry="2" stroke="#4fc3f7" stroke-width="2" fill="none"/>
  <!-- Scale marks -->
  <line x1="188" y1="70" x2="192" y2="70" stroke="#4fc3f7" stroke-width="1"/>
  <line x1="188" y1="85" x2="192" y2="85" stroke="#4fc3f7" stroke-width="1"/>
  <line x1="188" y1="100" x2="192" y2="100" stroke="#4fc3f7" stroke-width="1"/>
  <line x1="188" y1="115" x2="192" y2="115" stroke="#4fc3f7" stroke-width="1"/>
  <!-- Liquid in burette -->
  <rect x="190" y="75" width="20" height="63" fill="#ef5350" opacity="0.3"/>
  <!-- Tap -->
  <line x1="195" y1="140" x2="205" y2="140" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <!-- Nozzle -->
  <line x1="200" y1="140" x2="200" y2="155" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Burette label — right side -->
  <text x="225" y="85" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ef5350">Burette</text>
  <text x="225" y="97" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">(acid)</text>

  <!-- Conical flask — Erlenmeyer shape using path -->
  <!-- Wide flat base, sides slope inward to narrow neck -->
  <path d="M 168,215 L 168,210 L 192,165 L 208,165 L 232,210 L 232,215 Z"
        stroke="#4fc3f7" stroke-width="2" fill="none" stroke-linejoin="round"/>
  <!-- Liquid fill — fills from flask base up -->
  <path d="M 168,215 L 183,188 L 217,188 L 232,215 Z"
        fill="#81c784" opacity="0.2"/>
  <!-- Flask label — left side, close to flask, centred to flask height -->
  <text x="155" y="182" text-anchor="end" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#81c784">Conical flask</text>
  <text x="155" y="194" text-anchor="end" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">(known vol +</text>
  <text x="155" y="206" text-anchor="end" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">indicator)</text>

  <!-- Drip from burette into flask -->
  <circle cx="200" cy="160" r="1.5" fill="#ef5350" opacity="0.6"/>

  <!-- Key steps -->
  <text x="200" y="235" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Key steps</text>
  <text x="200" y="251" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">1. Pipette known volume of alkali into flask</text>
  <text x="200" y="264" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">2. Add indicator (e.g. phenolphthalein)</text>
  <text x="200" y="277" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffffff">3. Add acid from burette until colour change</text>
  <text x="200" y="290" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffb74d">Record titre — repeat for concordant results</text>
</svg>