<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Gas Volume vs Time</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Effect of surface area on rate</text>

  <!--
    GAS VOLUME COLLECTION GRAPH — FIXED
    ======================================
    FIX: "Large pieces" label shifted right to x=295 to avoid touching green curve.
  -->

  <!-- Axes -->
  <line x1="60" y1="230" x2="360" y2="230" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="60" y1="230" x2="60" y2="55" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <polygon points="360,230 350,226 350,234" fill="#4fc3f7"/>
  <polygon points="60,55 56,65 64,65" fill="#4fc3f7"/>

  <text x="40" y="140" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffffff" transform="rotate(-90 40 140)">Volume of gas (cm³)</text>
  <text x="210" y="250" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffffff">Time (s)</text>

  <!-- Plateau line (dashed) -->
  <line x1="60" y1="90" x2="340" y2="90" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>

  <!-- Powder curve (faster — red) -->
  <path d="M 70,230 C 90,230 110,130 140,100 C 160,90 190,90 340,90" stroke="#ef5350" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Large pieces curve (slower — green) -->
  <path d="M 70,230 C 100,230 150,180 200,130 C 240,100 280,92 340,90" stroke="#81c784" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Curve labels -->
  <text x="155" y="82" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ef5350">Powder</text>
  <!-- FIXED: shifted right from x=265 to x=295 -->
  <text x="295" y="115" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#81c784">Large pieces</text>

  <!-- Key -->
  <line x1="80" y1="270" x2="100" y2="270" stroke="#ef5350" stroke-width="2.5" stroke-linecap="round"/>
  <text x="108" y="270" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">Powder (large SA)</text>
  <line x1="230" y1="270" x2="250" y2="270" stroke="#81c784" stroke-width="2.5" stroke-linecap="round"/>
  <text x="258" y="270" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">Large pieces (small SA)</text>
</svg>
