<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Flame Tests</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Identifying metal ions by flame colour</text>

  <!--
    FLAME TESTS — visual colour swatches with labels
    ==================================================
    Li=crimson, Na=yellow, K=lilac, Ca=orange-red, Cu=green
  -->

  <!-- Lithium -->
  <circle cx="65" cy="100" r="22" fill="#DC143C" opacity="0.8"/>
  <circle cx="65" cy="100" r="18" fill="#DC143C"/>
  <text x="65" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Li⁺</text>
  <text x="65" y="135" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Crimson</text>

  <!-- Sodium -->
  <circle cx="135" cy="100" r="22" fill="#FFD700" opacity="0.8"/>
  <circle cx="135" cy="100" r="18" fill="#FFD700"/>
  <text x="135" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Na⁺</text>
  <text x="135" y="135" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Yellow</text>

  <!-- Potassium -->
  <circle cx="205" cy="100" r="22" fill="#C8A2C8" opacity="0.8"/>
  <circle cx="205" cy="100" r="18" fill="#C8A2C8"/>
  <text x="205" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">K⁺</text>
  <text x="205" y="135" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Lilac</text>

  <!-- Calcium -->
  <circle cx="275" cy="100" r="22" fill="#FF4500" opacity="0.8"/>
  <circle cx="275" cy="100" r="18" fill="#FF4500"/>
  <text x="275" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Ca²⁺</text>
  <text x="275" y="135" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Orange-red</text>

  <!-- Copper -->
  <circle cx="345" cy="100" r="22" fill="#00C853" opacity="0.8"/>
  <circle cx="345" cy="100" r="18" fill="#00C853"/>
  <text x="345" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Cu²⁺</text>
  <text x="345" y="135" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Green</text>

  <!-- Method -->
  <text x="200" y="175" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Method: nichrome wire loop → conc. HCl → sample → blue flame</text>
</svg>