<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Displayed Formula — Propane</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">C₃H₈ (alkane)</text>

  <!--
    PROPANE DISPLAYED FORMULA
    =========================
    Backbone at y=100 (rule: displayed formula backbone y=100).
    C1(120,100) — C2(200,100) — C3(280,100). 80px backbone spacing.
    Terminal H at 42px from parent. Bond gap: 12px from each atom centre.
  -->

  <!-- Backbone atom labels -->
  <text x="120" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ff6b35">C</text>
  <text x="200" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ff6b35">C</text>
  <text x="280" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ff6b35">C</text>

  <!-- C1 hydrogen atoms (CH₃) -->
  <text x="78" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="120" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="120" y="142" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>

  <!-- C2 hydrogen atoms (CH₂) -->
  <text x="200" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="200" y="142" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>

  <!-- C3 hydrogen atoms (CH₃) -->
  <text x="322" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="280" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="280" y="142" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>

  <!-- Backbone bonds -->
  <line x1="132" y1="100" x2="188" y2="100" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="212" y1="100" x2="268" y2="100" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>

  <!-- C1—H left -->
  <line x1="108" y1="100" x2="90" y2="100" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <!-- C1—H up -->
  <line x1="120" y1="88" x2="120" y2="70" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <!-- C1—H down -->
  <line x1="120" y1="112" x2="120" y2="130" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>

  <!-- C2—H up -->
  <line x1="200" y1="88" x2="200" y2="70" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <!-- C2—H down -->
  <line x1="200" y1="112" x2="200" y2="130" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>

  <!-- C3—H right -->
  <line x1="292" y1="100" x2="310" y2="100" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <!-- C3—H up -->
  <line x1="280" y1="88" x2="280" y2="70" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <!-- C3—H down -->
  <line x1="280" y1="112" x2="280" y2="130" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
</svg>
