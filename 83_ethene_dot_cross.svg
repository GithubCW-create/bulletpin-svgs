<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Dot-and-Cross — Ethene (C₂H₄)</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Double covalent bond</text>

  <!--
    ETHENE DOT-AND-CROSS
    ======================
    C1 at (170,90), C2 at (230,90). 60px apart.
    Double bond between C atoms: 2 shared pairs (C1• + C2×).
    Each C also bonds to 2 H atoms.
    H atoms: C1 top-left, C1 bottom-left; C2 top-right, C2 bottom-right.
  -->

  <!-- Atom labels -->
  <text x="170" y="90" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#ff6b35">C</text>
  <text x="230" y="90" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#ff6b35">C</text>

  <!-- H atoms -->
  <text x="134" y="65" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">H</text>
  <text x="134" y="115" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">H</text>
  <text x="266" y="65" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">H</text>
  <text x="266" y="115" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">H</text>

  <!-- C=C double bond shared pairs (between atoms x=194 and x=206) -->
  <!-- Pair 1 (upper): y=84 -->
  <circle cx="194" cy="84" r="2.5" fill="#ff6b35"/>
  <text x="206" y="85" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffffff">×</text>
  <!-- Pair 2 (lower): y=96 -->
  <circle cx="194" cy="96" r="2.5" fill="#ff6b35"/>
  <text x="206" y="97" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffffff">×</text>

  <!-- C1—H bonds (shared pairs) -->
  <!-- C1—H top-left -->
  <circle cx="156" cy="74" r="2.5" fill="#ff6b35"/>
  <text x="148" y="73" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffffff">×</text>
  <!-- C1—H bottom-left -->
  <circle cx="156" cy="106" r="2.5" fill="#ff6b35"/>
  <text x="148" y="107" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffffff">×</text>

  <!-- C2—H bonds (shared pairs) -->
  <!-- C2—H top-right -->
  <circle cx="244" cy="74" r="2.5" fill="#ff6b35"/>
  <text x="252" y="73" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffffff">×</text>
  <!-- C2—H bottom-right -->
  <circle cx="244" cy="106" r="2.5" fill="#ff6b35"/>
  <text x="252" y="107" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffffff">×</text>

  <!-- Annotation -->
  <text x="200" y="145" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#81c784">C=C double bond — 2 shared pairs</text>

  <!-- Key -->
  <circle cx="140" cy="170" r="3" fill="#ff6b35"/>
  <text x="148" y="170" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff"> = C electron</text>
  <text x="140" y="185" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffffff">×</text>
  <text x="148" y="185" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff"> = H electron</text>
</svg>
