<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Electrolysis</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Electrolysis of an ionic compound</text>

  <!--
    ELECTROLYSIS DIAGRAM
    ======================
    Power supply at top, two electrodes in solution.
    Cathode (−) on left, Anode (+) on right.
    Ions flow: cations → cathode, anions → anode.
  -->

  <!-- Power supply (battery symbol) -->
  <rect x="170" y="50" width="60" height="25" rx="3" ry="3" stroke="#4fc3f7" stroke-width="2" fill="none"/>
  <text x="200" y="63" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#4fc3f7">DC supply</text>
  <text x="168" y="56" text-anchor="end" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#ef5350">−</text>
  <text x="232" y="56" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#ef5350">+</text>

  <!-- Wires from battery to electrodes -->
  <line x1="170" y1="63" x2="120" y2="63" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="120" y1="63" x2="120" y2="120" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="230" y1="63" x2="280" y2="63" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="280" y1="63" x2="280" y2="120" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>

  <!-- Beaker -->
  <rect x="80" y="120" width="240" height="120" rx="5" ry="5" stroke="#ffffff" stroke-width="2" fill="none"/>

  <!-- Solution colour hint -->
  <rect x="82" y="140" width="236" height="98" rx="3" ry="3" fill="#4fc3f7" opacity="0.08"/>

  <!-- Electrodes -->
  <rect x="112" y="110" width="16" height="100" fill="#ffffff" opacity="0.8" rx="2" ry="2"/>
  <rect x="272" y="110" width="16" height="100" fill="#ffffff" opacity="0.8" rx="2" ry="2"/>

  <!-- Electrode labels -->
  <text x="120" y="222" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#ffffff">Cathode (−)</text>
  <text x="280" y="222" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#ffffff">Anode (+)</text>

  <!-- Ion flow arrows -->
  <!-- Cations → cathode (left) -->
  <line x1="200" y1="165" x2="140" y2="165" stroke="#81c784" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="140,165 148,161 148,169" fill="#81c784"/>
  <text x="170" y="155" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">cations (+)</text>

  <!-- Anions → anode (right) -->
  <line x1="200" y1="190" x2="260" y2="190" stroke="#ffb74d" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="260,190 252,186 252,194" fill="#ffb74d"/>
  <text x="230" y="200" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffb74d">anions (−)</text>

  <!-- Solution label -->
  <text x="200" y="248" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">Electrolyte (molten or aqueous)</text>

  <!-- Process labels -->
  <text x="120" y="270" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Reduction</text>
  <text x="280" y="270" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffb74d">Oxidation</text>
</svg>
