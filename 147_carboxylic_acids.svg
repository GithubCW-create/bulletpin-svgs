<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Carboxylic Acids</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Functional group: —COOH</text>

  <!-- Displayed formula of —COOH group — shifted down 15px -->
  <text x="155" y="80" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#ff6b35">C</text>
  <line x1="163" y1="80" x2="180" y2="80" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <text x="190" y="80" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#ffb74d">O</text>
  <line x1="198" y1="80" x2="215" y2="80" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <text x="225" y="80" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#ffffff">H</text>
  <!-- Double bond O above -->
  <line x1="153" y1="71" x2="153" y2="61" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="157" y1="71" x2="157" y2="61" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <text x="155" y="53" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#ffb74d">O</text>
  <!-- Highlight box -->
  <rect x="138" y="43" width="100" height="48" rx="4" ry="4" stroke="#81c784" stroke-width="1.5" stroke-dasharray="4 3" fill="none"/>
  <text x="188" y="101" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#81c784">—COOH group</text>

  <!-- Properties -->
  <text x="200" y="120" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Properties</text>
  <rect x="70" y="130" width="260" height="42" rx="6" ry="6" stroke="#4fc3f7" stroke-width="1.5" fill="none"/>
  <text x="200" y="143" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Weak acids — partially ionise in water</text>
  <text x="200" y="159" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Dissolve in water to form acidic solutions (pH 3–6)</text>

  <!-- Reactions -->
  <text x="200" y="190" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#ffb74d">Reactions (same as other acids)</text>
  <text x="200" y="208" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">+ metal → salt + hydrogen</text>
  <text x="200" y="224" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">+ carbonate → salt + water + CO₂</text>
  <text x="200" y="240" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">+ alkali → salt + water</text>

  <!-- Examples -->
  <text x="200" y="264" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Examples</text>
  <text x="200" y="280" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Methanoic acid (HCOOH), ethanoic acid (CH₃COOH)</text>
</svg>