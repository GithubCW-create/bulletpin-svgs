<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Displayed Formula — Methanoic Acid</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">HCOOH (carboxylic acid)</text>

  <!--
    METHANOIC ACID DISPLAYED FORMULA
    ==================================
    Backbone at y=100. Tight 60px spacing.
    H(100,100) — C(160,100) with O(160,58) above (C=O)
    and O(220,100) right, then H(260,100).
  -->

  <text x="100" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="160" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ff6b35">C</text>
  <text x="160" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffb74d">O</text>
  <text x="220" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffb74d">O</text>
  <text x="260" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>

  <!-- H—C -->
  <line x1="112" y1="100" x2="148" y2="100" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <!-- C=O double bond -->
  <line x1="158" y1="88" x2="158" y2="70" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="162" y1="88" x2="162" y2="70" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <!-- C—O -->
  <line x1="172" y1="100" x2="208" y2="100" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <!-- O—H -->
  <line x1="232" y1="100" x2="248" y2="100" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>

  <!-- Functional group highlight -->
  <rect x="145" y="48" width="128" height="65" rx="4" ry="4" stroke="#81c784" stroke-width="1.5" stroke-dasharray="4 3" fill="none"/>
  <text x="209" y="128" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#81c784">carboxyl group (—COOH)</text>
</svg>
