<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Greenhouse Gases</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Climate change and global warming</text>

  <!-- Greenhouse mechanism — simple diagram -->
  <!-- Sun -->
  <circle cx="80" cy="65" r="15" fill="#ffb74d" opacity="0.6"/>
  <text x="80" y="65" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#1a1a2e">Sun</text>

  <!-- Incoming radiation -->
  <line x1="95" y1="72" x2="160" y2="120" stroke="#ffb74d" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="160,120 153,115 156,112" fill="#ffb74d"/>

  <!-- Earth surface -->
  <line x1="120" y1="150" x2="280" y2="150" stroke="#81c784" stroke-width="2" stroke-linecap="round"/>
  <text x="200" y="160" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#81c784">Earth's surface</text>

  <!-- Reflected IR -->
  <line x1="180" y1="150" x2="220" y2="120" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="4 3" stroke-linecap="round"/>
  <polygon points="220,120 214,124 216,128" fill="#ef5350"/>
  <text x="235" y="115" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#ef5350">IR radiation</text>

  <!-- Atmosphere layer -->
  <line x1="120" y1="100" x2="280" y2="100" stroke="#4fc3f7" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="310" y="100" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#4fc3f7">Atmosphere</text>

  <!-- Trapped/re-emitted -->
  <line x1="240" y1="100" x2="260" y2="130" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="4 3" stroke-linecap="round"/>
  <polygon points="260,130 254,126 256,122" fill="#ef5350"/>
  <text x="280" y="130" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#ef5350">Re-emitted</text>

  <!-- Greenhouse gases list -->
  <text x="200" y="185" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Greenhouse gases</text>
  <text x="200" y="203" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">CO₂ — burning fossil fuels, deforestation</text>
  <text x="200" y="219" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">CH₄ (methane) — agriculture, landfill, cattle</text>
  <text x="200" y="235" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">H₂O vapour — natural cycle</text>

  <!-- Effects -->
  <text x="200" y="258" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ef5350">Rising levels → global warming → ice caps melt,</text>
  <text x="200" y="272" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ef5350">sea levels rise, extreme weather</text>
</svg>