<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Chemical Cells and Batteries</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Converting chemical energy to electrical energy</text>

  <!-- Simple cell diagram -->
  <!-- Beaker -->
  <rect x="120" y="73" width="160" height="75" rx="4" ry="4" stroke="#4fc3f7" stroke-width="2" fill="none"/>
  <rect x="122" y="93" width="156" height="53" fill="#4fc3f7" opacity="0.1"/>
  <text x="200" y="126" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#4fc3f7">Electrolyte</text>

  <!-- Two different metal electrodes -->
  <rect x="150" y="66" width="8" height="70" fill="#ef5350" opacity="0.5"/>
  <rect x="242" y="66" width="8" height="70" fill="#81c784" opacity="0.5"/>
  <text x="140" y="60" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ef5350">Zn</text>
  <text x="260" y="60" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#81c784">Cu</text>

  <!-- Wire + voltmeter (wire broken around voltmeter) -->
  <line x1="154" y1="66" x2="154" y2="56" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="154" y1="56" x2="192" y2="56" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="208" y1="56" x2="246" y2="56" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="246" y1="66" x2="246" y2="56" stroke="#ffffff" stroke-width="1.5"/>
  <circle cx="200" cy="56" r="8" stroke="#ffb74d" stroke-width="1" fill="#1a1a2e"/>
  <text x="200" y="56" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ffb74d">V</text>

  <!-- Key points -->
  <text x="200" y="158" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Key points</text>
  <rect x="70" y="168" width="260" height="68" rx="6" ry="6" stroke="#4fc3f7" stroke-width="1.5" fill="none"/>
  <text x="200" y="181" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Two DIFFERENT metals = voltage produced</text>
  <text x="200" y="196" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Bigger reactivity difference = higher voltage</text>
  <text x="200" y="211" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">More reactive metal = negative electrode</text>
  <text x="200" y="226" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Non-rechargeable cells: reactants used up</text>

  <!-- Rechargeable -->
  <text x="200" y="252" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffb74d">Rechargeable batteries: reversible reactions</text>
  <text x="200" y="268" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Hydrogen fuel cell: 2H₂ + O₂ → 2H₂O (clean)</text>
</svg>