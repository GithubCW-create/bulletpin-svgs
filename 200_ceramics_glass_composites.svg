<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="200" y="20" font-size="15px" fill="#ffffff" font-weight="bold" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Materials: Ceramics, Glass &amp; Composites</text>

  <!-- Subtitle -->
  <text x="200" y="35" font-size="12px" fill="#ffb74d" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Properties &amp; Uses Comparison</text>

  <!-- Section 1: Ceramics -->
  <rect x="75" y="48" width="250" height="56" stroke="#4fc3f7" stroke-width="1" fill="none"/>
  <text x="200" y="58" font-size="12px" fill="#4fc3f7" font-weight="bold" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Ceramics</text>
  <text x="200" y="70" font-size="9px" fill="#ffffff" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Made from clay, hardened by heating</text>
  <text x="200" y="82" font-size="9px" fill="#ffffff" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Hard, brittle, electrical insulator</text>
  <text x="200" y="94" font-size="9px" fill="#ffb74d" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">e.g. pottery, bricks</text>

  <!-- Section 2: Glass -->
  <rect x="75" y="112" width="250" height="56" stroke="#ce93d8" stroke-width="1" fill="none"/>
  <text x="200" y="122" font-size="12px" fill="#ce93d8" font-weight="bold" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Glass</text>
  <text x="200" y="134" font-size="9px" fill="#ffffff" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Made from sand (SiO₂), transparent</text>
  <text x="200" y="146" font-size="9px" fill="#ffffff" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Hard, brittle, can be shaped when hot</text>
  <text x="200" y="158" font-size="9px" fill="#ffb74d" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Soda-lime glass vs borosilicate</text>

  <!-- Section 3: Composites -->
  <rect x="75" y="176" width="250" height="56" stroke="#81c784" stroke-width="1" fill="none"/>
  <text x="200" y="186" font-size="12px" fill="#81c784" font-weight="bold" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Composites</text>
  <text x="200" y="198" font-size="9px" fill="#ffffff" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Two or more materials combined</text>
  <text x="200" y="210" font-size="9px" fill="#ffffff" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Properties of both components</text>
  <text x="200" y="222" font-size="9px" fill="#ffb74d" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">e.g. fibreglass, concrete, carbon fibre</text>

  <!-- Key point at bottom -->
  <text x="200" y="248" font-size="10px" fill="#ffffff" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" dominant-baseline="central">Choose material based on required properties</text>
</svg>