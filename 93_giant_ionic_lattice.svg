<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Giant Ionic Lattice</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Regular arrangement of ions (e.g. NaCl)</text>

  <!--
    GIANT IONIC LATTICE
    =====================
    3D-style grid of alternating + and − ions.
    Shows regular repeating pattern. 4x4 grid with offset rows.
  -->

  <!-- Grid of ions — alternating Na⁺ (blue, smaller) and Cl⁻ (purple, larger) -->
  <!-- Row 1 -->
  <circle cx="120" cy="75" r="14" fill="#4fc3f7" opacity="0.8"/>
  <text x="120" y="75" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#1a1a2e">Na⁺</text>
  <circle cx="170" cy="75" r="17" fill="#ce93d8" opacity="0.8"/>
  <text x="170" y="75" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#1a1a2e">Cl⁻</text>
  <circle cx="220" cy="75" r="14" fill="#4fc3f7" opacity="0.8"/>
  <text x="220" y="75" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#1a1a2e">Na⁺</text>
  <circle cx="270" cy="75" r="17" fill="#ce93d8" opacity="0.8"/>
  <text x="270" y="75" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#1a1a2e">Cl⁻</text>

  <!-- Row 2 -->
  <circle cx="120" cy="120" r="17" fill="#ce93d8" opacity="0.8"/>
  <text x="120" y="120" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#1a1a2e">Cl⁻</text>
  <circle cx="170" cy="120" r="14" fill="#4fc3f7" opacity="0.8"/>
  <text x="170" y="120" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#1a1a2e">Na⁺</text>
  <circle cx="220" cy="120" r="17" fill="#ce93d8" opacity="0.8"/>
  <text x="220" y="120" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#1a1a2e">Cl⁻</text>
  <circle cx="270" cy="120" r="14" fill="#4fc3f7" opacity="0.8"/>
  <text x="270" y="120" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#1a1a2e">Na⁺</text>

  <!-- Row 3 -->
  <circle cx="120" cy="165" r="14" fill="#4fc3f7" opacity="0.8"/>
  <text x="120" y="165" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#1a1a2e">Na⁺</text>
  <circle cx="170" cy="165" r="17" fill="#ce93d8" opacity="0.8"/>
  <text x="170" y="165" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#1a1a2e">Cl⁻</text>
  <circle cx="220" cy="165" r="14" fill="#4fc3f7" opacity="0.8"/>
  <text x="220" y="165" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#1a1a2e">Na⁺</text>
  <circle cx="270" cy="165" r="17" fill="#ce93d8" opacity="0.8"/>
  <text x="270" y="165" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#1a1a2e">Cl⁻</text>

  <!-- Row 4 -->
  <circle cx="120" cy="210" r="17" fill="#ce93d8" opacity="0.8"/>
  <text x="120" y="210" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#1a1a2e">Cl⁻</text>
  <circle cx="170" cy="210" r="14" fill="#4fc3f7" opacity="0.8"/>
  <text x="170" y="210" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#1a1a2e">Na⁺</text>
  <circle cx="220" cy="210" r="17" fill="#ce93d8" opacity="0.8"/>
  <text x="220" y="210" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#1a1a2e">Cl⁻</text>
  <circle cx="270" cy="210" r="14" fill="#4fc3f7" opacity="0.8"/>
  <text x="270" y="210" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#1a1a2e">Na⁺</text>

  <!-- Key -->
  <circle cx="100" cy="260" r="8" fill="#4fc3f7" opacity="0.8"/>
  <text x="112" y="260" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">Na⁺ (smaller)</text>
  <circle cx="230" cy="260" r="10" fill="#ce93d8" opacity="0.8"/>
  <text x="244" y="260" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">Cl⁻ (larger)</text>

  <!-- Annotation -->
  <text x="200" y="280" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Strong electrostatic forces in all directions</text>
</svg>
