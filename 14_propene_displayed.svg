<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Displayed Formula — Propene</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">C₃H₆</text>

  <!-- Grid: 60px C spacing. C1=140, C2=200, C3=260, y=90 -->

  <!-- C1—C2 single bond -->
  <line x1="152" y1="90" x2="188" y2="90" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
  <!-- C2=C3 double bond -->
  <line x1="212" y1="87" x2="248" y2="87" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="212" y1="93" x2="248" y2="93" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>

  <!-- C1 H bonds: top, bottom, left -->
  <line x1="140" y1="78" x2="140" y2="55" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="140" y1="102" x2="140" y2="125" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="128" y1="90" x2="105" y2="90" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
  <!-- C2 H bonds: top, bottom -->
  <line x1="200" y1="78" x2="200" y2="55" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="200" y1="102" x2="200" y2="125" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
  <!-- C3 H bonds: top, bottom -->
  <line x1="260" y1="78" x2="260" y2="55" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="260" y1="102" x2="260" y2="125" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Atom labels -->
  <text x="140" y="90" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#ff6b35">C</text>
  <text x="200" y="90" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#ff6b35">C</text>
  <text x="260" y="90" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#ff6b35">C</text>
  <text x="140" y="48" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="140" y="132" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="98" y="90" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="200" y="48" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="200" y="132" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="260" y="48" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="260" y="132" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
</svg>