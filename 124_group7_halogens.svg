<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Group 7 — Halogens</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">F, Cl, Br, I, At</text>

  <!-- Table header — centralised tighter columns -->
  <text x="130" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Element</text>
  <text x="200" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">State</text>
  <text x="280" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Colour</text>
  <line x1="90" y1="70" x2="330" y2="70" stroke="#4fc3f7" stroke-width="1" opacity="0.4"/>

  <text x="130" y="86" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ce93d8">Fluorine</text>
  <text x="200" y="86" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">Gas</text>
  <text x="280" y="86" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">Pale yellow</text>
  <line x1="90" y1="98" x2="330" y2="98" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>

  <text x="130" y="112" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ce93d8">Chlorine</text>
  <text x="200" y="112" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">Gas</text>
  <text x="280" y="112" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">Green</text>
  <line x1="90" y1="124" x2="330" y2="124" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>

  <text x="130" y="138" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ce93d8">Bromine</text>
  <text x="200" y="138" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">Liquid</text>
  <text x="280" y="138" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">Orange-brown</text>
  <line x1="90" y1="150" x2="330" y2="150" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>

  <text x="130" y="164" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ce93d8">Iodine</text>
  <text x="200" y="164" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">Solid</text>
  <text x="280" y="164" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">Grey / purple vapour</text>

  <!-- Trends -->
  <text x="200" y="190" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Trends going down the group</text>
  <text x="200" y="208" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ef5350">Reactivity decreases ↓</text>
  <text x="200" y="224" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Melting/boiling point increases ↑</text>
  <text x="200" y="240" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">7 outer electrons → gain 1 → form −1 ions</text>

  <!-- Displacement -->
  <text x="200" y="262" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffb74d">More reactive halogen displaces a less reactive one</text>
</svg>