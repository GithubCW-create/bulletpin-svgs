<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Displayed Formula — Diethyl Ether</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">C₂H₅OC₂H₅ (ether)</text>

  <!--
    DIETHYL ETHER DISPLAYED FORMULA
    ================================
    Backbone at y=100 (rule: displayed formula backbone y=100).
    C1(100,100) — C2(150,100) — O(200,100) — C3(250,100) — C4(300,100)
    50px backbone spacing. 42px terminal H distance.
    Bond gap: 12px from each atom centre.
  -->

  <!-- Backbone atom labels -->
  <text x="100" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ff6b35">C</text>
  <text x="150" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ff6b35">C</text>
  <text x="200" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffb74d">O</text>
  <text x="250" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ff6b35">C</text>
  <text x="300" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ff6b35">C</text>

  <!-- C1 hydrogen atoms -->
  <text x="58" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="100" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="100" y="142" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>

  <!-- C2 hydrogen atoms -->
  <text x="150" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="150" y="142" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>

  <!-- C3 hydrogen atoms -->
  <text x="250" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="250" y="142" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>

  <!-- C4 hydrogen atoms -->
  <text x="342" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="300" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="300" y="142" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>

  <!-- Backbone bonds -->
  <line x1="112" y1="100" x2="138" y2="100" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="162" y1="100" x2="188" y2="100" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="212" y1="100" x2="238" y2="100" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="262" y1="100" x2="288" y2="100" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>

  <!-- C1—H left -->
  <line x1="88" y1="100" x2="70" y2="100" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <!-- C1—H up -->
  <line x1="100" y1="88" x2="100" y2="70" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <!-- C1—H down -->
  <line x1="100" y1="112" x2="100" y2="130" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>

  <!-- C2—H up -->
  <line x1="150" y1="88" x2="150" y2="70" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <!-- C2—H down -->
  <line x1="150" y1="112" x2="150" y2="130" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>

  <!-- C3—H up -->
  <line x1="250" y1="88" x2="250" y2="70" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <!-- C3—H down -->
  <line x1="250" y1="112" x2="250" y2="130" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>

  <!-- C4—H right -->
  <line x1="312" y1="100" x2="330" y2="100" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <!-- C4—H up -->
  <line x1="300" y1="88" x2="300" y2="70" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <!-- C4—H down -->
  <line x1="300" y1="112" x2="300" y2="130" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>

  <!-- Ether functional group highlight -->
  <rect x="180" y="87" width="40" height="26" rx="6" ry="6" stroke="#81c784" stroke-width="1.5" stroke-dasharray="4 3" fill="none"/>
  <text x="200" y="165" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#81c784">ether linkage (—O—)</text>
</svg>
