<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Displayed Formula — Ethene</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">C₂H₄ (alkene)</text>

  <!--
    ETHENE DISPLAYED FORMULA
    ========================
    Backbone at y=100 (rule).
    C1(170,100) — C2(230,100). 60px spacing.
    C=C double bond (two parallel horizontal lines 4px apart).
    Each C has H above and H below. Terminal H at 42px.
    Bond gap: 12px from each atom centre.
  -->

  <!-- Backbone atom labels -->
  <text x="170" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ff6b35">C</text>
  <text x="230" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ff6b35">C</text>

  <!-- C1 hydrogen atoms -->
  <text x="170" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="170" y="142" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>

  <!-- C2 hydrogen atoms -->
  <text x="230" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>
  <text x="230" y="142" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">H</text>

  <!-- C=C double bond (two parallel horizontal lines 4px apart) -->
  <line x1="182" y1="98" x2="218" y2="98" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <line x1="182" y1="102" x2="218" y2="102" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>

  <!-- C1—H up -->
  <line x1="170" y1="88" x2="170" y2="70" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <!-- C1—H down -->
  <line x1="170" y1="112" x2="170" y2="130" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>

  <!-- C2—H up -->
  <line x1="230" y1="88" x2="230" y2="70" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
  <!-- C2—H down -->
  <line x1="230" y1="112" x2="230" y2="130" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>

  <!-- Double bond annotation -->
  <text x="200" y="165" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#81c784">C=C double bond (alkene)</text>
</svg>
