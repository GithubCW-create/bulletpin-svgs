<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Graphene</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">A single layer of graphite</text>

  <!-- Hexagonal lattice — flat sheet with depth effect -->
  <!-- Outer/background bonds: thinner, lower opacity for depth -->
  <!-- Row 0 (back row - thinner) -->
  <polygon points="160,58 175,50 190,58 190,72 175,80 160,72" fill="none" stroke="#4fc3f7" stroke-width="1" opacity="0.4"/>
  <polygon points="190,58 205,50 220,58 220,72 205,80 190,72" fill="none" stroke="#4fc3f7" stroke-width="1" opacity="0.4"/>
  <polygon points="220,58 235,50 250,58 250,72 235,80 220,72" fill="none" stroke="#4fc3f7" stroke-width="1" opacity="0.4"/>

  <!-- Row 1 (middle - medium) -->
  <polygon points="145,72 160,64 175,72 175,86 160,94 145,86" fill="none" stroke="#4fc3f7" stroke-width="1.2" opacity="0.6"/>
  <polygon points="175,72 190,64 205,72 205,86 190,94 175,86" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <polygon points="205,72 220,64 235,72 235,86 220,94 205,86" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <polygon points="235,72 250,64 265,72 265,86 250,94 235,86" fill="none" stroke="#4fc3f7" stroke-width="1.2" opacity="0.6"/>

  <!-- Row 2 (front - full weight) -->
  <polygon points="160,86 175,78 190,86 190,100 175,108 160,100" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <polygon points="190,86 205,78 220,86 220,100 205,108 190,100" fill="none" stroke="#4fc3f7" stroke-width="2"/>
  <polygon points="220,86 235,78 250,86 250,100 235,108 220,100" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>

  <!-- Row 3 (front edge - thinner for fade) -->
  <polygon points="175,100 190,92 205,100 205,114 190,122 175,114" fill="none" stroke="#4fc3f7" stroke-width="1.2" opacity="0.6"/>
  <polygon points="205,100 220,92 235,100 235,114 220,122 205,114" fill="none" stroke="#4fc3f7" stroke-width="1.2" opacity="0.6"/>

  <!-- Carbon atoms at key vertices (front rows only, full opacity) -->
  <circle cx="190" cy="64" r="3" fill="#ff6b35"/>
  <circle cx="220" cy="64" r="3" fill="#ff6b35"/>
  <circle cx="175" cy="72" r="3" fill="#ff6b35"/>
  <circle cx="205" cy="72" r="3" fill="#ff6b35"/>
  <circle cx="235" cy="72" r="3" fill="#ff6b35"/>
  <circle cx="190" cy="86" r="3" fill="#ff6b35"/>
  <circle cx="220" cy="86" r="3" fill="#ff6b35"/>
  <circle cx="175" cy="100" r="3" fill="#ff6b35"/>
  <circle cx="205" cy="100" r="3" fill="#ff6b35"/>
  <circle cx="235" cy="100" r="3" fill="#ff6b35"/>
  <!-- Back row atoms - smaller, faded -->
  <circle cx="175" cy="50" r="2" fill="#ff6b35" opacity="0.5"/>
  <circle cx="205" cy="50" r="2" fill="#ff6b35" opacity="0.5"/>
  <circle cx="235" cy="50" r="2" fill="#ff6b35" opacity="0.5"/>

  <!-- Labels -->
  <text x="285" y="72" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#ff6b35">Carbon atoms</text>
  <text x="285" y="90" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#4fc3f7">Covalent bonds</text>
  <text x="200" y="136" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#81c784">One atom thick — 2D material</text>

  <!-- Properties -->
  <text x="200" y="158" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Properties</text>
  <rect x="70" y="168" width="260" height="55" rx="6" ry="6" stroke="#81c784" stroke-width="1.5" fill="none"/>
  <text x="200" y="182" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Very strong (each C bonded to 3 others)</text>
  <text x="200" y="196" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Excellent conductor (1 delocalised electron per C)</text>
  <text x="200" y="210" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Transparent, flexible, lightweight</text>

  <!-- Uses -->
  <text x="200" y="238" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#ffb74d">Potential uses</text>
  <text x="200" y="256" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Electronics, composite materials, membranes</text>
  <text x="200" y="272" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Sensors, touchscreens, batteries</text>
</svg>