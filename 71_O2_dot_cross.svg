<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Dot-and-Cross — Oxygen (O₂)</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Double covalent bond</text>

  <!--
    O₂ DOT-AND-CROSS
    ==================
    Two O atoms, 36px apart. O1 at (182,90), O2 at (218,90).
    Each O has 6 outer electrons. 2 shared pairs (double bond) + 2 lone pairs each.
    O1 electrons shown as dots •, O2 electrons shown as crosses ×.
    Shared region: 2 pairs stacked vertically.
    O1 lone pairs: top and left. O2 lone pairs: top and right.
  -->

  <!-- Atom labels -->
  <text x="182" y="90" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#ffb74d">O</text>
  <text x="218" y="90" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#ffb74d">O</text>

  <!-- Double bond shared pairs (between atoms, x=196 and x=204) -->
  <!-- Pair 1 (upper): y=84 -->
  <circle cx="196" cy="84" r="2.5" fill="#ffb74d"/>
  <text x="204" y="85" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffffff">×</text>
  <!-- Pair 2 (lower): y=96 -->
  <circle cx="196" cy="96" r="2.5" fill="#ffb74d"/>
  <text x="204" y="97" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffffff">×</text>

  <!-- O1 lone pairs -->
  <!-- Top lone pair y=74 -->
  <circle cx="178" cy="74" r="2.5" fill="#ffb74d"/>
  <circle cx="186" cy="74" r="2.5" fill="#ffb74d"/>
  <!-- Bottom lone pair y=106 -->
  <circle cx="178" cy="106" r="2.5" fill="#ffb74d"/>
  <circle cx="186" cy="106" r="2.5" fill="#ffb74d"/>

  <!-- O2 lone pairs -->
  <!-- Top lone pair y=74 -->
  <text x="214" y="75" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffffff">×</text>
  <text x="222" y="75" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffffff">×</text>
  <!-- Bottom lone pair y=106 -->
  <text x="214" y="107" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffffff">×</text>
  <text x="222" y="107" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffffff">×</text>

  <!-- Annotation -->
  <text x="200" y="135" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#81c784">Double bond — 2 shared pairs</text>

  <!-- Key -->
  <circle cx="140" cy="160" r="3" fill="#ffb74d"/>
  <text x="148" y="160" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff"> = O₁ electron</text>
  <text x="140" y="175" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffffff">×</text>
  <text x="148" y="175" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff"> = O₂ electron</text>
</svg>
