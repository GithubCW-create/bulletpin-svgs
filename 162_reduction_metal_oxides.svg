<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Reduction of Metal Oxides</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Extracting metals using carbon</text>

  <!-- Key concept -->
  <rect x="70" y="52" width="260" height="56" rx="6" ry="6" stroke="#4fc3f7" stroke-width="1.5" fill="none"/>
  <text x="200" y="66" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Carbon can reduce oxides of metals</text>
  <text x="200" y="80" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">BELOW it in the reactivity series</text>
  <text x="200" y="94" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Carbon is oxidised → CO₂</text>

  <!-- Example 1 -->
  <text x="200" y="120" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Iron extraction (blast furnace)</text>
  <text x="200" y="140" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">2Fe₂O₃ + 3C → 4Fe + 3CO₂</text>
  <text x="200" y="158" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffb74d">Iron oxide is reduced (loses oxygen)</text>
  <text x="200" y="172" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffb74d">Carbon is oxidised (gains oxygen)</text>

  <!-- Example 2 -->
  <text x="200" y="198" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Copper extraction</text>
  <text x="200" y="218" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">2CuO + C → 2Cu + CO₂</text>

  <!-- Cannot extract box -->
  <rect x="70" y="240" width="260" height="42" rx="6" ry="6" stroke="#ef5350" stroke-width="1.5" fill="none"/>
  <text x="200" y="254" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ef5350">Cannot extract with carbon:</text>
  <text x="200" y="270" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">K, Na, Li, Ca, Mg, Al → need electrolysis</text>
</svg>