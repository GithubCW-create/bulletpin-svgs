<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Dot-and-Cross — Water (H₂O)</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Two single covalent bonds</text>

  <!--
    H₂O DOT-AND-CROSS
    ==================
    O at centre (200,75). H(a) at (164,75), H(b) at (236,75). 36px each.
    2 shared pairs (one with each H). O has 2 lone pairs (top + bottom).
    × = O electron (#ffb74d). • = H electron (#ffffff).
    O is 1-char: ±14 top/bottom, ±16 left/right.
  -->

  <!-- Atom labels -->
  <text x="164" y="75" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">H</text>
  <text x="200" y="75" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#ffb74d">O</text>
  <text x="236" y="75" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">H</text>

  <!-- Left shared pair: between H(a)(164) and O(200), midpoint x=182 -->
  <circle cx="178" cy="75" r="3" fill="#ffffff"/>
  <text x="186" y="76" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ffb74d">×</text>

  <!-- Right shared pair: between O(200) and H(b)(236), midpoint x=218 -->
  <text x="214" y="76" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ffb74d">×</text>
  <circle cx="222" cy="75" r="3" fill="#ffffff"/>

  <!-- O lone pairs (all ×, amber) -->
  <!-- Top pair: y=75-14=61, x=200±4 -->
  <text x="196" y="62" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ffb74d">×</text>
  <text x="204" y="62" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ffb74d">×</text>
  <!-- Bottom pair: y=75+14=89, x=200±4 -->
  <text x="196" y="90" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ffb74d">×</text>
  <text x="204" y="90" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ffb74d">×</text>

  <!-- Key -->
  <text x="176" y="125" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ffb74d">×</text>
  <text x="200" y="125" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">= O electron</text>
  <circle cx="176" cy="140" r="3" fill="#ffffff"/>
  <text x="200" y="140" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff">= H electron</text>
</svg>
