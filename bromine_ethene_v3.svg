  <line x1="119" y1="88" x2="119" y2="96" stroke="#ffffff" stroke-width="1"/>
  <text x="141" y="80" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff">C</text>
  <text x="141" y="56" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff">H</text>
  <line x1="141" y1="72" x2="141" y2="64" stroke="#ffffff" stroke-width="1"/>
  <text x="141" y="104" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff">H</text>
