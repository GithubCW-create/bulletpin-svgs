  <text x="152" y="200" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff">H</text>
  <line x1="166" y1="200" x2="160" y2="200" stroke="#ffffff" stroke-width="1"/>
  <text x="174" y="200" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff">C</text>
