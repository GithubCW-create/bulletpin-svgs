  <text x="185" y="80" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="#2ecc71">+</text>
  <text x="240" y="80" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff">Br<tspan baseline-shift="sub" font-size="0.75em">2</tspan></text>
  <text x="240" y="122" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#b0b0c8">BROMINE</text>

  <!-- Green arrow -->
  <line x1="185" y1="118" x2="185" y2="158" stroke="#2ecc71" stroke-width="3"/>
  <polygon points="185,166 179,156 191,156" fill="#2ecc71"/>

