<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 290">
  <rect width="400" height="290" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="200" y="18" text-anchor="middle" dominant-baseline="central"
        font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Addition of Bromine to Ethene</text>

  <!-- Row 1: Ethene + Br2 -->
