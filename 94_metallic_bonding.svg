<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Metallic Bonding</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Sea of delocalised electrons</text>

  <!--
    METALLIC BONDING DIAGRAM
    ==========================
    Regular array of metal cations (positive circles)
    surrounded by scattered small electron dots (delocalised electrons).
  -->

  <!-- Metal cations in rows (offset hexagonal-style) -->
  <!-- Row 1 -->
  <circle cx="120" cy="75" r="18" stroke="#4fc3f7" stroke-width="2" fill="none"/>
  <text x="120" y="75" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">M⁺</text>
  <circle cx="200" cy="75" r="18" stroke="#4fc3f7" stroke-width="2" fill="none"/>
  <text x="200" y="75" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">M⁺</text>
  <circle cx="280" cy="75" r="18" stroke="#4fc3f7" stroke-width="2" fill="none"/>
  <text x="280" y="75" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">M⁺</text>

  <!-- Row 2 (offset) -->
  <circle cx="160" cy="130" r="18" stroke="#4fc3f7" stroke-width="2" fill="none"/>
  <text x="160" y="130" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">M⁺</text>
  <circle cx="240" cy="130" r="18" stroke="#4fc3f7" stroke-width="2" fill="none"/>
  <text x="240" y="130" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">M⁺</text>

  <!-- Row 3 -->
  <circle cx="120" cy="185" r="18" stroke="#4fc3f7" stroke-width="2" fill="none"/>
  <text x="120" y="185" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">M⁺</text>
  <circle cx="200" cy="185" r="18" stroke="#4fc3f7" stroke-width="2" fill="none"/>
  <text x="200" y="185" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">M⁺</text>
  <circle cx="280" cy="185" r="18" stroke="#4fc3f7" stroke-width="2" fill="none"/>
  <text x="280" y="185" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">M⁺</text>

  <!-- Delocalised electrons (small scattered dots) -->
  <circle cx="155" cy="60" r="2.5" fill="#ef5350"/>
  <circle cx="170" cy="95" r="2.5" fill="#ef5350"/>
  <circle cx="135" cy="105" r="2.5" fill="#ef5350"/>
  <circle cx="250" cy="65" r="2.5" fill="#ef5350"/>
  <circle cx="225" cy="100" r="2.5" fill="#ef5350"/>
  <circle cx="110" cy="130" r="2.5" fill="#ef5350"/>
  <circle cx="295" cy="105" r="2.5" fill="#ef5350"/>
  <circle cx="190" cy="155" r="2.5" fill="#ef5350"/>
  <circle cx="145" cy="160" r="2.5" fill="#ef5350"/>
  <circle cx="260" cy="155" r="2.5" fill="#ef5350"/>
  <circle cx="175" cy="210" r="2.5" fill="#ef5350"/>
  <circle cx="230" cy="210" r="2.5" fill="#ef5350"/>
  <circle cx="290" cy="210" r="2.5" fill="#ef5350"/>
  <circle cx="105" cy="210" r="2.5" fill="#ef5350"/>
  <circle cx="215" cy="70" r="2.5" fill="#ef5350"/>
  <circle cx="285" cy="140" r="2.5" fill="#ef5350"/>

  <!-- Key -->
  <circle cx="110" cy="245" r="10" stroke="#4fc3f7" stroke-width="2" fill="none"/>
  <text x="110" y="245" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="8" font-weight="bold" fill="#4fc3f7">M⁺</text>
  <text x="125" y="245" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff"> = metal cation</text>
  <circle cx="240" cy="245" r="3" fill="#ef5350"/>
  <text x="248" y="245" text-anchor="start" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff"> = delocalised e⁻</text>

  <text x="200" y="270" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Electrons free to move → conducts electricity</text>
</svg>
