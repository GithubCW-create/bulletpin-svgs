<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <text x="200" y="20" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Alcohols</text>
  <text x="200" y="35" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffb74d">Functional group: —OH</text>

  <!-- First 3 alcohols table — centred tighter -->
  <text x="135" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Name</text>
  <text x="210" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Formula</text>
  <text x="280" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Use</text>
  <line x1="90" y1="70" x2="325" y2="70" stroke="#4fc3f7" stroke-width="1" opacity="0.4"/>

  <text x="135" y="86" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Methanol</text>
  <text x="210" y="86" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ff6b35">CH₃OH</text>
  <text x="280" y="86" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Fuel, solvent</text>
  <line x1="90" y1="98" x2="325" y2="98" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>

  <text x="135" y="112" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Ethanol</text>
  <text x="210" y="112" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ff6b35">C₂H₅OH</text>
  <text x="280" y="112" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Drinks, fuel, solvent</text>
  <line x1="90" y1="124" x2="325" y2="124" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>

  <text x="135" y="138" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Propanol</text>
  <text x="210" y="138" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ff6b35">C₃H₇OH</text>
  <text x="280" y="138" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Solvent</text>

  <!-- Properties -->
  <text x="200" y="166" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4fc3f7">Properties</text>
  <rect x="70" y="176" width="260" height="42" rx="6" ry="6" stroke="#4fc3f7" stroke-width="1.5" fill="none"/>
  <text x="200" y="190" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Dissolve in water, form neutral solutions</text>
  <text x="200" y="206" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Burn in air (combustion), used as fuels</text>

  <!-- Reactions -->
  <text x="200" y="234" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#ffb74d">Reactions</text>
  <text x="200" y="252" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Combustion: C₂H₅OH + 3O₂ → 2CO₂ + 3H₂O</text>
  <text x="200" y="268" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff">Oxidation: ethanol → ethanoic acid</text>
  <text x="200" y="284" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#81c784">Fermentation: glucose → ethanol + CO₂ (yeast)</text>
</svg>