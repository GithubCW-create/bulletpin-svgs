<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="200" y="20" font-size="15px" fill="#ffffff" font-weight="bold" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Corrosion and Rusting</text>

  <!-- Subtitle -->
  <text x="200" y="35" font-size="12px" fill="#ffb74d" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Iron oxidation reactions</text>

  <!-- Equation -->
  <rect x="80" y="45" width="240" height="25" fill="none" stroke="#4fc3f7" stroke-width="1" rx="2"/>
  <text x="200" y="58" font-size="11px" fill="#4fc3f7" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Iron + Water + Oxygen → Hydrated iron(III) oxide</text>

  <!-- Conditions for rusting heading -->
  <text x="200" y="85" font-size="12px" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Conditions for rusting</text>

  <!-- Test tube 1: Water only -->
  <rect x="50" y="100" width="50" height="60" fill="none" stroke="#ffb74d" stroke-width="2" rx="2"/>
  <circle cx="75" cy="145" r="6" fill="#ff6b35" opacity="0.6"/>
  <text x="75" y="175" font-size="10px" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Water only</text>
  <text x="75" y="187" font-size="10px" fill="#81c784" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">No rust</text>

  <!-- Test tube 2: Air + drying agent -->
  <rect x="175" y="100" width="50" height="60" fill="none" stroke="#4fc3f7" stroke-width="2" rx="2"/>
  <circle cx="200" cy="145" r="6" fill="#ff6b35" opacity="0.6"/>
  <text x="200" y="175" font-size="10px" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Air + drying</text>
  <text x="200" y="185" font-size="10px" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">agent</text>
  <text x="200" y="197" font-size="10px" fill="#81c784" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">No rust</text>

  <!-- Test tube 3: Water AND air -->
  <rect x="300" y="100" width="50" height="60" fill="none" stroke="#ef5350" stroke-width="2" rx="2"/>
  <circle cx="325" cy="145" r="8" fill="#ef5350" opacity="0.8"/>
  <text x="325" y="175" font-size="10px" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Water + Air</text>
  <text x="325" y="187" font-size="10px" fill="#ef5350" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Rusts!</text>

  <!-- Prevention heading -->
  <text x="200" y="220" font-size="12px" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Prevention methods</text>

  <!-- Prevention methods -->
  <rect x="70" y="230" width="60" height="45" fill="none" stroke="#81c784" stroke-width="1" rx="2"/>
  <text x="100" y="243" font-size="11px" fill="#81c784" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Painting</text>
  <text x="100" y="257" font-size="10px" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Block oxygen</text>

  <rect x="140" y="230" width="60" height="45" fill="none" stroke="#81c784" stroke-width="1" rx="2"/>
  <text x="170" y="243" font-size="11px" fill="#81c784" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Oiling</text>
  <text x="170" y="257" font-size="10px" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Moisture barrier</text>

  <rect x="210" y="230" width="60" height="45" fill="none" stroke="#81c784" stroke-width="1" rx="2"/>
  <text x="240" y="243" font-size="11px" fill="#81c784" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Galvanising</text>
  <text x="240" y="257" font-size="10px" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Zinc coating</text>

  <rect x="280" y="230" width="60" height="45" fill="none" stroke="#81c784" stroke-width="1" rx="2"/>
  <text x="310" y="243" font-size="11px" fill="#81c784" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Sacrificial</text>
  <text x="310" y="257" font-size="10px" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-family="Arial, Helvetica, sans-serif">Anode</text>
</svg>